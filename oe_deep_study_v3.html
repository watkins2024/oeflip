rdship-time, time of suffering", "type": "noun · fem · acc", "accepts": ["hardship-time", "hardship time", "time of suffering", "time of hardship", "hard time"], "note": "earfoð (hardship) + hwīl (time) — time itself becomes hard"}, {"oe": "oft", "pron": "OFT", "eng": "often", "type": "adverb", "accepts": ["often", "frequently"], "note": "Habitual. Not once."}, {"oe": "þrōwade", "pron": "THROH-wah-deh", "eng": "endured, suffered", "type": "verb · past · 1sg", "accepts": ["endured", "suffered", "experienced", "bore"], "note": "From þrōwian — root of 'throe'. Involuntary suffering."}], "dive": "<span class='gi'>Earfoðhwīle</span> — time made of hardship. Not hardship in time — time that IS hardship. <span class='gi'>Þrōwade</span> gives us 'throe'. Endurance as being wracked."}, {"s": 1, "oe": "bitre brēostceare gebiden hæbbe", "pron": "BIT-reh BREHST-keh-ah-reh geh-BID-en HÆHB-eh", "eng": "bitter breast-care experienced have", "mode": "word", "words": [{"oe": "bitre", "pron": "BIT-reh", "eng": "bitter, sharp, cruel", "type": "adjective", "accepts": ["bitter", "sharp", "cruel", "harsh"], "note": "The taste of grief — physical word for emotional state"}, {"oe": "brēostceare", "pron": "BREHST-keh-ah-reh", "eng": "breast-care, heart-sorrow", "type": "noun · fem · acc", "accepts": ["breast-care", "breast care", "heart-sorrow", "heart sorrow", "chest-grief"], "note": "brēost (breast) + cearu (care) — grief located in the body"}, {"oe": "gebiden", "pron": "geh-BID-en", "eng": "experienced, endured", "type": "verb · pp", "accepts": ["experienced", "endured", "suffered", "undergone", "waited through"], "note": "Past participle of gebīdan — the same bīdan from the Wanderer. Endured."}, {"oe": "hæbbe", "pron": "HÆHB-eh", "eng": "have", "type": "verb · 1sg subj", "accepts": ["have", "I have"], "note": "Subjunctive of habban — I have endured. Present perfect."}], "dive": "<span class='gi'>Brēostceare</span> — breast-care. Another compound placing emotion in the body. OE doesn't have abstract 'anxiety'. It has care-in-the-chest. <span class='gi'>Gebiden</span> — same root as the Wanderer's gebīdeð. The waiting-endurance connects the two poems."}, {"s": 2, "st": "The Cold at Sea", "oe": "Gecunnad in cēole cearselda fela", "pron": "geh-KOON-ahd in KEH-oh-leh KEHR-seld-ah FEL-ah", "eng": "Experienced in the ship care-halls many", "mode": "word", "words": [{"oe": "gecunnad", "pron": "geh-KOON-ahd", "eng": "experienced, tested, tried", "type": "verb · pp", "accepts": ["experienced", "tested", "tried", "known", "proved"], "note": "Past participle of cunnian — to test, to experience. Same root as cunnan (to know)."}, {"oe": "cēole", "pron": "KEH-oh-leh", "eng": "in a ship, in a keel", "type": "noun · masc · dat", "accepts": ["ship", "keel", "boat", "in a ship"], "note": "Root of modern 'keel'. Dative — inside the vessel."}, {"oe": "cearselda", "pron": "KEHR-seld-ah", "eng": "care-halls, anxiety-dwellings", "type": "noun · gen pl", "accepts": ["care-halls", "care halls", "anxiety dwellings", "sorrowful places", "halls of care"], "note": "cearu (care) + seld (hall/dwelling) — the ship IS a hall of anxiety. Kenning."}, {"oe": "fela", "pron": "FEL-ah", "eng": "many, much", "type": "adjective", "accepts": ["many", "much", "a lot"], "note": "Many care-halls. Many voyages. Many miseries."}], "dive": "<span class='gi'>Cearselda</span> — care-halls. The ship becomes a hall — but a hall of anxiety. The Wanderer mourns the lost hall. The Seafarer's 'hall' is the pitching deck. Same architecture, inverted."}, {"s": 2, "oe": "atol ȳþa gewealc · þǣr mec oft bigeat", "pron": "AH-tol OO-thah geh-WEAHLK · THÆHR mek OFT bi-GEAHT", "eng": "terrible rolling of waves · where me often seized", "mode": "word", "words": [{"oe": "atol", "pron": "AH-tol", "eng": "terrible, horrible, dire", "type": "adjective", "accepts": ["terrible", "horrible", "dire", "dreadful", "awful"], "note": "Strong word — the same adjective used for Grendel in Beowulf"}, {"oe": "ȳþa", "pron": "OO-thah", "eng": "of waves", "type": "noun · fem · gen pl", "accepts": ["of waves", "waves", "wave's"], "note": "Genitive plural of ȳð (wave)"}, {"oe": "gewealc", "pron": "geh-WEAHLK", "eng": "rolling, tossing, surging", "type": "noun · neut", "accepts": ["rolling", "tossing", "surging", "tumbling"], "note": "The motion of the sea — physical, violent"}, {"oe": "þǣr", "pron": "THÆHR", "eng": "there, where", "type": "adverb", "accepts": ["there", "where"], "note": "On the sea. In that place."}, {"oe": "mec", "pron": "MEK", "eng": "me", "type": "pronoun · acc", "accepts": ["me"], "note": "Accusative form — the waves seized ME. He is the object."}, {"oe": "bigeat", "pron": "bi-GEAHT", "eng": "seized, caught, overtook", "type": "verb · past · 3sg", "accepts": ["seized", "caught", "overtook", "took", "beset"], "note": "bi- + geat — the sea seizes him. He doesn't ride it. It takes him."}], "dive": "<span class='gi'>Atol ȳþa gewealc</span> — terrible rolling of waves. The same word (<span class='gi'>atol</span>) used for Grendel. The sea is a monster. <span class='gi'>Bigeat</span> — seized. The Seafarer doesn't master the sea. The sea masters him."}, {"s": 2, "oe": "nearo nihtwaco æt nacan stefnan", "pron": "NEH-ah-roh NIHT-wah-koh æt NAH-kan STEF-nan", "eng": "anxious night-watch at the ship's prow", "mode": "word", "words": [{"oe": "nearo", "pron": "NEH-ah-roh", "eng": "anxious, narrow, oppressive", "type": "adjective", "accepts": ["anxious", "narrow", "oppressive", "tight", "constrained"], "note": "Physical and emotional — the narrowness of fear"}, {"oe": "nihtwaco", "pron": "NIHT-wah-koh", "eng": "night-watch", "type": "noun · fem · acc", "accepts": ["night-watch", "night watch", "vigil", "night vigil"], "note": "niht (night) + waco (watch) — awake in the dark. Compare your ūhtna."}, {"oe": "æt", "pron": "ÆT", "eng": "at, by, near", "type": "preposition", "accepts": ["at", "by", "near"], "note": "Position — at the prow"}, {"oe": "nacan", "pron": "NAH-kan", "eng": "ship's, of the ship", "type": "noun · masc · gen", "accepts": ["ship's", "of the ship", "boat's"], "note": "Genitive of naca (ship)"}, {"oe": "stefnan", "pron": "STEF-nan", "eng": "prow, stem", "type": "noun · masc · dat", "accepts": ["prow", "stem", "bow", "front"], "note": "The front of the ship — where you keep watch. Exposed."}], "dive": "<span class='gi'>Nearo nihtwaco</span> — anxious night-watch. <span class='gi'>Nearo</span> means both narrow and anxious — the space contracts with fear. At the prow, alone, in the dark, watching for rocks."}, {"s": 2, "oe": "þonne hit cliffum cnossað", "pron": "THON-eh hit KLIF-um KNOS-ath", "eng": "when it against cliffs crashes", "mode": "sentence", "dive": "Short, sharp line. The ship crashes against cliffs. <span class='gi'>Cnossað</span> — smashes, crashes. Onomatopoeia. You hear the impact in the word."}, {"s": 2, "oe": "Calde geþrungen wǣron mīne fēt · forste gebunden", "pron": "KALD-eh geh-THRUNG-en WAH-ron MEE-neh FEHT · FORST-eh geh-BUND-en", "eng": "Pinched with cold were my feet · by frost bound", "mode": "word", "words": [{"oe": "calde", "pron": "KALD-eh", "eng": "with cold, by cold", "type": "noun · dat", "accepts": ["cold", "with cold", "by cold"], "note": "Instrumental/dative — the cold does the pinching"}, {"oe": "geþrungen", "pron": "geh-THRUNG-en", "eng": "pinched, pressed, afflicted", "type": "verb · pp", "accepts": ["pinched", "pressed", "afflicted", "squeezed", "oppressed"], "note": "Past participle of geþringan — squeezed, compressed"}, {"oe": "wǣron", "pron": "WAH-ron", "eng": "were", "type": "verb · past pl", "accepts": ["were"], "note": "Past plural of bēon — they were"}, {"oe": "fēt", "pron": "FEHT", "eng": "feet", "type": "noun · masc · nom pl", "accepts": ["feet"], "note": "Same word. His actual feet. Frozen."}, {"oe": "forste", "pron": "FORST-eh", "eng": "by frost", "type": "noun · masc · dat", "accepts": ["frost", "by frost", "with frost"], "note": "Instrumental — frost as the binding agent"}, {"oe": "gebunden", "pron": "geh-BUND-en", "eng": "bound, fettered", "type": "verb · pp", "accepts": ["bound", "fettered", "tied", "fastened"], "note": "Past participle of bindan — the frost BINDS his feet. He is prisoner of the cold."}], "dive": "<span class='gi'>Forste gebunden</span> — bound by frost. The Wanderer's exile is social. The Seafarer's exile is physical. His feet are literally frozen to the deck. <span class='gi'>Gebunden</span> — the same binding verb from the ferðloca passage. There the spirit is bound. Here the feet are."}, {"s": 2, "oe": "caldum clommum · þǣr þā ceare seofedun", "pron": "KALD-um KLOM-um · THÆHR thah KEHR-eh SEH-of-ed-un", "eng": "with cold chains · where then cares sighed", "mode": "sentence", "dive": "<span class='gi'>Caldum clommum</span> — cold chains. The frost is literal shackles. And then: <span class='gi'>ceare seofedun</span> — cares sighed. The sorrows themselves sigh. Emotion as something alive that makes sound around him."}, {"s": 3, "st": "No One Knows", "oe": "hāt ymb heortan · hungor innan slāt", "pron": "HAHT oomb HEORT-an · HUNG-or IN-an SLAHT", "eng": "hot around the heart · hunger within tore", "mode": "word", "words": [{"oe": "hāt", "pron": "HAHT", "eng": "hot, burning", "type": "adjective", "accepts": ["hot", "burning", "heated"], "note": "The heart is hot while the feet are frozen. The body at war with itself."}, {"oe": "ymb", "pron": "OOMB", "eng": "around, about", "type": "preposition", "accepts": ["around", "about", "surrounding"], "note": "Spatial — the heat surrounds the heart"}, {"oe": "heortan", "pron": "HEORT-an", "eng": "heart", "type": "noun · fem · acc", "accepts": ["heart", "the heart"], "note": "The heart is hot. The feet are bound. Extreme contrast."}, {"oe": "hungor", "pron": "HUNG-or", "eng": "hunger", "type": "noun · masc", "accepts": ["hunger", "famine", "starvation"], "note": "Same word. Physical hunger on the sea."}, {"oe": "innan", "pron": "IN-an", "eng": "within, inside", "type": "adverb", "accepts": ["within", "inside", "from within"], "note": "The hunger works from inside — it tears outward"}, {"oe": "slāt", "pron": "SLAHT", "eng": "tore, ripped, rent", "type": "verb · past · 3sg", "accepts": ["tore", "ripped", "rent", "slashed", "cut"], "note": "From slītan — to tear. Hunger tears his insides. Violent."}], "dive": "Hot heart, frozen feet, hunger tearing from within. Three zones of the body in three different agonies simultaneously. <span class='gi'>Slāt</span> — tore. Hunger is not a dull ache. It tears."}, {"s": 3, "oe": "mereswerges mōd · þæt sē mon ne wāt", "pron": "MEH-reh-SWERG-es MOHD · thæt seh MON neh WAHT", "eng": "the sea-weary one's mind · that the man not knows", "mode": "sentence", "dive": "<span class='gi'>Sē mon ne wāt</span> — the man does not know. The land-person. The one who hasn't suffered this. A division between those who have been to sea and those who haven't. Experience as a wall."}, {"s": 3, "oe": "þe him on foldan fægrost limpeð", "pron": "theh him on FOLD-an FÆHG-rost LIMP-eth", "eng": "for whom on land most fairly it goes", "mode": "sentence", "dive": "The person on land for whom things go well — <span class='gi'>fægrost limpeð</span> — most fairly happens. This person cannot understand. Comfort is its own blindness."}, {"s": 3, "oe": "hū ic earm-cearig · īscealdne sǣ", "pron": "hoo itch EARM-keh-ah-rig · EES-cheahld-neh SAE", "eng": "how I wretched-sorrowful · the ice-cold sea", "mode": "word", "words": [{"oe": "earm-cearig", "pron": "EARM-keh-ah-rig", "eng": "wretched-sorrowful, miserably anxious", "type": "adj · compound", "accepts": ["wretched-sorrowful", "wretched", "miserable", "wretchedly anxious"], "note": "earm (wretched/poor) + cearig (full of care) — compound misery"}, {"oe": "īscealdne", "pron": "EES-cheahld-neh", "eng": "ice-cold", "type": "adj · compound · acc", "accepts": ["ice-cold", "ice cold", "freezing", "icy"], "note": "īs (ice) + ceald (cold) — compare hrīmcealde in the Wanderer. Different frost, same sea."}, {"oe": "sǣ", "pron": "SAE", "eng": "sea", "type": "noun · fem · acc", "accepts": ["sea", "ocean"], "note": "Her again. The feminine sea."}], "dive": "<span class='gi'>Earm-cearig</span> — wretch-care. Doubles the misery. <span class='gi'>Īscealdne sǣ</span> echoes the Wanderer's <span class='gi'>hrīmcealde sǣ</span>. Same sea, different frost-word. The poems know each other."}, {"s": 3, "oe": "winter wunade wræccan lāstum", "pron": "WINT-er WOON-ah-deh WRETCH-an LAHST-um", "eng": "winter dwelt-in on exile's tracks", "mode": "word", "words": [{"oe": "winter", "pron": "WINT-er", "eng": "winter", "type": "noun · masc", "accepts": ["winter"], "note": "Same word. The season of endurance."}, {"oe": "wunade", "pron": "WOON-ah-deh", "eng": "dwelt, inhabited, lived in", "type": "verb · past · 1sg", "accepts": ["dwelt", "lived", "inhabited", "dwelt in", "resided"], "note": "From wunian — to dwell. He LIVED in winter. Not passed through it."}, {"oe": "wræccan", "pron": "WRETCH-an", "eng": "exile's, of the exile", "type": "noun · gen", "accepts": ["exile's", "of the exile", "of the wretch"], "note": "Genitive of wræcca — the exile. Same word as in the Wanderer."}, {"oe": "lāstum", "pron": "LAHST-um", "eng": "on tracks, in footsteps", "type": "noun · masc · dat pl", "accepts": ["tracks", "footsteps", "paths", "on tracks"], "note": "Dative plural of lāst — the same exile-tracks. Wræclāstas."}], "dive": "<span class='gi'>Wræccan lāstum</span> — on exile's tracks. The Wanderer's <span class='gi'>wræclāstas</span> returns. The same paths. The same footprints. Two poems sharing one road."}, {"s": 4, "st": "The Cuckoo Calls", "oe": "Bearwas blōstmum nimað · byrig fægriað", "pron": "BEHR-was BLOHST-mum NIM-ath · BOOR-ig FÆHG-ree-ath", "eng": "Groves take on blossoms · towns grow fair", "mode": "sentence", "dive": "Spring arrives on land. <span class='gi'>Bearwas</span> (groves) take <span class='gi'>blōstmum</span> (blossoms). <span class='gi'>Byrig</span> (towns) grow fair. Beautiful — and it makes everything worse. The beauty of land sharpens the call to leave it."}, {"s": 4, "oe": "wongas wlitigað · woruld onetteð", "pron": "WONG-as WLIT-ig-ath · WOR-uld ON-et-eth", "eng": "plains grow beautiful · the world hastens", "mode": "sentence", "dive": "<span class='gi'>Woruld onetteð</span> — the world hastens. Time speeds up in spring. Everything is urgent. The same urgency that drives the cuckoo's call drives the seafarer back to the sea."}, {"s": 4, "oe": "Ealle þā gemoniað mōdes fusne", "pron": "EAHL-eh thah geh-MON-ee-ath MOHD-es FOOS-neh", "eng": "All these things urge the eager one of spirit", "mode": "sentence", "dive": "Everything — the blossoms, the beauty, the hastening world — <span class='gi'>gemoniað</span> (urges, admonishes) the one who is <span class='gi'>fusne</span> — eager, ready to go, restless. The beauty pushes him away from land."}, {"s": 4, "oe": "sefan tō sīþe · þām þe swā þenceð", "pron": "SEF-an toh SEETH-eh · THAHM theh swah THENCH-eth", "eng": "the spirit to journey · for him who so thinks", "mode": "word", "words": [{"oe": "sefan", "pron": "SEF-an", "eng": "spirit, mind, heart", "type": "noun · masc · acc", "accepts": ["spirit", "mind", "heart", "inner self", "soul"], "note": "The deep inner self — what moves toward the sea"}, {"oe": "sīþe", "pron": "SEETH-eh", "eng": "journey, voyage", "type": "noun · masc · dat", "accepts": ["journey", "voyage", "trip", "expedition"], "note": "The significant experience — not casual travel"}, {"oe": "þām", "pron": "THAHM", "eng": "for him, to him", "type": "pronoun · dat", "accepts": ["him", "for him", "to him", "the one"], "note": "Dative — for the one who thinks this way"}, {"oe": "þenceð", "pron": "THENCH-eth", "eng": "thinks, intends", "type": "verb · 3sg", "accepts": ["thinks", "intends", "considers", "purposes"], "note": "Not idle thought — deliberate intention"}], "dive": "<span class='gi'>Sefan tō sīþe</span> — the spirit toward the journey. The inner self moves before the body does. The decision to go to sea happens in the <span class='gi'>sefa</span> — the same deep word the Wanderer uses for the interior that cannot be spoken."}, {"s": 4, "oe": "on flodwegas feor gewītan", "pron": "on FLOD-weh-gas FEH-or geh-WEE-tan", "eng": "on flood-ways far to depart", "mode": "word", "words": [{"oe": "flodwegas", "pron": "FLOD-weh-gas", "eng": "flood-ways, sea-roads", "type": "noun · masc · acc pl", "accepts": ["flood-ways", "flood ways", "sea-roads", "sea roads", "ocean paths"], "note": "flōd (flood/sea) + weg (way) — another kenning for the sea as path. Compare lagulād."}, {"oe": "feor", "pron": "FEH-or", "eng": "far, far away", "type": "adverb", "accepts": ["far", "far away", "distant", "afar"], "note": "The distance word. Not a short trip."}, {"oe": "gewītan", "pron": "geh-WEE-tan", "eng": "to depart, to go away", "type": "verb · inf", "accepts": ["depart", "to depart", "go", "leave", "go away"], "note": "The Wanderer uses gewāt for time departing. Here the seafarer departs. Same verb, reversed direction."}], "dive": "<span class='gi'>Flodwegas</span> — flood-ways. Third kenning for the sea-as-road (after lagulād and the Wanderer's waþema gebind). <span class='gi'>Gewītan</span> — the same verb used for time departing in the Wanderer. There, time leaves. Here, the man leaves. The verb connects loss and longing."}, {"s": 4, "oe": "Swylce gēac monað geōmran reorde", "pron": "SWOOL-cheh GEH-ahk MON-ath GEH-om-ran REH-ord-eh", "eng": "Likewise the cuckoo urges with mournful voice", "mode": "word", "words": [{"oe": "swylce", "pron": "SWOOL-cheh", "eng": "likewise, also, similarly", "type": "adverb", "accepts": ["likewise", "also", "similarly", "so too"], "note": "Connector — and also this"}, {"oe": "gēac", "pron": "GEH-ahk", "eng": "cuckoo", "type": "noun · masc", "accepts": ["cuckoo"], "note": "The bird that calls in spring. Its voice is the voice of departure."}, {"oe": "monað", "pron": "MON-ath", "eng": "urges, admonishes, calls", "type": "verb · 3sg", "accepts": ["urges", "admonishes", "calls", "warns", "exhorts"], "note": "From manian — to urge, to remind. The cuckoo reminds him."}, {"oe": "geōmran", "pron": "GEH-om-ran", "eng": "mournful, sad, sorrowful", "type": "adj · dat", "accepts": ["mournful", "sad", "sorrowful", "lamenting"], "note": "The cuckoo's voice is sad. The call to the sea is not joyful."}, {"oe": "reorde", "pron": "REH-ord-eh", "eng": "voice, speech", "type": "noun · fem · dat", "accepts": ["voice", "speech", "call", "sound"], "note": "Instrumental/dative — with mournful voice"}], "dive": "<span class='gi'>Gēac monað geōmran reorde</span> — the cuckoo urges with mournful voice. The most famous image in the poem. The cuckoo is the bird of spring and of departure. Its call is beautiful and sad at once — like the call of the sea itself."}, {"s": 4, "oe": "singeð sumeres weard · sorg tō heortan", "pron": "SING-eth SOO-mer-es WEHRD · SORG toh HEORT-an", "eng": "sings summer's guardian · sorrow to the heart", "mode": "word", "words": [{"oe": "singeð", "pron": "SING-eth", "eng": "sings", "type": "verb · 3sg", "accepts": ["sings"], "note": "Same word. The bird sings."}, {"oe": "sumeres", "pron": "SOO-mer-es", "eng": "of summer", "type": "noun · masc · gen", "accepts": ["summer's", "of summer"], "note": "Genitive — summer's guardian/herald"}, {"oe": "weard", "pron": "WEHRD", "eng": "guardian, watchman, herald", "type": "noun · masc", "accepts": ["guardian", "watchman", "herald", "keeper", "warden"], "note": "The cuckoo guards summer — announces its arrival"}, {"oe": "sorg", "pron": "SORG", "eng": "sorrow", "type": "noun · fem · acc", "accepts": ["sorrow", "grief", "care"], "note": "The cuckoo brings sorrow. Beauty and grief in one song."}, {"oe": "heortan", "pron": "HEORT-an", "eng": "to the heart", "type": "noun · fem · dat", "accepts": ["heart", "to the heart", "the heart"], "note": "Dative — the sorrow goes TO the heart. Targeted."}], "dive": "<span class='gi'>Sumeres weard</span> — summer's guardian. The cuckoo heralds summer. And what does summer's herald bring? <span class='gi'>Sorg tō heortan</span> — sorrow to the heart. Beauty announces grief. The call to the sea is not freedom. It is compulsion wrapped in birdsong."}, {"s": 5, "st": "The Spirit Flies Ahead", "oe": "Forþon nū mīn hyge hweorfeð ofer hreþerlocan", "pron": "for-THON noo meen HOODGE-eh HWEORF-eth OF-er HRETH-er-LOK-an", "eng": "Therefore now my thought turns beyond the breast-enclosure", "mode": "word", "words": [{"oe": "forþon", "pron": "for-THON", "eng": "therefore, because", "type": "conjunction", "accepts": ["therefore", "because", "for that reason"], "note": "Causal — because of everything he's described"}, {"oe": "hyge", "pron": "HOODGE-eh", "eng": "thought, mind, intention", "type": "noun · masc", "accepts": ["thought", "mind", "intention", "spirit"], "note": "Active thinking — the mind as agent"}, {"oe": "hweorfeð", "pron": "HWEORF-eth", "eng": "turns, moves, wanders", "type": "verb · 3sg", "accepts": ["turns", "moves", "wanders", "ranges"], "note": "Same verb from the Wanderer — geondhweorfeð. The mind moves through."}, {"oe": "ofer", "pron": "OF-er", "eng": "over, beyond", "type": "preposition", "accepts": ["over", "beyond", "across"], "note": "The thought goes BEYOND the body"}, {"oe": "hreþerlocan", "pron": "HRETH-er-LOK-an", "eng": "breast-enclosure, heart-locker", "type": "noun · masc · acc", "accepts": ["breast-enclosure", "heart-locker", "chest", "breast"], "note": "hreþer (breast) + loca (enclosure) — FOURTH kenning for the locked heart across both poems"}], "dive": "<span class='gi'>Hreþerlocan</span> — breast-enclosure. The fourth kenning for the locked interior (after ferðloca, hordcofa, brēostcofa). But here the thought ESCAPES it. <span class='gi'>Hweorfeð ofer</span> — turns beyond. The Wanderer binds the ferðloca shut. The Seafarer's mind breaks free."}, {"s": 5, "oe": "mīn mōdsefa mid mereflōde", "pron": "meen MOHD-sef-ah mid MEH-reh-FLOH-deh", "eng": "my mind-spirit with the sea-flood", "mode": "sentence", "dive": "<span class='gi'>Mōdsefa</span> returns — the same deep-self word from the Wanderer, where it had no one to speak to. Here it travels with the sea-flood. The interior flies outward."}, {"s": 5, "oe": "ofer hwæles ēþel · hweorfeð wīde", "pron": "OF-er HWAL-es ETH-el · HWEORF-eth WEE-deh", "eng": "over the whale's homeland · it turns widely", "mode": "word", "words": [{"oe": "hwæles", "pron": "HWAL-es", "eng": "of the whale", "type": "noun · masc · gen", "accepts": ["whale's", "of the whale"], "note": "Genitive — the sea belongs to the whale"}, {"oe": "ēþel", "pron": "ETH-el", "eng": "homeland, native land, estate", "type": "noun · masc", "accepts": ["homeland", "native land", "home", "country", "estate"], "note": "The sea is the whale's ēþel — its home. What the exile has lost on land, the whale has in the ocean."}, {"oe": "wīde", "pron": "WEE-deh", "eng": "widely, far and wide", "type": "adverb", "accepts": ["widely", "far and wide", "far", "broadly"], "note": "The spirit ranges without limit"}], "dive": "<span class='gi'>Hwæles ēþel</span> — the whale's homeland. One of the great kennings. The sea is not empty. It is the whale's estate, the whale's native ground. The exile has no ēþel. The whale does. The spirit flies over someone else's home."}, {"s": 5, "oe": "eorþan scēatas · cymeð eft tō mē", "pron": "EOR-than SHEH-ah-tas · KOOM-eth EFT toh MEH", "eng": "earth's regions · comes back to me", "mode": "word", "words": [{"oe": "eorþan", "pron": "EOR-than", "eng": "of earth, earth's", "type": "noun · fem · gen", "accepts": ["earth's", "of earth", "of the earth"], "note": "The spirit ranges over earth's surfaces"}, {"oe": "scēatas", "pron": "SHEH-ah-tas", "eng": "regions, surfaces, corners", "type": "noun · masc · acc pl", "accepts": ["regions", "surfaces", "corners", "expanses"], "note": "The broad flat surfaces of the world"}, {"oe": "cymeð", "pron": "KOOM-eth", "eng": "comes, returns", "type": "verb · 3sg", "accepts": ["comes", "returns", "comes back"], "note": "From cuman — it comes back. The spirit returns."}, {"oe": "eft", "pron": "EFT", "eng": "again, back", "type": "adverb", "accepts": ["again", "back", "once more"], "note": "Again — it always returns"}, {"oe": "tō mē", "pron": "toh MEH", "eng": "to me", "type": "prep + pronoun", "accepts": ["to me", "back to me"], "note": "The spirit comes back to the body. It has to."}], "dive": "<span class='gi'>Cymeð eft tō mē</span> — comes back to me. The spirit flies out over the whale's homeland, ranges across the earth, and returns to the body. It cannot stay free. Like the Wanderer's companions who swim away — the spirit must come back to the isolation it tried to escape."}, {"s": 5, "oe": "gīfre and grǣdig · gielleð ānfloga", "pron": "GIF-reh and GRAH-dig · GEEL-eth AHN-floh-gah", "eng": "greedy and ravenous · screams the lone-flier", "mode": "word", "words": [{"oe": "gīfre", "pron": "GIF-reh", "eng": "greedy, eager, ravenous", "type": "adjective", "accepts": ["greedy", "eager", "ravenous", "voracious"], "note": "The returning spirit is hungry — it wants more"}, {"oe": "grǣdig", "pron": "GRAH-dig", "eng": "greedy, covetous", "type": "adjective", "accepts": ["greedy", "covetous", "ravenous", "hungry"], "note": "Root of modern 'greedy'. Doubled with gīfre for emphasis."}, {"oe": "gielleð", "pron": "GEEL-eth", "eng": "screams, yells, cries out", "type": "verb · 3sg", "accepts": ["screams", "yells", "cries", "shrieks", "calls"], "note": "From giellan — to yell. The spirit SCREAMS. Not whispers. Screams."}, {"oe": "ānfloga", "pron": "AHN-floh-gah", "eng": "lone-flier, solitary one", "type": "noun · masc", "accepts": ["lone-flier", "lone flier", "solitary flier", "solitary one"], "note": "ān (one/lone) + floga (flier) — the spirit as a single bird ranging alone. One of the most debated words in OE scholarship."}], "dive": "<span class='gi'>Ānfloga</span> — the lone-flier. Nobody agrees what this is. The spirit-bird? A cuckoo? The soul itself ranging ahead of the body? Whatever it is, it's <span class='gi'>gīfre and grǣdig</span> — ravenous — and it screams. This is not serene transcendence. This is the soul tearing itself from the body in hunger."}, {"s": 5, "oe": "hweteð on hwælweg hreþer unwearnum", "pron": "HWET-eth on HWÆL-weg HRETH-er UN-wehr-num", "eng": "urges onto whale-road the heart irresistibly", "mode": "word", "words": [{"oe": "hweteð", "pron": "HWET-eth", "eng": "urges, incites, whets", "type": "verb · 3sg", "accepts": ["urges", "incites", "whets", "drives", "sharpens"], "note": "Root of 'whet' — to sharpen. The spirit sharpens the desire."}, {"oe": "hwælweg", "pron": "HWÆL-weg", "eng": "whale-road, sea", "type": "noun · masc · acc", "accepts": ["whale-road", "whale road", "sea", "ocean"], "note": "The most famous kenning in OE. The sea as the road whales travel."}, {"oe": "hreþer", "pron": "HRETH-er", "eng": "heart, breast, spirit", "type": "noun · masc · acc", "accepts": ["heart", "breast", "spirit", "chest"], "note": "The physical chest — what the spirit urges toward the sea"}, {"oe": "unwearnum", "pron": "UN-wehr-num", "eng": "irresistibly, without restraint", "type": "adverb", "accepts": ["irresistibly", "without restraint", "powerfully", "unstoppably"], "note": "un- (without) + wearnum (resistance) — nothing can stop this"}], "dive": "<span class='gi'>Hwælweg</span> — whale-road. The kenning. The sea is not water — it's a road, and the whales are its traffic. <span class='gi'>Unwearnum</span> — irresistibly. The pull to the sea cannot be resisted. The Wanderer's ferðloca is bound shut. The Seafarer's is ripped open."}]}, {"id": "galdor", "title": "Galdorcræft", "short": "ᚷ", "audio": "https://www.oldenglishaerobics.net/", "lines": [{"s": 1, "st": "Sīþgaldor · Journey Charm", "oe": "Ic mē on þisse gyrde belūce", "pron": "ITCH meh on THISS-eh YOORD-eh beh-LOO-cheh", "eng": "I enclose myself in this rod", "mode": "word", "words": [{"oe": "ic", "pron": "ITCH", "eng": "I", "type": "pronoun · nom", "accepts": ["I"], "note": "First person. The speaker acts on themselves."}, {"oe": "mē", "pron": "MEH", "eng": "myself, me", "type": "pronoun · acc", "accepts": ["myself", "me"], "note": "Reflexive — the action circles back to the self"}, {"oe": "on", "pron": "ON", "eng": "in, on, into", "type": "preposition", "accepts": ["in", "on", "into"], "note": "Preposition of enclosure here — INTO the rod's protection"}, {"oe": "þisse", "pron": "THISS-eh", "eng": "this", "type": "demonstrative · dat fem", "accepts": ["this"], "note": "Dative feminine agreeing with gyrde"}, {"oe": "gyrde", "pron": "YOORD-eh", "eng": "rod, staff, wand", "type": "noun · fem · dat", "accepts": ["rod", "staff", "wand", "stick", "yard"], "note": "The physical implement. You hold it. Root of 'yard'. The charm requires a thing in the hand."}, {"oe": "belūce", "pron": "beh-LOO-cheh", "eng": "enclose, lock", "type": "verb · 1sg", "accepts": ["enclose", "lock", "shut in", "lock in", "close"], "note": "be- (around) + lūcan (to lock). You lock yourself INSIDE the rod's circle. Same root as ferþloca."}], "dive": "The opening act of the Journey Charm. You hold a staff. You speak. You lock yourself inside its boundary. <span class='gi'>Belūce</span> shares its root with <span class='gi'>ferþloca</span> — spirit-locker. The rod becomes a portable enclosure."}, {"s": 1, "oe": "and on Godes helde bebeode", "pron": "and on GOD-es HELD-eh beh-BEH-od-eh", "eng": "and into God's protection commend myself", "mode": "word", "words": [{"oe": "and", "pron": "AND", "eng": "and", "type": "conjunction", "accepts": ["and"], "note": "Connective"}, {"oe": "Godes", "pron": "GOD-es", "eng": "of God, God's", "type": "noun · masc · gen", "accepts": ["God's", "of God"], "note": "Christian overlay. Read through it to what was there before."}, {"oe": "helde", "pron": "HELD-eh", "eng": "protection, keeping, guard", "type": "noun · fem · dat", "accepts": ["protection", "keeping", "guard", "hold", "grace"], "note": "From healdan (to hold). The protection is a holding. You are held."}, {"oe": "bebeode", "pron": "beh-BEH-od-eh", "eng": "commend, entrust", "type": "verb · 1sg", "accepts": ["commend", "entrust", "commit", "give over"], "note": "be- + bēodan (to command/offer). Active surrender, not passive hope."}], "dive": "<span class='gi'>Helde</span> from healdan — to hold. The protection is not a shield but a holding. <span class='gi'>Bebeode</span> — you actively commend yourself. The charm is not a prayer. It is a transaction."}, {"s": 1, "oe": "wið þone sāran stice · wið þone sāran slege", "pron": "WITH THON-eh SAH-ran STITCH-eh · WITH THON-eh SAH-ran SLEH-yeh", "eng": "against the sore stitch · against the sore blow", "mode": "word", "words": [{"oe": "wið", "pron": "WITH", "eng": "against, towards", "type": "preposition", "accepts": ["against", "towards", "with"], "note": "Protective — against harm. Root of 'with' but OE meaning is adversarial."}, {"oe": "þone", "pron": "THON-eh", "eng": "the", "type": "demonstrative · acc masc", "accepts": ["the", "that"], "note": "Accusative masculine — pointing at the specific threat"}, {"oe": "sāran", "pron": "SAH-ran", "eng": "sore, painful", "type": "adj · acc", "accepts": ["sore", "painful", "bitter", "grievous"], "note": "Root of 'sore'. The pain is named directly."}, {"oe": "stice", "pron": "STITCH-eh", "eng": "stitch, stab, piercing", "type": "noun · masc · acc", "accepts": ["stitch", "stab", "piercing", "prick", "sting"], "note": "A sudden pain understood as something entering the body."}, {"oe": "slege", "pron": "SLEH-yeh", "eng": "blow, strike", "type": "noun · masc · acc", "accepts": ["blow", "strike", "hit", "stroke"], "note": "From slēan (to strike). The blow that comes without warning."}], "dive": "The charm names what it protects against. <span class='gi'>Stice</span> — stitch. A sudden pain is not metaphorical: something has entered. <span class='gi'>Slege</span> — blow. The charm addresses the cause, not the symptom."}, {"s": 1, "oe": "wið þone grymman gryre", "pron": "WITH THON-eh GROOM-man GROO-reh", "eng": "against the fierce terror", "mode": "word", "words": [{"oe": "grymman", "pron": "GROOM-man", "eng": "fierce, grim, cruel", "type": "adj · acc", "accepts": ["fierce", "grim", "cruel", "terrible"], "note": "Root of 'grim'. The alliteration with gryre is deliberate."}, {"oe": "gryre", "pron": "GROO-reh", "eng": "terror, horror, dread", "type": "noun · masc · acc", "accepts": ["terror", "horror", "dread", "fear"], "note": "The specific dread that rises in the chest before dawn."}], "dive": "<span class='gi'>Grymman gryre</span> — the g-r alliteration is the growl of the thing itself. The charm names the terror to gain power over it. What you name, you can address. What you address, you can command."}, {"s": 1, "oe": "and wið ǣlcne ondsǣtan þe on lond fare", "pron": "and WITH ÆLK-neh OND-sæ-tan theh on LOND FAH-reh", "eng": "and against every enemy that into the land comes", "mode": "sentence", "dive": "The final line of the protection sequence. <span class='gi'>Ondsǣtan</span> — enemy, adversary. The charm covers everything: stitch, blow, terror, and every adversary that enters the land. This is walking the bounds."}, {"s": 2, "st": "Æcerbot · Field Remedy", "oe": "Erce, Erce, Erce · eorþan mōdor", "pron": "EAR-cheh EAR-cheh EAR-cheh · EOR-than MOH-dor", "eng": "Erce, Erce, Erce · mother of earth", "mode": "word", "words": [{"oe": "Erce", "pron": "EAR-cheh", "eng": "Erce", "type": "name · unknown", "accepts": ["Erce", "erce"], "note": "Nobody knows who she is. Triple invocation. She survived because the scribes could not erase what they did not understand."}, {"oe": "eorþan", "pron": "EOR-than", "eng": "of earth, earth's", "type": "noun · fem · gen", "accepts": ["of earth", "earth's", "of the earth"], "note": "Genitive — earth belongs to her, or she to earth"}, {"oe": "mōdor", "pron": "MOH-dor", "eng": "mother", "type": "noun · fem", "accepts": ["mother"], "note": "Same word, same meaning, a thousand years."}], "dive": "The triple invocation. <span class='gi'>Erce</span> survives in a single manuscript. Mother of earth — not a metaphor. A direct address to a named power. The charm instructs: face east when you speak this."}, {"s": 2, "oe": "geunne þē se ālwalda · ēce drihten", "pron": "geh-OON-neh THEH seh AHL-wal-dah · EH-cheh DRICH-ten", "eng": "may the all-ruler grant you · eternal lord", "mode": "word", "words": [{"oe": "geunne", "pron": "geh-OON-neh", "eng": "may grant, grant", "type": "verb · subj", "accepts": ["grant", "may grant"], "note": "Subjunctive — a wish, not a statement. The optative mood of operative speech."}, {"oe": "þē", "pron": "THEH", "eng": "you, to you", "type": "pronoun · dat", "accepts": ["you", "to you", "thee"], "note": "Speaking to the earth directly. Second person."}, {"oe": "ālwalda", "pron": "AHL-wal-dah", "eng": "all-ruler, almighty", "type": "noun · masc", "accepts": ["all-ruler", "almighty", "all-wielder"], "note": "Christian term over whatever was there before."}, {"oe": "ēce", "pron": "EH-cheh", "eng": "eternal, everlasting", "type": "adjective", "accepts": ["eternal", "everlasting", "forever"], "note": "Modifies drihten"}, {"oe": "drihten", "pron": "DRICH-ten", "eng": "lord", "type": "noun · masc", "accepts": ["lord", "master", "ruler"], "note": "From dryht (warband) — a lord who commands a retinue."}], "dive": "The Christian layer over the pagan substrate. <span class='gi'>Ālwalda</span> and <span class='gi'>drihten</span> are warrior-lord titles. The structure — speaking to the earth, asking a higher power to grant what the earth needs — predates the names."}, {"s": 2, "oe": "æcera wexendra · and wīdiendra", "pron": "AK-er-ah WECKS-end-rah · and WEE-dee-end-rah", "eng": "of acres waxing · and widening", "mode": "word", "words": [{"oe": "æcera", "pron": "AK-er-ah", "eng": "of acres, of fields", "type": "noun · gen pl", "accepts": ["of acres", "acres", "fields", "of fields"], "note": "Root of 'acre'. What is wished for."}, {"oe": "wexendra", "pron": "WECKS-end-rah", "eng": "waxing, growing", "type": "participle · gen pl", "accepts": ["waxing", "growing", "increasing"], "note": "Root of 'wax' (to grow). The growing is ongoing."}, {"oe": "wīdiendra", "pron": "WEE-dee-end-rah", "eng": "widening, spreading", "type": "participle · gen pl", "accepts": ["widening", "spreading", "expanding"], "note": "Root of 'widen'. The land spreads outward."}], "dive": "Two present participles: <span class='gi'>wexendra · wīdiendra</span>. The acres are actively waxing, actively widening. The charm asks for fields in the act of growing. The process, not the product."}, {"s": 2, "oe": "Hāl wes þū, folde · frā mōdor", "pron": "HAHL wes THOO FOLD-eh · FRAH MOH-dor", "eng": "Be whole, earth · generous mother", "mode": "word", "words": [{"oe": "hāl", "pron": "HAHL", "eng": "whole, hale, healthy", "type": "adjective", "accepts": ["whole", "hale", "healthy", "sound"], "note": "Root of 'whole', 'hale', 'health', 'holy'. All the same word. To be whole is to be holy."}, {"oe": "wes", "pron": "WES", "eng": "be", "type": "verb · imperative", "accepts": ["be"], "note": "Imperative. A command. You TELL the earth to be whole."}, {"oe": "þū", "pron": "THOO", "eng": "you", "type": "pronoun · nom", "accepts": ["you", "thou"], "note": "Speaking to the earth as a person. Intimate."}, {"oe": "folde", "pron": "FOLD-eh", "eng": "earth, ground, land", "type": "noun · fem · voc", "accepts": ["earth", "ground", "land", "soil", "fold"], "note": "Vocative — directly addressed."}, {"oe": "frā", "pron": "FRAH", "eng": "generous, bountiful", "type": "adjective", "accepts": ["generous", "bountiful", "liberal", "noble"], "note": "You name what she is so she can be it."}, {"oe": "mōdor", "pron": "MOH-dor", "eng": "mother", "type": "noun · fem · voc", "accepts": ["mother"], "note": "The earth addressed as mother."}], "dive": "<span class='gi'>Hāl wes þū</span> — be whole. The root connects whole, hale, health, and holy. <span class='gi'>Folde</span> in the vocative — you speak TO the ground beneath your feet. The Æcerbot instructs: kneel when you say this."}, {"s": 3, "st": "Nigon Wyrta Galdor · Nine Herbs Charm", "oe": "Gemyne ðū, mugcwyrt · hwæt þū āmeldodest", "pron": "yeh-MOON-eh THOO MOOJ-kwoort · HWÆT thoo ah-MEL-dod-est", "eng": "Remember, mugwort · what you proclaimed", "mode": "word", "words": [{"oe": "gemyne", "pron": "yeh-MOON-eh", "eng": "remember", "type": "verb · imperative", "accepts": ["remember", "recall", "be mindful"], "note": "You are commanding the plant to remember. Not asking."}, {"oe": "ðū", "pron": "THOO", "eng": "you", "type": "pronoun · nom", "accepts": ["you", "thou"], "note": "Speaking to the plant directly."}, {"oe": "mugcwyrt", "pron": "MOOJ-kwoort", "eng": "mugwort", "type": "noun · fem", "accepts": ["mugwort"], "note": "Artemisia vulgaris. First of nine. Still grows on every roadside."}, {"oe": "hwæt", "pron": "HWÆT", "eng": "what", "type": "pronoun", "accepts": ["what"], "note": "Same hwæt that opens Beowulf."}, {"oe": "āmeldodest", "pron": "ah-MEL-dod-est", "eng": "proclaimed, made known", "type": "verb · 2sg past", "accepts": ["proclaimed", "made known", "announced", "declared"], "note": "The plant once declared something. The charm calls it back to that declaration."}], "dive": "You speak to mugwort and command it to remember its own power. <span class='gi'>Gemyne</span> — same root as gemyndig (mindful). But here directed outward: you make the plant mindful of itself. The operative assumption: things have declared natures, and can be recalled to them."}, {"s": 3, "oe": "Wyrm cōm snīcan · toslāt hē mann", "pron": "WOORM KOHM SNEE-kan · toh-SLAHT heh MANN", "eng": "A serpent came creeping · it tore apart a man", "mode": "word", "words": [{"oe": "wyrm", "pron": "WOORM", "eng": "serpent, dragon, worm", "type": "noun · masc", "accepts": ["serpent", "dragon", "worm", "wyrm", "snake"], "note": "The wyrm. The adversary in the charm."}, {"oe": "cōm", "pron": "KOHM", "eng": "came", "type": "verb · past 3sg", "accepts": ["came"], "note": "Past of cuman. It came."}, {"oe": "snīcan", "pron": "SNEE-kan", "eng": "to creep, to crawl", "type": "verb · inf", "accepts": ["creep", "crawl", "to creep", "to crawl", "sneak", "to sneak"], "note": "Root of 'sneak'. Surreptitious movement."}, {"oe": "toslāt", "pron": "toh-SLAHT", "eng": "tore apart, split", "type": "verb · past 3sg", "accepts": ["tore apart", "split", "ripped", "tore", "destroyed"], "note": "to- (apart) + slāt. Total destruction."}, {"oe": "mann", "pron": "MANN", "eng": "a person, a man", "type": "noun · masc", "accepts": ["man", "person", "a man", "a person"], "note": "Generic — any person."}], "dive": "<span class='gi'>Wyrm cōm snīcan</span> — the serpent came creeping. <span class='gi'>Snīcan</span> — root of sneak. <span class='gi'>Toslāt</span> — the to- prefix means complete destruction. The charm names the worst first."}, {"s": 3, "oe": "Ðā genam Wōden nigon wuldortānas", "pron": "THAH yeh-NAM WOH-den NIG-on WOOL-dor-TAH-nas", "eng": "Then Woden took nine glory-twigs", "mode": "word", "words": [{"oe": "ðā", "pron": "THAH", "eng": "then", "type": "adverb", "accepts": ["then", "at that time"], "note": "The pivot. After the wyrm's attack — then Woden acts."}, {"oe": "genam", "pron": "yeh-NAM", "eng": "took, seized", "type": "verb · past 3sg", "accepts": ["took", "seized", "grasped"], "note": "ge- = completed action. Decisive."}, {"oe": "Wōden", "pron": "WOH-den", "eng": "Woden, Odin", "type": "name", "accepts": ["Woden", "Odin", "Wodan"], "note": "Named in a Christian manuscript. The monks left him in because the charm would not work without him."}, {"oe": "nigon", "pron": "NIG-on", "eng": "nine", "type": "numeral", "accepts": ["nine", "9"], "note": "The ritual number throughout the charm."}, {"oe": "wuldortānas", "pron": "WOOL-dor-TAH-nas", "eng": "glory-twigs", "type": "noun · masc · acc pl", "accepts": ["glory-twigs", "glory twigs", "glorious twigs", "wondrous branches"], "note": "wuldor (glory) + tān (twig). Nine branches become nine herbs."}], "dive": "Woden in a Christian manuscript. <span class='gi'>Wuldortānas</span> — glory-twigs. The operative principle: counter with the same number, reversed."}, {"s": 3, "oe": "slōh ðā þā næddran · ðæt hēo on nigon tofleah", "pron": "SLOH thah thah NÆD-ran · thæt HEH-oh on NIG-on toh-FLEH-ah", "eng": "struck then the serpent · so it flew into nine pieces", "mode": "word", "words": [{"oe": "slōh", "pron": "SLOH", "eng": "struck, slew", "type": "verb · past 3sg", "accepts": ["struck", "slew", "hit", "smote"], "note": "Past of slēan. Root of 'slay'. Woden's blow."}, {"oe": "næddran", "pron": "NÆD-ran", "eng": "serpent, adder", "type": "noun · fem · acc", "accepts": ["serpent", "adder", "snake", "viper"], "note": "Root of 'adder' (a nadder > an adder)."}, {"oe": "nigon", "pron": "NIG-on", "eng": "nine", "type": "numeral", "accepts": ["nine", "9"], "note": "Nine herbs, nine twigs, nine pieces."}, {"oe": "tofleah", "pron": "toh-FLEH-ah", "eng": "flew apart, scattered", "type": "verb · past 3sg", "accepts": ["flew apart", "scattered", "flew into pieces", "dispersed"], "note": "to- (apart) + flēon (to fly). Complete dispersal."}], "dive": "The serpent struck into nine pieces. <span class='gi'>Tofleah</span> — flew apart. Each piece becomes a condition the herbs cure. What was one evil broken into manageable parts."}, {"s": 4, "st": "Wið Færstice · Against Elf-Shot", "oe": "Hlude wǣran hȳ · lā hlude", "pron": "HLOOD-eh WÆHR-an HOO · LAH HLOOD-eh", "eng": "Loud were they · lo, loud", "mode": "word", "words": [{"oe": "hlude", "pron": "HLOOD-eh", "eng": "loud, loudly", "type": "adverb", "accepts": ["loud", "loudly"], "note": "The charm opens with sound. The hl- is itself loud in the mouth."}, {"oe": "wǣran", "pron": "WÆHR-an", "eng": "were", "type": "verb · past pl", "accepts": ["were"], "note": "Past plural. They were. Something happened."}, {"oe": "hȳ", "pron": "HOO", "eng": "they", "type": "pronoun · nom pl", "accepts": ["they"], "note": "The mighty women who ride through the air."}, {"oe": "lā", "pron": "LAH", "eng": "lo, oh, indeed", "type": "interjection", "accepts": ["lo", "oh", "indeed", "alas"], "note": "The breath between the two hlude's."}], "dive": "<span class='gi'>Hlude · lā hlude</span> — the repetition IS the charm working. Say it aloud: the hl- forces breath through the mouth like wind."}, {"s": 4, "oe": "ðā hȳ ofer þone hlǣw ridan", "pron": "THAH HOO OH-ver THON-eh HLÆW REE-dan", "eng": "when they over the mound rode", "mode": "word", "words": [{"oe": "ofer", "pron": "OH-ver", "eng": "over, across", "type": "preposition", "accepts": ["over", "across", "above"], "note": "They ride OVER the mound. Airborne."}, {"oe": "hlǣw", "pron": "HLÆW", "eng": "mound, barrow, hill", "type": "noun · masc · acc", "accepts": ["mound", "barrow", "hill", "burial mound"], "note": "Often a burial mound. The riders come from the places of the dead."}, {"oe": "ridan", "pron": "REE-dan", "eng": "to ride, rode", "type": "verb", "accepts": ["ride", "rode", "to ride"], "note": "Root of 'ride'. Through the air over the mound."}], "dive": "They ride over the <span class='gi'>hlǣw</span> — the barrow. The riders come from between worlds. The mound is a threshold."}, {"s": 4, "oe": "Ūt, lytel spere · gif hēr inne sīe", "pron": "OOT LOO-tel SPEH-reh · yif HEHR INN-eh SEE-eh", "eng": "Out, little spear · if here within it be", "mode": "word", "words": [{"oe": "ūt", "pron": "OOT", "eng": "out", "type": "adverb", "accepts": ["out"], "note": "One syllable. The operative core of the whole charm."}, {"oe": "lytel", "pron": "LOO-tel", "eng": "little, small", "type": "adjective", "accepts": ["little", "small"], "note": "You diminish the weapon by naming it small."}, {"oe": "spere", "pron": "SPEH-reh", "eng": "spear", "type": "noun · neut", "accepts": ["spear", "dart", "point"], "note": "The pain is a spear. Naming it makes it removable."}, {"oe": "gif", "pron function gs(){try{const s=localStorage.getItem('oe_multi_v2');if(s)return JSON.parse(s)}catch(e){}return is()}
function is(){return{tx:0,cur:{},phase:{},ws:{},done:{}}}
function ss(s){try{localStorage.setItem('oe_multi_v2',JSON.stringify(s))}catch(e){}}
let S=gs(),wi=0,wa=false,wq=[];
if(S.cur===undefined||typeof S.cur==='number'){S=is()}// migrate old state

function T(){return TEXTS[S.tx]}
function LNS(){return T().lines}
function CI(){return S.cur[S.tx]||0}
function setCI(i){S.cur[S.tx]=i;ss(S)}
function pk(){return S.tx+'-'+CI()}
function ph(){return S.phase[pk()]||'start'}
function sp(p){S.phase[pk()]=p;ss(S)}
function ld(){return LNS()[CI()]}
function wsc(o){return S.ws[o]||(S.ws[o]={c:0,a:0})}

function nm(s){return s.toLowerCase().trim().replace(/[^a-z0-9\s\-]/g,'').replace(/\s+/g,' ')}
function chk(i,a){const n=nm(i);if(!n)return false;for(const x of a){const nx=nm(x);if(n===nx)return true;if(nx.includes(n)&&n.length>=3)return true;if(n.includes(nx)&&nx.length>=3)return true;if(nx.length>3&&lv(n,nx)<=2)return true}return false}
function lv(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n]}

const CONN=['þæt','sē','sēo','þā','ac','and','ne','nā','on','in','mid','be','tō','hē','hēo','hit','ic','wē','þē','him','mē','se','ful','his','nū','eft','þonne','swā','sē þe','nis','bið','biþ','nō','þǣr'];

function buildWQ(){const l=ld();if(!l||!l.words)return;wq=[];l.words.forEach(w=>{wq.push(w);if(CONN.includes(w.oe.toLowerCase()))wq.push({...w,_r:1})});wi=0;wa=false}
function hl(line,word){const re=new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i');return line.replace(re,'<span class="hl">$1</span>')}

function rTsel(){
  const el=document.getElementById('tsel');el.innerHTML='';
  TEXTS.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='ttab'+(i===S.tx?' active':'');
    d.textContent=t.short;
    d.onclick=()=>{S.tx=i;wi=0;wa=false;wq=[];ss(S);rAll()};
    el.appendChild(d);
  });
}

function rLP(){
  const el=document.getElementById('lp');el.innerHTML='';
  let lastS=-1;
  LNS().forEach((l,i)=>{
    const p=document.createElement('div');p.className='lpip';
    if(l.s!==lastS){p.classList.add('stanza-start');lastS=l.s}
    const k=S.tx+'-'+i;
    if(i===CI())p.classList.add('current');
    else if(S.phase[k]==='done')p.classList.add('done');
    p.onclick=()=>{setCI(i);wi=0;wa=false;if(!S.phase[S.tx+'-'+i])S.phase[S.tx+'-'+i]='start';ss(S);rAll()};
    el.appendChild(p);
  });
}

function rMain(){
  const m=document.getElementById('main');
  const l=ld();if(!l){m.innerHTML='<p style="text-align:center;color:var(--text-dim)">No lines yet for this text.</p>';return}
  const p=ph();
  let stH='';
  if(CI()===0||LNS()[CI()-1].s!==l.s){
    stH=`<div class="stanza-badge"><div class="snum">STANZA ${l.s}</div><h2>${l.st||''}</h2></div>`;
  }
  if(p==='start'||p==='words'){
    if(l.mode==='word')rWM(m,l,stH);
    else if(l.mode==='sentence')rSM(m,l,stH);
    else rRM(m,l,stH);
  }else if(p==='type')rTM(m,l,stH);
  else if(p==='dive')rDM(m,l,stH);
  else if(p==='done')rDN(m,l,stH);
}

function rWM(m,l,stH){
  if(wq.length===0)buildWQ();if(wi>=wq.length){sp('type');rMain();return}
  const w=wq[wi];
  m.innerHTML=stH+`<div class="phase-badge"><span>WORDS</span></div>
    <div class="oe-display"><div class="full-oe">${hl(l.oe,w.oe)}</div></div>
    <div class="wdots">${wq.map((_,i)=>`<div class="wd${i<wi?' done':i===wi?' cur':''}"></div>`).join('')}</div>
    <div class="word-card"><div class="w-oe">${w.oe}</div><div class="w-pron">${w.pron}</div><div class="w-type">${w.type||''}</div>
    <input type="text" id="ai" placeholder="meaning..." autocomplete="off" ${wa?'disabled':''}>
    <div class="fb" id="fb"></div><div class="rv" id="rv"></div>
    ${wa?`<div class="nt">${w.note||''}</div>`:''}
    <div class="btn-row">${wa?`<button class="pri" onclick="nxW()">→ Next</button><button class="sm" onclick="ovW()">I was right ↻</button>`
    :`<button class="pri" onclick="subW()">Check</button><button onclick="skW()">Skip</button><button class="sm" onclick="fkW()">I know →</button>`}</div></div>`;
  if(!wa){const inp=document.getElementById('ai');inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')subW()}}
}
function rSM(m,l,stH){
  m.innerHTML=stH+`<div class="phase-badge"><span>SENTENCE</span></div>
    <div class="oe-display"><div class="full-oe">${l.oe}</div><div class="full-pron">${l.pron}</div></div>
    <div class="word-card"><div style="font-size:1em;color:var(--text-dim);margin-bottom:12px">What does this line mean?</div>
    <input type="text" id="si" placeholder="English meaning..." autocomplete="off">
    <div class="fb" id="sfb"></div>

  const inp=document.getElementById('si');inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')subS()};

function rRM(m,l,stH){
  m.innerHTML=stH+`<div class="phase-badge"><span>READ</span></div>
    <div class="oe-display"><div class="full-oe">${l.oe}</div><div class="full-pron">${l.pron}</div><div class="full-eng">${l.eng}</div></div>

    <div class="btn-row"><button class="pri" onclick="sp('done');fin()">Continue →</button></div>`;
}
function rTM(m,l,stH){
  m.innerHTML=stH+`<div class="phase-badge"><span>WRITE</span></div>
    <div class="oe-display"><div class="full-pron">${l.pron}</div><div class="full-eng">${l.eng}</div></div>
    <div class="typing-area"><h3>Write the Old English</h3><div class="hint">th for þ/ð · ae for æ · no macrons needed</div>
    <textarea id="ti" rows="2" placeholder="Type the OE..."></textarea><div id="tr"></div>
    <div class="btn-row"><button class="pri" onclick="chkT()">Check</button><button onclick="shT()">Show & continue</button></div></div>`;
  document.getElementById('ti').focus();
  document.getElementById('ti').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chkT()}};

function rDM(m,l,stH){
  m.innerHTML=stH+`<div class="oe-display"><div class="full-oe">${l.oe}</div><div class="full-pron">${l.pron}</div><div class="full-eng">${l.eng}</div></div>

    <div class="btn-row"><button class="pri" onclick="fin()">Continue →</button>

    <a class="audio-link" href="${T().audio}" target="_blank">♫ Listen · Old English Aerobics</a>`;
}
function rDN(m,l,stH){
  const nextL=LNS()[CI()+1];const isEnd=!nextL||nextL.s!==l.s;
  if(isEnd){
    const sLines=LNS().filter(x=>x.s===l.s);
    let rv='';sLines.forEach(sl=>{rv+=`<div class="r-line"><div class="r-oe">${sl.oe}</div><div class="r-pron">${sl.pron}</div><div class="r-eng">${sl.eng}</div></div>`});
    m.innerHTML=stH+`<div class="review-block"><h3>Stanza ${l.s} · Review</h3>${rv}
      <div style="text-align:center;margin-top:16px;color:var(--text-dim);font-size:0.85em">Read the whole stanza aloud.</div></div>
      <a class="audio-link" href="${T().audio}" target="_blank">♫ Listen to this stanza</a>
      <div class="btn-row">${CI()<LNS().length-1?`<button class="pri" onclick="nxL()">Next stanza →</button>`:'<button disabled>End of text</button>'}</div>`;
  }else{
    m.innerHTML=`<div class="oe-display"><div class="full-oe">${l.oe}</div><div class="full-eng">${l.eng}</div></div>
      <div style="text-align:center;padding:8px"><span style="color:var(--green);font-family:'JetBrains Mono',monospace;font-size:0.8em">✦ done ✦</span></div>
      <div class="btn-row"><button class="pri" onclick="nxL()">Next →</button></div>`;
  }
}

window.subW=function(){if(wa)return;const inp=document.getElementById('ai'),fb=document.getElementById('fb'),rv=document.getElementById('rv'),w=wq[wi],s=wsc(w.oe);s.a++;
  if(chk(inp.value,w.accepts)){s.c++;inp.className='correct';fb.className='fb ok';fb.textContent='Gōd'}
  else{inp.className='wrong';fb.className='fb no';fb.textContent='Nā';rv.textContent=w.eng}
  wa=true;S.ws[w.oe]=s;ss(S);rMain()};
window.skW=function(){const w=wq[wi],s=wsc(w.oe);s.a++;S.ws[w.oe]=s;wa=true;ss(S);rMain();
  document.getElementById('fb').className='fb no';document.getElementById('fb').textContent='Skipped';document.getElementById('rv').textContent=w.eng};
window.fkW=function(){const w=wq[wi],s=wsc(w.oe);s.a++;s.c++;S.ws[w.oe]=s;wi++;wa=false;ss(S);rMain()};
window.ovW=function(){const w=wq[wi],s=wsc(w.oe);s.c++;S.ws[w.oe]=s;ss(S);nxW()};
window.nxW=function(){wi++;wa=false;rMain()};

window.subS=function(){const inp=document.getElementById('si'),fb=document.getElementById('sfb'),l=ld();
  const eng=l.eng.toLowerCase(),typed=inp.value.toLowerCase().trim();
  const keyW=eng.split(/\s+/).filter(w=>w.length>3);let hits=0;keyW.forEach(w=>{if(typed.includes(w))hits++});
  if(hits>=Math.min(3,keyW.length)){fb.className='fb ok';fb.textContent='Gōd';setTimeout(()=>{sp('type');rMain()},1000)}
  else{fb.className='fb no';fb.innerHTML='<div style="margin-top:8px;color:var(--text-dim);font-style:italic">'+l.eng+'</div>';setTimeout(()=>{sp('type');rMain()},2500)}};
window.showS=function(){sp('type');rMain()};

window.chkT=function(){const inp=document.getElementById('ti'),l=ld(),tr=document.getElementById('tr');
  const target=l.oe.replace(/[·]/g,'').replace(/\s+/g,' ').trim();
  function n(s){return s.toLowerCase().replace(/þ|ð/g,'th').replace(/æ/g,'ae').replace(/[ǣāēīōūȳ]/g,c=>({ǣ:'ae',ā:'a',ē:'e',ī:'i',ō:'o',ū:'u',ȳ:'y'}[c]||c)).replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim()}
  if(n(inp.value)===n(target)){tr.innerHTML=`<div style="color:var(--green-bright);margin-top:12px">Gōd</div><div style="color:var(--gold);margin-top:8px;font-size:1.1em">${l.oe}</div>`;setTimeout(()=>{sp('dive');rMain()},1200)}
  else{const tw=n(target).split(' '),uw=n(inp.value).split(' ');let c='';tw.forEach((w,i)=>{c+=uw[i]&&(uw[i]===w||lv(uw[i],w)<=1)?`<span class="match">${w}</span> `:`<span class="miss">${w}</span> `});
  tr.innerHTML=`<div style="margin-top:12px">${c}</div><div class="btn-row" style="margin-top:12px"><button class="pri" onclick="sp('dive');rMain()">Close enough →</button></div>`}};
window.shT=function(){document.getElementById('ti').value=ld().oe.replace(/\s*·\s*/g,' ');sp('dive');setTimeout(()=>rMain(),800)};

window.fin=function(){sp('done');ss(S);rAll()};
window.nxL=function(){if(CI()<LNS().length-1){setCI(CI()+1);wi=0;wa=false;wq=[];const k=S.tx+'-'+CI();if(!S.phase[k])S.phase[k]='start';ss(S);rAll()}};

let poemOpen=false;
window.togglePoem=function(){
  poemOpen=!poemOpen;
  document.getElementById('poverlay').classList.toggle('show',poemOpen);
  document.getElementById('ppanel').classList.toggle('show',poemOpen);
  document.getElementById('pbtn').classList.toggle('open',poemOpen);
  if(poemOpen)rPoem();
};
function rPoem(){
  const p=document.getElementById('ppanel');
  const lns=LNS(),ci=CI();
  let h='<h3>'+T().title+'</h3>';
  let curS=-1;
  lns.forEach((l,i)=>{
    if(l.s!==curS){
      if(curS!==-1)h+='</div>';
      curS=l.s;
      h+='<div class="p-stanza"><div class="p-stanza-label">'+(l.st||'Stanza '+l.s)+'</div>';
    }
    const k=S.tx+'-'+i;
    const cls=i===ci?' p-cur':(S.phase[k]==='done'?' p-done':'');
    h+='<div class="p-line'+cls+'" onclick="jumpTo('+i+')">';
    h+='<div class="p-oe">'+l.oe+'</div>';
    h+='<div class="p-eng">'+l.eng+'</div></div>';
  });
  h+='</div>';
  p.innerHTML=h;
  const cur=p.querySelector('.p-cur');
  if(cur)cur.scrollIntoView({block:'center',behavior:'smooth'});
}
window.jumpTo=function(i){
  setCI(i);wi=0;wa=false;wq=[];
  const k=S.tx+'-'+i;
  if(!S.phase[k])S.phase[k]='start';
  ss(S);rAll();
  togglePoem();
};

function rAll(){rTsel();rLP();rMain();if(poemOpen)rPoem()}
if(!S.phase[pk()])S.phase[pk()]='start';
rAll();
</script>
