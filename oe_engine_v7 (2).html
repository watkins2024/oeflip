"when it against cliffs crashes","mode":"sentence","dive":"Short, sharp line. The ship crashes against cliffs. <span class='gi'>Cnossað</span> — smashes, crashes. Onomatopoeia. You hear the impact in the word."},{"s":2,"oe":"Calde geþrungen wǣron mīne fēt · forste gebunden","pron":"KALD-eh yeh-THRUNG-en WAH-ron MEE-neh FEHT · FORST-eh yeh-BUND-en","eng":"Pinched with cold were my feet · by frost bound","mode":"word","words":[{"oe":"calde","pron":"KALD-eh","eng":"with cold, by cold","type":"noun · dat","accepts":["cold","with cold","by cold"],"note":"Instrumental/dative — the cold does the pinching"},{"oe":"geþrungen","pron":"yeh-THRUNG-en","eng":"pinched, pressed, afflicted","type":"verb · pp","accepts":["pinched","pressed","afflicted","squeezed","oppressed"],"note":"Past participle of geþringan — squeezed, compressed"},{"oe":"wǣron","pron":"WAH-ron","eng":"were","type":"verb · past pl","accepts":["were"],"note":"Past plural of bēon — they were"},{"oe":"fēt","pron":"FEHT","eng":"feet","type":"noun · masc · nom pl","accepts":["feet"],"note":"Same word. His actual feet. Frozen."},{"oe":"forste","pron":"FORST-eh","eng":"by frost","type":"noun · masc · dat","accepts":["frost","by frost","with frost"],"note":"Instrumental — frost as the binding agent"},{"oe":"gebunden","pron":"yeh-BUND-en","eng":"bound, fettered","type":"verb · pp","accepts":["bound","fettered","tied","fastened"],"note":"Past participle of bindan — the frost BINDS his feet. He is prisoner of the cold."}],"dive":"<span class='gi'>Forste gebunden</span> — bound by frost. The Wanderer's exile is social. The Seafarer's exile is physical. His feet are literally frozen to the deck. <span class='gi'>Gebunden</span> — the same binding verb from the ferðloca passage. There the spirit is bound. Here the feet are."},{"s":2,"oe":"caldum clommum · þǣr þā ceare seofedun","pron":"KALD-um KLOM-um · THÆHR thah KEHR-eh SEH-of-ed-un","eng":"with cold chains · where then cares sighed","mode":"sentence","dive":"<span class='gi'>Caldum clommum</span> — cold chains. The frost is literal shackles. And then: <span class='gi'>ceare seofedun</span> — cares sighed. The sorrows themselves sigh. Emotion as something alive that makes sound around him."},{"s":3,"st":"No One Knows","oe":"hāt ymb heortan · hungor innan slāt","pron":"HAHT oomb HEORT-an · HUNG-or IN-an SLAHT","eng":"hot around the heart · hunger within tore","mode":"word","words":[{"oe":"hāt","pron":"HAHT","eng":"hot, burning","type":"adjective","accepts":["hot","burning","heated"],"note":"The heart is hot while the feet are frozen. The body at war with itself."},{"oe":"ymb","pron":"OOMB","eng":"around, about","type":"preposition","accepts":["around","about","surrounding"],"note":"Spatial — the heat surrounds the heart"},{"oe":"heortan","pron":"HEORT-an","eng":"heart","type":"noun · fem · acc","accepts":["heart","the heart"],"note":"The heart is hot. The feet are bound. Extreme contrast."},{"oe":"hungor","pron":"HUNG-or","eng":"hunger","type":"noun · masc","accepts":["hunger","famine","starvation"],"note":"Same word. Physical hunger on the sea."},{"oe":"innan","pron":"IN-an","eng":"within, inside","type":"adverb","accepts":["within","inside","from within"],"note":"The hunger works from inside — it tears outward"},{"oe":"slāt","pron":"SLAHT","eng":"tore, ripped, rent","type":"verb · past · 3sg","accepts":["tore","ripped","rent","slashed","cut"],"note":"From slītan — to tear. Hunger tears his insides. Violent."}],"dive":"Hot heart, frozen feet, hunger tearing from within. Three zones of the body in three different agonies simultaneously. <span class='gi'>Slāt</span> — tore. Hunger is not a dull ache. It tears."},{"s":3,"oe":"mereswerges mōd · þæt sē mon ne wāt","pron":"MEH-reh-SWERG-es MOHD · thæt seh MON neh WAHT","eng":"the sea-weary one's mind · that the man not knows","mode":"sentence","dive":"<span class='gi'>Sē mon ne wāt</span> — the man does not know. The land-person. The one who hasn't suffered this. A division between those who have been to sea and those who haven't. Experience as a wall."},{"s":3,"oe":"þe him on foldan fægrost limpeð","pron":"theh him on FOLD-an FÆHG-rost LIMP-eth","eng":"for whom on land most fairly it goes","mode":"sentence","dive":"The person on land for whom things go well — <span class='gi'>fægrost limpeð</span> — most fairly happens. This person cannot understand. Comfort is its own blindness."},{"s":3,"oe":"hū ic earm-cearig · īscealdne sǣ","pron":"hoo itch EARM-keh-ah-rig · EES-cheahld-neh SAE","eng":"how I wretched-sorrowful · the ice-cold sea","mode":"word","words":[{"oe":"earm-cearig","pron":"EARM-keh-ah-rig","eng":"wretched-sorrowful, miserably anxious","type":"adj · compound","accepts":["wretched-sorrowful","wretched","miserable","wretchedly anxious"],"note":"earm (wretched/poor) + cearig (full of care) — compound misery"},{"oe":"īscealdne","pron":"EES-cheahld-neh","eng":"ice-cold","type":"adj · compound · acc","accepts":["ice-cold","ice cold","freezing","icy"],"note":"īs (ice) + ceald (cold) — compare hrīmcealde in the Wanderer. Different frost, same sea."},{"oe":"sǣ","pron":"SAE","eng":"sea","type":"noun · fem · acc","accepts":["sea","ocean"],"note":"Her again. The feminine sea."}],"dive":"<span class='gi'>Earm-cearig</span> — wretch-care. Doubles the misery. <span class='gi'>Īscealdne sǣ</span> echoes the Wanderer's <span class='gi'>hrīmcealde sǣ</span>. Same sea, different frost-word. The poems know each other."},{"s":3,"oe":"winter wunade wræccan lāstum","pron":"WINT-er WOON-ah-deh WRETCH-an LAHST-um","eng":"winter dwelt-in on exile's tracks","mode":"word","words":[{"oe":"winter","pron":"WINT-er","eng":"winter","type":"noun · masc","accepts":["winter"],"note":"Same word. The season of endurance."},{"oe":"wunade","pron":"WOON-ah-deh","eng":"dwelt, inhabited, lived in","type":"verb · past · 1sg","accepts":["dwelt","lived","inhabited","dwelt in","resided"],"note":"From wunian — to dwell. He LIVED in winter. Not passed through it."},{"oe":"wræccan","pron":"WRETCH-an","eng":"exile's, of the exile","type":"noun · gen","accepts":["exile's","of the exile","of the wretch"],"note":"Genitive of wræcca — the exile. Same word as in the Wanderer."},{"oe":"lāstum","pron":"LAHST-um","eng":"on tracks, in footsteps","type":"noun · masc · dat pl","accepts":["tracks","footsteps","paths","on tracks"],"note":"Dative plural of lāst — the same exile-tracks. Wræclāstas."}],"dive":"<span class='gi'>Wræccan lāstum</span> — on exile's tracks. The Wanderer's <span class='gi'>wræclāstas</span> returns. The same paths. The same footprints. Two poems sharing one road."},{"s":4,"st":"The Cuckoo Calls","oe":"Bearwas blōstmum nimað · byrig fægriað","pron":"BEHR-was BLOHST-mum NIM-ath · BOOR-ig FÆHG-ree-ath","eng":"Groves take on blossoms · towns grow fair","mode":"sentence","dive":"Spring arrives on land. <span class='gi'>Bearwas</span> (groves) take <span class='gi'>blōstmum</span> (blossoms). <span class='gi'>Byrig</span> (towns) grow fair. Beautiful — and it makes everything worse. The beauty of land sharpens the call to leave it."},{"s":4,"oe":"wongas wlitigað · woruld onetteð","pron":"WONG-as WLIT-ig-ath · WOR-uld ON-et-eth","eng":"plains grow beautiful · the world hastens","mode":"sentence","dive":"<span class='gi'>Woruld onetteð</span> — the world hastens. Time speeds up in spring. Everything is urgent. The same urgency that drives the cuckoo's call drives the seafarer back to the sea."},{"s":4,"oe":"Ealle þā gemoniað mōdes fusne","pron":"EAHL-eh thah yeh-MON-ee-ath MOHD-es FOOS-neh","eng":"All these things urge the eager one of spirit","mode":"sentence","dive":"Everything — the blossoms, the beauty, the hastening world — <span class='gi'>gemoniað</span> (urges, admonishes) the one who is <span class='gi'>fusne</span> — eager, ready to go, restless. The beauty pushes him away from land."},{"s":4,"oe":"sefan tō sīþe · þām þe swā þenceð","pron":"SEF-an toh SEETH-eh · THAHM theh swah THENCH-eth","eng":"the spirit to journey · for him who so thinks","mode":"word","words":[{"oe":"sefan","pron":"SEF-an","eng":"spirit, mind, heart","type":"noun · masc · acc","accepts":["spirit","mind","heart","inner self","soul"],"note":"The deep inner self — what moves toward the sea"},{"oe":"sīþe","pron":"SEETH-eh","eng":"journey, voyage","type":"noun · masc · dat","accepts":["journey","voyage","trip","expedition"],"note":"The significant experience — not casual travel"},{"oe":"þām","pron":"THAHM","eng":"for him, to him","type":"pronoun · dat","accepts":["him","for him","to him","the one"],"note":"Dative — for the one who thinks this way"},{"oe":"þenceð","pron":"THENCH-eth","eng":"thinks, intends","type":"verb · 3sg","accepts":["thinks","intends","considers","purposes"],"note":"Not idle thought — deliberate intention"}],"dive":"<span class='gi'>Sefan tō sīþe</span> — the spirit toward the journey. The inner self moves before the body does. The decision to go to sea happens in the <span class='gi'>sefa</span> — the same deep word the Wanderer uses for the interior that cannot be spoken."},{"s":4,"oe":"on flodwegas feor gewītan","pron":"on FLOD-weh-gas FEH-or yeh-WEE-tan","eng":"on flood-ways far to depart","mode":"word","words":[{"oe":"flodwegas","pron":"FLOD-weh-gas","eng":"flood-ways, sea-roads","type":"noun · masc · acc pl","accepts":["flood-ways","flood ways","sea-roads","sea roads","ocean paths"],"note":"flōd (flood/sea) + weg (way) — another kenning for the sea as path. Compare lagulād."},{"oe":"feor","pron":"FEH-or","eng":"far, far away","type":"adverb","accepts":["far","far away","distant","afar"],"note":"The distance word. Not a short trip."},{"oe":"gewītan","pron":"yeh-WEE-tan","eng":"to depart, to go away","type":"verb · inf","accepts":["depart","to depart","go","leave","go away"],"note":"The Wanderer uses gewāt for time departing. Here the seafarer departs. Same verb, reversed direction."}],"dive":"<span class='gi'>Flodwegas</span> — flood-ways. Third kenning for the sea-as-road (after lagulād and the Wanderer's waþema gebind). <span class='gi'>Gewītan</span> — the same verb used for time departing in the Wanderer. There, time leaves. Here, the man leaves. The verb connects loss and longing."},{"s":4,"oe":"Swylce gēac monað geōmran reorde","pron":"SWOOL-cheh YEH-ahk MON-ath YEH-om-ran REH-ord-eh","eng":"Likewise the cuckoo urges with mournful voice","mode":"word","words":[{"oe":"swylce","pron":"SWOOL-cheh","eng":"likewise, also, similarly","type":"adverb","accepts":["likewise","also","similarly","so too"],"note":"Connector — and also this"},{"oe":"gēac","pron":"YEH-ahk","eng":"cuckoo","type":"noun · masc","accepts":["cuckoo"],"note":"The bird that calls in spring. Its voice is the voice of departure."},{"oe":"monað","pron":"MON-ath","eng":"urges, admonishes, calls","type":"verb · 3sg","accepts":["urges","admonishes","calls","warns","exhorts"],"note":"From manian — to urge, to remind. The cuckoo reminds him."},{"oe":"geōmran","pron":"YEH-om-ran","eng":"mournful, sad, sorrowful","type":"adj · dat","accepts":["mournful","sad","sorrowful","lamenting"],"note":"The cuckoo's voice is sad. The call to the sea is not joyful."},{"oe":"reorde","pron":"REH-ord-eh","eng":"voice, speech","type":"noun · fem · dat","accepts":["voice","speech","call","sound"],"note":"Instrumental/dative — with mournful voice"}],"dive":"<span class='gi'>Gēac monað geōmran reorde</span> — the cuckoo urges with mournful voice. The most famous image in the poem. The cuckoo is the bird of spring and of departure. Its call is beautiful and sad at once — like the call of the sea itself."},{"s":4,"oe":"singeð sumeres weard · sorg tō heortan","pron":"SING-eth SOO-mer-es WEHRD · SORG toh HEORT-an","eng":"sings summer's guardian · sorrow to the heart","mode":"word","words":[{"oe":"singeð","pron":"SING-eth","eng":"sings","type":"verb · 3sg","accepts":["sings"],"note":"Same word. The bird sings."},{"oe":"sumeres","pron":"SOO-mer-es","eng":"of summer","type":"noun · masc · gen","accepts":["summer's","of summer"],"note":"Genitive — summer's guardian/herald"},{"oe":"weard","pron":"WEHRD","eng":"guardian, watchman, herald","type":"noun · masc","accepts":["guardian","watchman","herald","keeper","warden"],"note":"The cuckoo guards summer — announces its arrival"},{"oe":"sorg","pron":"SORG","eng":"sorrow","type":"noun · fem · acc","accepts":["sorrow","grief","care"],"note":"The cuckoo brings sorrow. Beauty and grief in one song."},{"oe":"heortan","pron":"HEORT-an","eng":"to the heart","type":"noun · fem · dat","accepts":["heart","to the heart","the heart"],"note":"Dative — the sorrow goes TO the heart. Targeted."}],"dive":"<span class='gi'>Sumeres weard</span> — summer's guardian. The cuckoo heralds summer. And what does summer's herald bring? <span class='gi'>Sorg tō heortan</span> — sorrow to the heart. Beauty announces grief. The call to the sea is not freedom. It is compulsion wrapped in birdsong."},{"s":5,"st":"The Spirit Flies Ahead","oe":"Forþon nū mīn hyge hweorfeð ofer hreþerlocan","pron":"for-THON noo meen HOODGE-eh HWEORF-eth OF-er HRETH-er-LOK-an","eng":"Therefore now my thought turns beyond the breast-enclosure","mode":"word","words":[{"oe":"forþon","pron":"for-THON","eng":"therefore, because","type":"conjunction","accepts":["therefore","because","for that reason"],"note":"Causal — because of everything he's described"},{"oe":"hyge","pron":"HOODGE-eh","eng":"thought, mind, intention","type":"noun · masc","accepts":["thought","mind","intention","spirit"],"note":"Active thinking — the mind as agent"},{"oe":"hweorfeð","pron":"HWEORF-eth","eng":"turns, moves, wanders","type":"verb · 3sg","accepts":["turns","moves","wanders","ranges"],"note":"Same verb from the Wanderer — geondhweorfeð. The mind moves through."},{"oe":"ofer","pron":"OF-er","eng":"over, beyond","type":"preposition","accepts":["over","beyond","across"],"note":"The thought goes BEYOND the body"},{"oe":"hreþerlocan","pron":"HRETH-er-LOK-an","eng":"breast-enclosure, heart-locker","type":"noun · masc · acc","accepts":["breast-enclosure","heart-locker","chest","breast"],"note":"hreþer (breast) + loca (enclosure) — FOURTH kenning for the locked heart across both poems"}],"dive":"<span class='gi'>Hreþerlocan</span> — breast-enclosure. The fourth kenning for the locked interior (after ferðloca, hordcofa, brēostcofa). But here the thought ESCAPES it. <span class='gi'>Hweorfeð ofer</span> — turns beyond. The Wanderer binds the ferðloca shut. The Seafarer's mind breaks free."},{"s":5,"oe":"mīn mōdsefa mid mereflōde","pron":"meen MOHD-sef-ah mid MEH-reh-FLOH-deh","eng":"my mind-spirit with the sea-flood","mode":"sentence","dive":"<span class='gi'>Mōdsefa</span> returns — the same deep-self word from the Wanderer, where it had no one to speak to. Here it travels with the sea-flood. The interior flies outward."},{"s":5,"oe":"ofer hwæles ēþel · hweorfeð wīde","pron":"OF-er HWAL-es ETH-el · HWEORF-eth WEE-deh","eng":"over the whale's homeland · it turns widely","mode":"word","words":[{"oe":"hwæles","pron":"HWAL-es","eng":"of the whale","type":"noun · masc · gen","accepts":["whale's","of the whale"],"note":"Genitive — the sea belongs to the whale"},{"oe":"ēþel","pron":"ETH-el","eng":"homeland, native land, estate","type":"noun · masc","accepts":["homeland","native land","home","country","estate"],"note":"The sea is the whale's ēþel — its home. What the exile has lost on land, the whale has in the ocean."},{"oe":"wīde","pron":"WEE-deh","eng":"widely, far and wide","type":"adverb","accepts":["widely","far and wide","far","broadly"],"note":"The spirit ranges without limit"}],"dive":"<span class='gi'>Hwæles ēþel</span> — the whale's homeland. One of the great kennings. The sea is not empty. It is the whale's estate, the whale's native ground. The exile has no ēþel. The whale does. The spirit flies over someone else's home."},{"s":5,"oe":"eorþan scēatas · cymeð eft tō mē","pron":"EOR-than SHEH-ah-tas · KOOM-eth EFT toh MEH","eng":"earth's regions · comes back to me","mode":"word","words":[{"oe":"eorþan","pron":"EOR-than","eng":"of earth, earth's","type":"noun · fem · gen","accepts":["earth's","of earth","of the earth"],"note":"The spirit ranges over earth's surfaces"},{"oe":"scēatas","pron":"SHEH-ah-tas","eng":"regions, surfaces, corners","type":"noun · masc · acc pl","accepts":["regions","surfaces","corners","expanses"],"note":"The broad flat surfaces of the world"},{"oe":"cymeð","pron":"KOOM-eth","eng":"comes, returns","type":"verb · 3sg","accepts":["comes","returns","comes back"],"note":"From cuman — it comes back. The spirit returns."},{"oe":"eft","pron":"EFT","eng":"again, back","type":"adverb","accepts":["again","back","once more"],"note":"Again — it always returns"},{"oe":"tō mē","pron":"toh MEH","eng":"to me","type":"prep + pronoun","accepts":["to me","back to me"],"note":"The spirit comes back to the body. It has to."}],"dive":"<span class='gi'>Cymeð eft tō mē</span> — comes back to me. The spirit flies out over the whale's homeland, ranges across the earth, and returns to the body. It cannot stay free. Like the Wanderer's companions who swim away — the spirit must come back to the isolation it tried to escape."},{"s":5,"oe":"gīfre and grǣdig · gielleð ānfloga","pron":"YEEF-reh and GRAH-dig · YEEL-eth AHN-floh-gah","eng":"greedy and ravenous · screams the lone-flier","mode":"word","words":[{"oe":"gīfre","pron":"YEEF-reh","eng":"greedy, eager, ravenous","type":"adjective","accepts":["greedy","eager","ravenous","voracious"],"note":"The returning spirit is hungry — it wants more"},{"oe":"grǣdig","pron":"GRAH-dig","eng":"greedy, covetous","type":"adjective","accepts":["greedy","covetous","ravenous","hungry"],"note":"Root of modern 'greedy'. Doubled with gīfre for emphasis."},{"oe":"gielleð","pron":"YEEL-eth","eng":"screams, yells, cries out","type":"verb · 3sg","accepts":["screams","yells","cries","shrieks","calls"],"note":"From giellan — to yell. The spirit SCREAMS. Not whispers. Screams."},{"oe":"ānfloga","pron":"AHN-floh-gah","eng":"lone-flier, solitary one","type":"noun · masc","accepts":["lone-flier","lone flier","solitary flier","solitary one"],"note":"ān (one/lone) + floga (flier) — the spirit as a single bird ranging alone. One of the most debated words in OE scholarship."}],"dive":"<span class='gi'>Ānfloga</span> — the lone-flier. Nobody agrees what this is. The spirit-bird? A cuckoo? The soul itself ranging ahead of the body? Whatever it is, it's <span class='gi'>gīfre and grǣdig</span> — ravenous — and it screams. This is not serene transcendence. This is the soul tearing itself from the body in hunger."},{"s":5,"oe":"hweteð on hwælweg hreþer unwearnum","pron":"HWET-eth on HWÆL-weg HRETH-er UN-wehr-num","eng":"urges onto whale-road the heart irresistibly","mode":"word","words":[{"oe":"hweteð","pron":"HWET-eth","eng":"urges, incites, whets","type":"verb · 3sg","accepts":["urges","incites","whets","drives","sharpens"],"note":"Root of 'whet' — to sharpen. The spirit sharpens the desire."},{"oe":"hwælweg","pron":"HWÆL-weg","eng":"whale-road, sea","type":"noun · masc · acc","accepts":["whale-road","whale road","sea","ocean"],"note":"The most famous kenning in OE. The sea as the road whales travel."},{"oe":"hreþer","pron":"HRETH-er","eng":"heart, breast, spirit","type":"noun · masc · acc","accepts":["heart","breast","spirit","chest"],"note":"The physical chest — what the spirit urges toward the sea"},{"oe":"unwearnum","pron":"UN-wehr-num","eng":"irresistibly, without restraint","type":"adverb","accepts":["irresistibly","without restraint","powerfully","unstoppably"],"note":"un- (without) + wearnum (resistance) — nothing can stop this"}],"dive":"<span class='gi'>Hwælweg</span> — whale-road. The kenning. The sea is not water — it's a road, and the whales are its traffic. <span class='gi'>Unwearnum</span> — irresistibly. The pull to the sea cannot be resisted. The Wanderer's ferðloca is bound shut. The Seafarer's is ripped open."},{"s":28,"st":"The Dead Life","oe":"Forþon mē hatran sind Dryhtnes drēamas","pron":"FOR-thon MEH HAH-trahn sind DRUEH-tnes DREH-ah-mahs","eng":"Therefore to me hotter are the Lord's joys","mode":"word","words":[{"oe":"forþon","pron":"FOR-thon","eng":"therefore, because","type":"conjunction","accepts":["therefore","because"],"note":"The pivot word. Everything before was experience. Now: what it means."},{"oe":"hatran","pron":"HAH-trahn","eng":"hotter, more ardent","type":"adj · comparative","accepts":["hotter","more ardent","more burning"],"note":"Comparative of hāt. The divine joys burn hotter than earthly ones."},{"oe":"Dryhtnes","pron":"DRUEH-tnes","eng":"the Lord's","type":"noun · gen","accepts":["the lord's","God's"],"note":"Dryhten — lord, ruler. Genitive."},{"oe":"drēamas","pron":"DREH-ah-mahs","eng":"joys, ecstasies","type":"noun · acc pl","accepts":["joys","ecstasies","delights"],"note":"Drēam — joy/music/ecstasy. Not 'dream' in modern sense."}],"dive":"The turn. The Seafarer has described physical suffering. Now he says the pull of the unknown burns hotter than comfort. <span class='gi'>Drēam</span> is ecstasy, not dream."},{"s":29,"st":"","oe":"þonne þis dēade līf · lǣne on londe","pron":"THON-neh THIS DEH-ah-deh LEEF · LAH-neh on LON-deh","eng":"than this dead life · transitory on land","mode":"word","words":[{"oe":"dēade","pron":"DEH-ah-deh","eng":"dead","type":"adjective","accepts":["dead"],"note":"The comfortable life on land is dead. Not dying — already dead."},{"oe":"līf","pron":"LEEF","eng":"life","type":"noun · neut","accepts":["life"],"note":""},{"oe":"lǣne","pron":"LAH-neh","eng":"transitory, on loan","type":"adjective","accepts":["transitory","temporary","on loan","fleeting"],"note":"Lǣne — lent, not owned. Everything on land is borrowed. Cognate of 'loan.'"}],"dive":"Land-life is <span class='gi'>dēade</span> and <span class='gi'>lǣne</span> — dead and borrowed. The sea-suffering is more alive than comfort. This is the Seafarer's central paradox."},{"s":30,"st":"The Three Anxieties","oe":"Simle þrēora sum þinga gehwylce","pron":"SIM-leh THREH-oh-rah SOOM THING-ah yeh-HWUEL-keh","eng":"Always one of three things in each case","mode":"word","words":[{"oe":"simle","pron":"SIM-leh","eng":"always, ever","type":"adverb","accepts":["always","ever","constantly"],"note":""},{"oe":"þrēora","pron":"THREH-oh-rah","eng":"of three","type":"numeral · gen","accepts":["of three","three"],"note":"Genitive — one OF three."},{"oe":"sum","pron":"SOOM","eng":"one, a certain","type":"pronoun","accepts":["one","a certain"],"note":""}],"dive":"The three anxieties that keep a man from certainty: illness, age, or violence. Before any voyage, one of these three hangs over you."},{"s":31,"st":"","oe":"ǣr his tīddæge tō twēon weorþeð","pron":"AHR his TEED-dah-yeh TOH TWEH-on WEOR-theth","eng":"before his appointed day into doubt becomes","mode":"word","words":[{"oe":"tīddæge","pron":"TEED-dah-yeh","eng":"appointed day, fated time","type":"noun · dat","accepts":["appointed day","fated day","destined time"],"note":"Tīd (time) + dæg (day). The day fate has set."},{"oe":"twēon","pron":"TWEH-on","eng":"doubt, uncertainty","type":"noun · dat","accepts":["doubt","uncertainty"],"note":""}],"dive":"Before the appointed day, doubt comes. You don't know which of the three will take you. The uncertainty is the condition of being alive."},{"s":32,"st":"","oe":"ādl oþþe yldo oþþe ecghete","pron":"AHDL oth-theh UEL-doh oth-theh EJ-heh-teh","eng":"illness or old age or sword-hate","mode":"word","words":[{"oe":"ādl","pron":"AHDL","eng":"illness, disease","type":"noun · fem","accepts":["illness","disease","sickness"],"note":""},{"oe":"yldo","pron":"UEL-doh","eng":"old age","type":"noun · fem","accepts":["old age","age"],"note":""},{"oe":"ecghete","pron":"EJ-heh-teh","eng":"sword-hate, violence","type":"noun · masc","accepts":["sword-hate","violence","battle-hate"],"note":"Ecg (edge, sword) + hete (hate). Violence named as the sword's hatred. The weapon has agency."}],"dive":"The three. <span class='gi'>Ādl, yldo, ecghete.</span> Illness, age, or the sword's hatred. Everyone meets one. The question is which, not whether."},{"s":33,"st":"","oe":"fǣgum fromweardum feorh oðþringeð","pron":"FAH-goom FROM-weh-ahr-doom FEH-orh oth-THRING-eth","eng":"from the doomed departing one life wrests away","mode":"word","words":[{"oe":"fǣgum","pron":"FAH-goom","eng":"doomed, fated to die","type":"adj · dat","accepts":["doomed","fated","marked for death"],"note":"Fǣge — marked by fate. The person who is about to die. A specific OE concept."},{"oe":"feorh","pron":"FEH-orh","eng":"life, spirit","type":"noun · neut","accepts":["life","spirit","soul"],"note":"The life-force itself, not just being alive."},{"oe":"oðþringeð","pron":"oth-THRING-eth","eng":"wrests away, forces out","type":"verb · 3sg","accepts":["wrests away","forces out","tears away"],"note":"Violent separation. Life doesn't leave — it's torn out."}],"dive":"Life is <span class='gi'>oðþringeð</span> — torn away. Not a peaceful departure. The word carries violence regardless of whether the death is gentle. Dying is always a wrenching."},{"s":34,"st":"What Remains","oe":"Forþon biþ ǣghwǣm æftercweþendra","pron":"FOR-thon bith AGH-hwahm AHF-ter-kweh-then-drah","eng":"Therefore for everyone of those speaking after","mode":"word","words":[{"oe":"ǣghwǣm","pron":"AGH-hwahm","eng":"everyone, each one","type":"pronoun · dat","accepts":["everyone","each"],"note":""},{"oe":"æftercweþendra","pron":"AHF-ter-kweh-then-drah","eng":"of those speaking after, of survivors","type":"participle · gen pl","accepts":["of those who speak after","of survivors","of the living"],"note":"After-speakers. Those who remain and talk about the dead."}],"dive":"What matters after you die: what the after-speakers say. Your reputation among the living. This is the only immortality the poem acknowledges before the Christian turn."},{"s":35,"st":"","oe":"lof līfgendra lāstworda betst","pron":"LOF LEEF-gen-drah LAHST-wor-dah BETST","eng":"praise of the living the best of last-words","mode":"word","words":[{"oe":"lof","pron":"LOF","eng":"praise, glory, reputation","type":"noun · neut","accepts":["praise","glory","reputation"],"note":"What survives death. Not the soul here — the reputation."},{"oe":"līfgendra","pron":"LEEF-gen-drah","eng":"of the living","type":"participle · gen pl","accepts":["of the living","of those alive"],"note":""},{"oe":"lāstworda","pron":"LAHST-wor-dah","eng":"last-words, final reputation","type":"noun · gen pl","accepts":["last words","final reputation"],"note":"The words that follow you after death."}],"dive":"The best thing is praise from the living. <span class='gi'>Lof</span> is the only thing that crosses the death-boundary in the pre-Christian worldview. You build it before you go."},{"s":36,"st":"","oe":"þæt hē gewyrce ǣr hē on weg scyle","pron":"THAHT heh yeh-WUER-keh AHR heh on WEG SKUE-leh","eng":"that he work before he on the way must go","mode":"word","words":[{"oe":"gewyrce","pron":"yeh-WUER-keh","eng":"work, accomplish, build","type":"verb · subjunctive","accepts":["work","build","accomplish"],"note":"Subjunctive — something that should be done. Not descriptive but urgent."},{"oe":"weg","pron":"WEG","eng":"way, road (= death)","type":"noun · masc","accepts":["way","road","path"],"note":"The way out. Death as departure on a road."}],"dive":"Build your lof before you have to leave. <span class='gi'>Weg</span> here is death — the road you must take. The urgency is real: you don't know which of the three anxieties comes first."},{"s":37,"st":"","oe":"fremum on foldan wið fēonda nīþ","pron":"FREH-moom on FOL-dahn with FEH-on-dah NEETH","eng":"with good deeds on earth against fiends' malice","mode":"word","words":[{"oe":"fremum","pron":"FREH-moom","eng":"good deeds, benefits","type":"noun · dat pl","accepts":["good deeds","benefits","noble acts"],"note":""},{"oe":"fēonda","pron":"FEH-on-dah","eng":"fiends', enemies'","type":"noun · gen pl","accepts":["fiends'","enemies'"],"note":""},{"oe":"nīþ","pron":"NEETH","eng":"malice, hostility, violence","type":"noun · masc","accepts":["malice","hostility","hatred","violence"],"note":"Deep, structural hostility. Not a mood but a force."}],"dive":"Good deeds against the malice of enemies. This is the prescription: build your legacy through action against opposition. Not passive goodness — active resistance."},{"s":38,"st":"","oe":"dēorum dǣdum dēofle tōgēanes","pron":"DEH-oh-room DAH-doom DEH-oh-vleh toh-YEH-ah-nes","eng":"with brave deeds against the devil","mode":"word","words":[{"oe":"dēorum","pron":"DEH-oh-room","eng":"brave, precious, bold","type":"adj · dat pl","accepts":["brave","bold","precious","dear"],"note":"Dēor — brave. Same root as 'dear.' What is brave is what is valued."},{"oe":"dǣdum","pron":"DAH-doom","eng":"deeds","type":"noun · dat pl","accepts":["deeds","actions"],"note":""},{"oe":"tōgēanes","pron":"toh-YEH-ah-nes","eng":"against, toward","type":"preposition","accepts":["against","toward"],"note":""}],"dive":"The deeds must be <span class='gi'>dēor</span> — brave and precious. Not just good but costly. The opposition is named: the devil, the fundamental adversary."},{"s":39,"st":"The Days Are Done","oe":"Dagas sind gewītene · ealle onmedlan","pron":"DAH-gahs sind yeh-WEE-teh-neh · EAL-leh on-MED-lahn","eng":"Days are departed · all the pomp","mode":"word","words":[{"oe":"dagas","pron":"DAH-gahs","eng":"days","type":"noun · nom pl","accepts":["days"],"note":""},{"oe":"gewītene","pron":"yeh-WEE-teh-neh","eng":"departed, gone","type":"participle","accepts":["departed","gone","passed away"],"note":"The days didn't end — they left. They departed like people."},{"oe":"onmedlan","pron":"on-MED-lahn","eng":"pomp, pride, magnificence","type":"noun · gen pl","accepts":["pomp","pride","magnificence","glory"],"note":""}],"dive":"The days of glory have walked away. <span class='gi'>Gewītene</span> — they departed. Time leaves you the way people leave you."},{"s":40,"st":"","oe":"eorþan rīces · nearon nū cyningas","pron":"EOR-thahn REE-kes · NEH-ah-ron NOO KUE-ning-ahs","eng":"of the earth's kingdom · there are not now kings","mode":"word","words":[{"oe":"rīces","pron":"REE-kes","eng":"kingdom's, realm's","type":"noun · gen","accepts":["kingdom's","realm's"],"note":""},{"oe":"nearon","pron":"NEH-ah-ron","eng":"there are not, nor are there","type":"verb","accepts":["are not","there are not"],"note":"Negated form of 'are.' Emphatic absence."},{"oe":"cyningas","pron":"KUE-ning-ahs","eng":"kings","type":"noun · nom pl","accepts":["kings"],"note":""}],"dive":"No kings now. The earth's kingdom emptied of its rulers. Same observation as the Wanderer's <span class='gi'>hwǣr cwōm</span> — but stated flatly, without elegy."},{"s":41,"st":"","oe":"nē cāseras · nē goldgiefan","pron":"NEH KAH-seh-rahs · NEH GOLD-gee-eh-vahn","eng":"nor emperors · nor gold-givers","mode":"word","words":[{"oe":"cāseras","pron":"KAH-seh-rahs","eng":"emperors, caesars","type":"noun · nom pl","accepts":["emperors","caesars"],"note":"Latin loan — caesar. Even the Roman emperors are gone."},{"oe":"goldgiefan","pron":"GOLD-gee-eh-vahn","eng":"gold-givers, treasure-lords","type":"noun · nom pl","accepts":["gold-givers","treasure lords","generous lords"],"note":"The lord defined by generosity. What made a king worth following: he gave gold."}],"dive":"Emperors and gold-givers gone. <span class='gi'>Goldgiefan</span> is the definition of a good lord in Germanic culture — the one who distributes treasure. Even that is finished."},{"s":42,"st":"","oe":"swylce hī wǣron · þonne hī māst mid him","pron":"SWUEL-keh HEE WAH-ron · THON-neh HEE MAHST mid HIM","eng":"as once they were · when they most among them","mode":"word","words":[{"oe":"swylce","pron":"SWUEL-keh","eng":"as, such as, like","type":"conjunction","accepts":["as","such as","like"],"note":""},{"oe":"māst","pron":"MAHST","eng":"most, greatest","type":"adverb","accepts":["most","greatest"],"note":""}],"dive":"As they once were, at the height of their power. The memory of greatness makes the absence sharper."},{"s":43,"st":"","oe":"māþþas gedydon · ond on mǣst geþāh","pron":"MAHTH-thahs yeh-DUE-don · ond on MAHST yeh-THAH","eng":"glory accomplished · and most greatly thrived","mode":"word","words":[{"oe":"māþþas","pron":"MAHTH-thahs","eng":"treasures, glories","type":"noun · acc pl","accepts":["treasures","glories"],"note":""},{"oe":"gedydon","pron":"yeh-DUE-don","eng":"accomplished, performed","type":"verb · past pl","accepts":["accomplished","performed","did"],"note":""},{"oe":"geþāh","pron":"yeh-THAH","eng":"thrived, prospered","type":"verb · past 3sg","accepts":["thrived","prospered"],"note":""}],"dive":"They accomplished glories and thrived greatly. All past tense. All finished."},{"s":44,"st":"All That Falls","oe":"Gedroren is þēos duguð eal · drēamas sind gewītene","pron":"yeh-DROH-ren is THEH-ohs DOO-guth EAL · DREH-ah-mahs sind yeh-WEE-teh-neh","eng":"Fallen is this company all · joys are departed","mode":"word","words":[{"oe":"gedroren","pron":"yeh-DROH-ren","eng":"fallen, perished","type":"participle","accepts":["fallen","perished","collapsed"],"note":"The whole company has fallen. Not just died — collapsed like a structure."},{"oe":"duguð","pron":"DOO-guth","eng":"company, retinue, the worthy ones","type":"noun · fem","accepts":["company","retinue","host","the worthy"],"note":"The experienced warriors. The ones who mattered. All gone."},{"oe":"drēamas","pron":"DREH-ah-mahs","eng":"joys, ecstasies","type":"noun · nom pl","accepts":["joys","ecstasies"],"note":""}],"dive":"The company has fallen. The joys have departed. <span class='gi'>Duguð</span> is the tested warriors, the ones who earned their place. <span class='gi'>Drēamas</span> departed like the days — they left."},{"s":45,"st":"","oe":"wuniað þā wācran · ond þās woruld healdaþ","pron":"WOO-nee-ahth THAH WAH-krahn · ond THAHS WOR-oold HEH-ahl-dahth","eng":"the weaker ones remain · and this world hold","mode":"word","words":[{"oe":"wuniað","pron":"WOO-nee-ahth","eng":"remain, dwell","type":"verb · 3pl","accepts":["remain","dwell","abide"],"note":""},{"oe":"wācran","pron":"WAH-krahn","eng":"weaker ones, lesser ones","type":"adj · nom pl","accepts":["weaker","lesser","inferior"],"note":"Those who remain are the lesser. The strong are gone. We inherit a diminished world."}],"dive":"The weak remain and hold the world. A devastating assessment. The best are dead. What's left is lesser. And yet — it is the wācran who must carry on."},{"s":46,"st":"","oe":"brūcað þurh bisgo · blǣd is gehnǣged","pron":"BROO-kahth thurh BIS-goh · BLAHD is yeh-HNAH-ged","eng":"they use it through toil · glory is brought low","mode":"word","words":[{"oe":"brūcað","pron":"BROO-kahth","eng":"use, enjoy, make use of","type":"verb · 3pl","accepts":["use","enjoy","make use of"],"note":""},{"oe":"bisgo","pron":"BIS-goh","eng":"toil, trouble, anxiety","type":"noun · dat","accepts":["toil","trouble","anxiety","hardship"],"note":""},{"oe":"blǣd","pron":"BLAHD","eng":"glory, prosperity, fame","type":"noun · masc","accepts":["glory","prosperity","fame"],"note":""},{"oe":"gehnǣged","pron":"yeh-HNAH-ged","eng":"brought low, humbled","type":"participle","accepts":["brought low","humbled","bowed down"],"note":""}],"dive":"Glory brought low. The world goes on but diminished. <span class='gi'>Blǣd</span> — glory, fame, the flowering of achievement — bent down to the ground."},{"s":47,"st":"The World Ages","oe":"Eorþan indryhto ealdað ond sēarað","pron":"EOR-thahn IN-drueh-toh EAL-dahth ond SEH-ah-rahth","eng":"The earth's nobility ages and withers","mode":"word","words":[{"oe":"indryhto","pron":"IN-drueh-toh","eng":"nobility, honour","type":"noun · fem","accepts":["nobility","honour","excellence"],"note":""},{"oe":"ealdað","pron":"EAL-dahth","eng":"ages, grows old","type":"verb · 3sg","accepts":["ages","grows old"],"note":""},{"oe":"sēarað","pron":"SEH-ah-rahth","eng":"withers, dries up","type":"verb · 3sg","accepts":["withers","dries up","decays"],"note":"Sēarian — to dry out. Like a plant withering. The earth's honour dries up."}],"dive":"The earth herself ages and dries. <span class='gi'>Sēarað</span> — withering. Not just the people on the earth but the earth's own quality diminishing. Animist observation: the land itself grows tired."},{"s":48,"st":"","oe":"swā nū monna gehwylc geond middangeard","pron":"SWAH NOO MON-nah yeh-HWUELK yond MID-dahn-yeh-ahrd","eng":"so now of men each across middle-earth","mode":"word","words":[{"oe":"monna","pron":"MON-nah","eng":"of men","type":"noun · gen pl","accepts":["of men","of people"],"note":""},{"oe":"gehwylc","pron":"yeh-HWUELK","eng":"each, every one","type":"pronoun","accepts":["each","every one"],"note":""},{"oe":"middangeard","pron":"MID-dahn-yeh-ahrd","eng":"middle-earth","type":"noun","accepts":["middle-earth","the world"],"note":""}],"dive":"Every person across the middle-earth. Universal scope. Nobody exempt."},{"s":49,"st":"","oe":"yldo him on fareð · onsȳn blācað","pron":"UEL-doh him on FAH-reth · ON-suen BLAH-kahth","eng":"age upon him advances · the face grows pale","mode":"word","words":[{"oe":"yldo","pron":"UEL-doh","eng":"old age","type":"noun · fem","accepts":["old age","age"],"note":"Age doesn't arrive — it advances on you. Military language."},{"oe":"fareð","pron":"FAH-reth","eng":"advances, travels, comes","type":"verb · 3sg","accepts":["advances","travels","comes"],"note":"Faran — to go, to journey. Age journeys toward you."},{"oe":"onsȳn","pron":"ON-suen","eng":"face, countenance","type":"noun · fem","accepts":["face","countenance"],"note":""},{"oe":"blācað","pron":"BLAH-kahth","eng":"grows pale, whitens","type":"verb · 3sg","accepts":["grows pale","whitens","blanches"],"note":""}],"dive":"Age marches. The face whitens. <span class='gi'>Yldo him on fareð</span> — age journeys onto him. You don't age — age comes at you like an advancing army."},{"s":50,"st":"","oe":"gomelfeax gnornað · wāt his iūwine","pron":"GOH-mel-feh-ahks GNOR-nahth · WAHT his YOO-wee-neh","eng":"the grey-haired one mourns · knows his old friends","mode":"word","words":[{"oe":"gomelfeax","pron":"GOH-mel-feh-ahks","eng":"grey-haired one","type":"noun · masc","accepts":["grey-haired one","old man"],"note":"Gomel (old) + feax (hair). The compound names the condition."},{"oe":"gnornað","pron":"GNOR-nahth","eng":"mourns, grieves","type":"verb · 3sg","accepts":["mourns","grieves","laments"],"note":""},{"oe":"iūwine","pron":"YOO-wee-neh","eng":"old friends, former companions","type":"noun · acc pl","accepts":["old friends","former friends","companions of old"],"note":"Iū (formerly) + wine (friend). Friends from the before-time."}],"dive":"The grey-haired one knows his old friends are gone. <span class='gi'>Iūwine</span> — once-friends. The compound holds both the relationship and its pastness."},{"s":51,"st":"","oe":"æþelinga bearn eorþan forgiefene","pron":"AH-theh-ling-ah BEH-ahrn EOR-thahn for-YEE-eh-veh-neh","eng":"princes' sons given to the earth","mode":"word","words":[{"oe":"æþelinga","pron":"AH-theh-ling-ah","eng":"princes', nobles'","type":"noun · gen pl","accepts":["princes'","nobles'"],"note":"Æþeling — noble-born. The high-status dead."},{"oe":"bearn","pron":"BEH-ahrn","eng":"sons, children","type":"noun · nom pl","accepts":["sons","children"],"note":""},{"oe":"forgiefene","pron":"for-YEE-eh-veh-neh","eng":"given up, surrendered","type":"participle","accepts":["given to","surrendered to","yielded to"],"note":"Given TO the earth. The earth receives them. She doesn't just cover them — they're given to her."}],"dive":"Princes' sons given to the earth. <span class='gi'>Eorþan forgiefene</span> — surrendered to the earth. The earth is the recipient. The dead are gifts to her. Animist burial: you return what was borrowed."},{"s":52,"st":"The Conclusion","oe":"Uton wē hycgan hwǣr wē hām āgen","pron":"OO-ton WEH HUE-gahn HWAHR WEH HAHM AH-gen","eng":"Let us consider where we have a home","mode":"word","words":[{"oe":"uton","pron":"OO-ton","eng":"let us","type":"hortative","accepts":["let us"],"note":"Uton — an exhortation. Let us. Collective."},{"oe":"hycgan","pron":"HUE-gahn","eng":"think, consider, direct the mind","type":"verb · infinitive","accepts":["think","consider","direct the mind"],"note":"Hycgan is deliberate directed thinking. Not just pondering — aiming the hyge."},{"oe":"hām","pron":"HAHM","eng":"home","type":"noun · masc","accepts":["home"],"note":"Where is home, if the earth decays and all companions are dead? The poem is about to answer."}],"dive":"Let us direct the mind to where home actually is. <span class='gi'>Hycgan</span> is operative thinking — you send the hyge somewhere. Where is the real hām?"},{"s":53,"st":"","oe":"ond þonne geþencan hū wē þider cumen","pron":"ond THON-neh yeh-THEN-kahn HOO WEH THIH-der KOO-men","eng":"and then consider how we thither may come","mode":"word","words":[{"oe":"geþencan","pron":"yeh-THEN-kahn","eng":"consider, think about","type":"verb · infinitive","accepts":["consider","think about"],"note":""},{"oe":"þider","pron":"THIH-der","eng":"thither, to that place","type":"adverb","accepts":["thither","to that place","there"],"note":""}],"dive":"How do we get there — to the real home? The poem asks the operative question: not just where, but how."},{"s":54,"st":"","oe":"ond wē þonne ēac tilien þæt wē tō mōten","pron":"ond WEH THON-neh EAK TIL-ee-en THAHT WEH TOH MOH-ten","eng":"and we then also strive that we to it may come","mode":"word","words":[{"oe":"tilien","pron":"TIL-ee-en","eng":"strive, labour, work toward","type":"verb · subjunctive","accepts":["strive","labour","work toward"],"note":"Tilian — to work toward something. Active striving, not passive hope."},{"oe":"mōten","pron":"MOH-ten","eng":"may, might, be allowed to","type":"verb · subjunctive","accepts":["may","might"],"note":""}],"dive":"Strive to reach it. <span class='gi'>Tilien</span> is labour — working toward the destination. The home isn't given. It's earned through effort."},{"s":55,"st":"","oe":"in þā ēcan ēadignesse","pron":"in THAH EH-kahn EH-ah-dig-nes-seh","eng":"into that eternal blessedness","mode":"word","words":[{"oe":"ēcan","pron":"EH-kahn","eng":"eternal, everlasting","type":"adjective","accepts":["eternal","everlasting"],"note":""},{"oe":"ēadignesse","pron":"EH-ah-dig-nes-seh","eng":"blessedness, happiness","type":"noun · dat","accepts":["blessedness","happiness","bliss"],"note":"Ēadig — blessed, happy, prosperous. The state of being fundamentally well."}],"dive":"Eternal blessedness. The Christian answer to where home is. But note: you have to <span class='gi'>tilien</span> — strive and labour — to get there. It's not passive salvation."},{"s":56,"st":"","oe":"þǣr is līf gelong on lufan Dryhtnes","pron":"THAHR is LEEF yeh-LONG on LOO-vahn DRUEH-tnes","eng":"where life depends on the love of the Lord","mode":"word","words":[{"oe":"gelong","pron":"yeh-LONG","eng":"dependent on, belonging to","type":"adjective","accepts":["dependent on","belonging to","resting on"],"note":"Gelong — gathered into, depending on. Life is gathered into God's love."},{"oe":"lufan","pron":"LOO-vahn","eng":"love","type":"noun · dat","accepts":["love"],"note":""},{"oe":"Dryhtnes","pron":"DRUEH-tnes","eng":"the Lord's","type":"noun · gen","accepts":["the Lord's","God's"],"note":""}],"dive":"Life rests on the Lord's love. Whatever you make of the Christianity: the poem is saying the home you're looking for isn't on the earth. Everything earthly is lǣne — on loan. The permanent home is elsewhere."},{"s":57,"st":"","oe":"hyht on heofonum · þǣr is hyhsta blǣd","pron":"HUEHT on HEH-oh-voh-noom · THAHR is HUEH-stah BLAHD","eng":"hope in the heavens · where is the highest glory","mode":"word","words":[{"oe":"hyht","pron":"HUEHT","eng":"hope, joy, expectation","type":"noun · masc","accepts":["hope","joy","expectation"],"note":"Hyht — hope as active expectation. Not passive wishing but directed anticipation."},{"oe":"hyhsta","pron":"HUEH-stah","eng":"highest","type":"adj · superlative","accepts":["highest","greatest"],"note":""},{"oe":"blǣd","pron":"BLAHD","eng":"glory, prosperity","type":"noun · masc","accepts":["glory","prosperity","fame"],"note":"The blǣd that was brought low on earth exists in its highest form in heaven."}],"dive":"The <span class='gi'>blǣd</span> that was <span class='gi'>gehnǣged</span> — brought low on earth — stands at its highest in heaven. The poem closes the circle. The glory the world lost is preserved elsewhere."},{"s":58,"st":"","oe":"Dōm āga fǣder · on þā hālgan tīd","pron":"DOHM AH-gah FAH-der · on THAH HAHL-gahn TEED","eng":"Praise be to the Father · in that holy time","mode":"word","words":[{"oe":"dōm","pron":"DOHM","eng":"praise, glory, judgement","type":"noun · masc","accepts":["praise","glory","judgement","honour"],"note":"Dōm — praise/glory/judgement. What you earn and what is rendered. The final word of the poem."},{"oe":"fǣder","pron":"FAH-der","eng":"father","type":"noun · masc","accepts":["father"],"note":""},{"oe":"hālgan","pron":"HAHL-gahn","eng":"holy","type":"adj · dat","accepts":["holy","sacred"],"note":""},{"oe":"tīd","pron":"TEED","eng":"time, season","type":"noun · fem","accepts":["time","season"],"note":""}],"dive":"<span class='gi'>Dōm</span> closes it. The poem that began with a man freezing at sea ends with a word that means glory, judgement, and praise simultaneously. Everything in between — the suffering, the beauty, the loss — leads here."}]},{"id":"galdor","title":"Galdorcræft","short":"ᚷ","audio":"https://www.oldenglishaerobics.net/","lines":[{"s":1,"st":"Sīþgaldor · Journey Charm","oe":"Ic mē on þisse gyrde belūce","pron":"ITCH meh on THISS-eh YOORD-eh beh-LOO-cheh","eng":"I enclose myself in this rod","mode":"word","words":[{"oe":"ic","pron":"ITCH","eng":"I","type":"pronoun · nom","accepts":["I"],"note":"First person. The speaker acts on themselves."},{"oe":"mē","pron":"MEH","eng":"myself, me","type":"pronoun · acc","accepts":["myself","me"],"note":"Reflexive — the action circles back to the self"},{"oe":"on","pron":"ON","eng":"in, on, into","type":"preposition","accepts":["in","on","into"],"note":"Preposition of enclosure here — INTO the rod's protection"},{"oe":"þisse","pron":"THISS-eh","eng":"this","type":"demonstrative · dat fem","accepts":["this"],"note":"Dative feminine agreeing with gyrde"},{"oe":"gyrde","pron":"YOORD-eh","eng":"rod, staff, wand","type":"noun · fem · dat","accepts":["rod","staff","wand","stick","yard"],"note":"The physical implement. You hold it. Root of 'yard'. The charm requires a thing in the hand."},{"oe":"belūce","pron":"beh-LOO-cheh","eng":"enclose, lock","type":"verb · 1sg","accepts":["enclose","lock","shut in","lock in","close"],"note":"be- (around) + lūcan (to lock). You lock yourself INSIDE the rod's circle. Same root as ferþloca."}],"dive":"The opening act of the Journey Charm. You hold a staff. You speak. You lock yourself inside its boundary. <span class='gi'>Belūce</span> shares its root with <span class='gi'>ferþloca</span> — spirit-locker. The rod becomes a portable enclosure."},{"s":1,"oe":"and on Godes helde bebeode","pron":"and on GOD-es HELD-eh beh-BEH-od-eh","eng":"and into God's protection commend myself","mode":"word","words":[{"oe":"and","pron":"AND","eng":"and","type":"conjunction","accepts":["and"],"note":"Connective"},{"oe":"Godes","pron":"GOD-es","eng":"of God, God's","type":"noun · masc · gen","accepts":["God's","of God"],"note":"Christian overlay. Read through it to what was there before."},{"oe":"helde","pron":"HELD-eh","eng":"protection, keeping, guard","type":"noun · fem · dat","accepts":["protection","keeping","guard","hold","grace"],"note":"From healdan (to hold). The protection is a holding. You are held."},{"oe":"bebeode","pron":"beh-BEH-od-eh","eng":"commend, entrust","type":"verb · 1sg","accepts":["commend","entrust","commit","give over"],"note":"be- + bēodan (to command/offer). Active surrender, not passive hope."}],"dive":"<span class='gi'>Helde</span> from healdan — to hold. The protection is not a shield but a holding. <span class='gi'>Bebeode</span> — you actively commend yourself. The charm is not a prayer. It is a transaction."},{"s":1,"oe":"wið þone sāran stice · wið þone sāran slege","pron":"WITH THON-eh SAH-ran STITCH-eh · WITH THON-eh SAH-ran SLEH-yeh","eng":"against the sore stitch · against the sore blow","mode":"word","words":[{"oe":"wið","pron":"WITH","eng":"against, towards","type":"preposition","accepts":["against","towards","with"],"note":"Protective — against harm. Root of 'with' but OE meaning is adversarial."},{"oe":"þone","pron":"THON-eh","eng":"the","type":"demonstrative · acc masc","accepts":["the","that"],"note":"Accusative masculine — pointing at the specific threat"},{"oe":"sāran","pron":"SAH-ran","eng":"sore, painful","type":"adj · acc","accepts":["sore","painful","bitter","grievous"],"note":"Root of 'sore'. The pain is named directly."},{"oe":"stice","pron":"STITCH-eh","eng":"stitch, stab, piercing","type":"noun · masc · acc","accepts":["stitch","stab","piercing","prick","sting"],"note":"A sudden pain understood as something entering the body."},{"oe":"slege","pron":"SLEH-yeh","eng":"blow, strike","type":"noun · masc · acc","accepts":["blow","strike","hit","stroke"],"note":"From slēan (to strike). The blow that comes without warning."}],"dive":"The charm names what it protects against. <span class='gi'>Stice</span> — stitch. A sudden pain is not metaphorical: something has entered. <span class='gi'>Slege</span> — blow. The charm addresses the cause, not the symptom."},{"s":1,"oe":"wið þone grymman gryre","pron":"WITH THON-eh GROOM-man GROO-reh","eng":"against the fierce terror","mode":"word","words":[{"oe":"grymman","pron":"GROOM-man","eng":"fierce, grim, cruel","type":"adj · acc","accepts":["fierce","grim","cruel","terrible"],"note":"Root of 'grim'. The alliteration with gryre is deliberate."},{"oe":"gryre","pron":"GROO-reh","eng":"terror, horror, dread","type":"noun · masc · acc","accepts":["terror","horror","dread","fear"],"note":"The specific dread that rises in the chest before dawn."}],"dive":"<span class='gi'>Grymman gryre</span> — the g-r alliteration is the growl of the thing itself. The charm names the terror to gain power over it. What you name, you can address. What you address, you can command."},{"s":1,"oe":"and wið ǣlcne ondsǣtan þe on lond fare","pron":"and WITH ÆLK-neh OND-sæ-tan theh on LOND FAH-reh","eng":"and against every enemy that into the land comes","mode":"sentence","dive":"The final line of the protection sequence. <span class='gi'>Ondsǣtan</span> — enemy, adversary. The charm covers everything: stitch, blow, terror, and every adversary that enters the land. This is walking the bounds."},{"s":2,"st":"Æcerbot · Field Remedy","oe":"Erce, Erce, Erce · eorþan mōdor","pron":"EAR-cheh EAR-cheh EAR-cheh · EOR-than MOH-dor","eng":"Erce, Erce, Erce · mother of earth","mode":"word","words":[{"oe":"Erce","pron":"EAR-cheh","eng":"Erce","type":"name · unknown","accepts":["Erce","erce"],"note":"Nobody knows who she is. Triple invocation. She survived because the scribes could not erase what they did not understand."},{"oe":"eorþan","pron":"EOR-than","eng":"of earth, earth's","type":"noun · fem · gen","accepts":["of earth","earth's","of the earth"],"note":"Genitive — earth belongs to her, or she to earth"},{"oe":"mōdor","pron":"MOH-dor","eng":"mother","type":"noun · fem","accepts":["mother"],"note":"Same word, same meaning, a thousand years."}],"dive":"The triple invocation. <span class='gi'>Erce</span> survives in a single manuscript. Mother of earth — not a metaphor. A direct address to a named power. The charm instructs: face east when you speak this."},{"s":2,"oe":"geunne þē se ālwalda · ēce drihten","pron":"yeh-OON-neh THEH seh AHL-wal-dah · EH-cheh DRICH-ten","eng":"may the all-ruler grant you · eternal lord","mode":"word","words":[{"oe":"geunne","pron":"yeh-OON-neh","eng":"may grant, grant","type":"verb · subj","accepts":["grant","may grant"],"note":"Subjunctive — a wish, not a statement. The optative mood of operative speech."},{"oe":"þē","pron":"THEH","eng":"you, to you","type":"pronoun · dat","accepts":["you","to you","thee"],"note":"Speaking to the earth directly. Second person."},{"oe":"ālwalda","pron":"AHL-wal-dah","eng":"all-ruler, almighty","type":"noun · masc","accepts":["all-ruler","almighty","all-wielder"],"note":"Christian term over whatever was there before."},{"oe":"ēce","pron":"EH-cheh","eng":"eternal, everlasting","type":"adjective","accepts":["eternal","everlasting","forever"],"note":"Modifies drihten"},{"oe":"drihten","pron":"DRICH-ten","eng":"lord","type":"noun · masc","accepts":["lord","master","ruler"],"note":"From dryht (warband) — a lord who commands a retinue."}],"dive":"The Christian layer over the pagan substrate. <span class='gi'>Ālwalda</span> and <span class='gi'>drihten</span> are warrior-lord titles. The structure — speaking to the earth, asking a higher power to grant what the earth needs — predates the names."},{"s":2,"oe":"æcera wexendra · and wīdiendra","pron":"AK-er-ah WECKS-end-rah · and WEE-dee-end-rah","eng":"of acres waxing · and widening","mode":"word","words":[{"oe":"æcera","pron":"AK-er-ah","eng":"of acres, of fields","type":"noun · gen pl","accepts":["of acres","acres","fields","of fields"],"note":"Root of 'acre'. What is wished for."},{"oe":"wexendra","pron":"WECKS-end-rah","eng":"waxing, growing","type":"participle · gen pl","accepts":["waxing","growing","increasing"],"note":"Root of 'wax' (to grow). The growing is ongoing."},{"oe":"wīdiendra","pron":"WEE-dee-end-rah","eng":"widening, spreading","type":"participle · gen pl","accepts":["widening","spreading","expanding"],"note":"Root of 'widen'. The land spreads outward."}],"dive":"Two present participles: <span class='gi'>wexendra · wīdiendra</span>. The acres are actively waxing, actively widening. The charm asks for fields in the act of growing. The process, not the product."},{"s":2,"oe":"Hāl wes þū, folde · frā mōdor","pron":"HAHL wes THOO FOLD-eh · FRAH MOH-dor","eng":"Be whole, earth · generous mother","mode":"word","words":[{"oe":"hāl","pron":"HAHL","eng":"whole, hale, healthy","type":"adjective","accepts":["whole","hale","healthy","sound"],"note":"Root of 'whole', 'hale', 'health', 'holy'. All the same word. To be whole is to be holy."},{"oe":"wes","pron":"WES","eng":"be","type":"verb · imperative","accepts":["be"],"note":"Imperative. A command. You TELL the earth to be whole."},{"oe":"þū","pron":"THOO","eng":"you","type":"pronoun · nom","accepts":["you","thou"],"note":"Speaking to the earth as a person. Intimate."},{"oe":"folde","pron":"FOLD-eh","eng":"earth, ground, land","type":"noun · fem · voc","accepts":["earth","ground","land","soil","fold"],"note":"Vocative — directly addressed."},{"oe":"frā","pron":"FRAH","eng":"generous, bountiful","type":"adjective","accepts":["generous","bountiful","liberal","noble"],"note":"You name what she is so she can be it."},{"oe":"mōdor","pron":"MOH-dor","eng":"mother","type":"noun · fem · voc","accepts":["mother"],"note":"The earth addressed as mother."}],"dive":"<span class='gi'>Hāl wes þū</span> — be whole. The root connects whole, hale, health, and holy. <span class='gi'>Folde</span> in the vocative — you speak TO the ground beneath your feet. The Æcerbot instructs: kneel when you say this."},{"s":3,"st":"Nigon Wyrta Galdor · Nine Herbs Charm","oe":"Gemyne ðū, mugcwyrt · hwæt þū āmeldodest","pron":"yeh-MOON-eh THOO MOOJ-kwoort · HWÆT thoo ah-MEL-dod-est","eng":"Remember, mugwort · what you proclaimed","mode":"word","words":[{"oe":"gemyne","pron":"yeh-MOON-eh","eng":"remember","type":"verb · imperative","accepts":["remember","recall","be mindful"],"note":"You are commanding the plant to remember. Not asking."},{"oe":"ðū","pron":"THOO","eng":"you","type":"pronoun · nom","accepts":["you","thou"],"note":"Speaking to the plant directly."},{"oe":"mugcwyrt","pron":"MOOJ-kwoort","eng":"mugwort","type":"noun · fem","accepts":["mugwort"],"note":"Artemisia vulgaris. First of nine. Still grows on every roadside."},{"oe":"hwæt","pron":"HWÆT","eng":"what","type":"pronoun","accepts":["what"],"note":"Same hwæt that opens Beowulf."},{"oe":"āmeldodest","pron":"ah-MEL-dod-est","eng":"proclaimed, made known","type":"verb · 2sg past","accepts":["proclaimed","made known","announced","declared"],"note":"The plant once declared something. The charm calls it back to that declaration."}],"dive":"You speak to mugwort and command it to remember its own power. <span class='gi'>Gemyne</span> — same root as gemyndig (mindful). But here directed outward: you make the plant mindful of itself. The operative assumption: things have declared natures, and can be recalled to them."},{"s":3,"oe":"Wyrm cōm snīcan · toslāt hē mann","pron":"WOORM KOHM SNEE-kan · toh-SLAHT heh MANN","eng":"A serpent came creeping · it tore apart a man","mode":"word","words":[{"oe":"wyrm","pron":"WOORM","eng":"serpent, dragon, worm","type":"noun · masc","accepts":["serpent","dragon","worm","wyrm","snake"],"note":"The wyrm. The adversary in the charm."},{"oe":"cōm","pron":"KOHM","eng":"came","type":"verb · past 3sg","accepts":["came"],"note":"Past of cuman. It came."},{"oe":"snīcan","pron":"SNEE-kan","eng":"to creep, to crawl","type":"verb · inf","accepts":["creep","crawl","to creep","to crawl","sneak","to sneak"],"note":"Root of 'sneak'. Surreptitious movement."},{"oe":"toslāt","pron":"toh-SLAHT","eng":"tore apart, split","type":"verb · past 3sg","accepts":["tore apart","split","ripped","tore","destroyed"],"note":"to- (apart) + slāt. Total destruction."},{"oe":"mann","pron":"MANN","eng":"a person, a man","type":"noun · masc","accepts":["man","person","a man","a person"],"note":"Generic — any person."}],"dive":"<span class='gi'>Wyrm cōm snīcan</span> — the serpent came creeping. <span class='gi'>Snīcan</span> — root of sneak. <span class='gi'>Toslāt</span> — the to- prefix means complete destruction. The charm names the worst first."},{"s":3,"oe":"Ðā genam Wōden nigon wuldortānas","pron":"THAH yeh-NAM WOH-den NIG-on WOOL-dor-TAH-nas","eng":"Then Woden took nine glory-twigs","mode":"word","words":[{"oe":"ðā","pron":"THAH","eng":"then","type":"adverb","accepts":["then","at that time"],"note":"The pivot. After the wyrm's attack — then Woden acts."},{"oe":"genam","pron":"yeh-NAM","eng":"took, seized","type":"verb · past 3sg","accepts":["took","seized","grasped"],"note":"ge- = completed action. Decisive."},{"oe":"Wōden","pron":"WOH-den","eng":"Woden, Odin","type":"name","accepts":["Woden","Odin","Wodan"],"note":"Named in a Christian manuscript. The monks left him in because the charm would not work without him."},{"oe":"nigon","pron":"NIG-on","eng":"nine","type":"numeral","accepts":["nine","9"],"note":"The ritual number throughout the charm."},{"oe":"wuldortānas","pron":"WOOL-dor-TAH-nas","eng":"glory-twigs","type":"noun · masc · acc pl","accepts":["glory-twigs","glory twigs","glorious twigs","wondrous branches"],"note":"wuldor (glory) + tān (twig). Nine branches become nine herbs."}],"dive":"Woden in a Christian manuscript. <span class='gi'>Wuldortānas</span> — glory-twigs. The operative principle: counter with the same number, reversed."},{"s":3,"oe":"slōh ðā þā næddran · ðæt hēo on nigon tofleah","pron":"SLOH thah thah NÆD-ran · thæt HEH-oh on NIG-on toh-FLEH-ah","eng":"struck then the serpent · so it flew into nine pieces","mode":"word","words":[{"oe":"slōh","pron":"SLOH","eng":"struck, slew","type":"verb · past 3sg","accepts":["struck","slew","hit","smote"],"note":"Past of slēan. Root of 'slay'. Woden's blow."},{"oe":"næddran","pron":"NÆD-ran","eng":"serpent, adder","type":"noun · fem · acc","accepts":["serpent","adder","snake","viper"],"note":"Root of 'adder' (a nadder > an adder)."},{"oe":"nigon","pron":"NIG-on","eng":"nine","type":"numeral","accepts":["nine","9"],"note":"Nine herbs, nine twigs, nine pieces."},{"oe":"tofleah","pron":"toh-FLEH-ah","eng":"flew apart, scattered","type":"verb · past 3sg","accepts":["flew apart","scattered","flew into pieces","dispersed"],"note":"to- (apart) + flēon (to fly). Complete dispersal."}],"dive":"The serpent struck into nine pieces. <span class='gi'>Tofleah</span> — flew apart. Each piece becomes a condition the herbs cure. What was one evil broken into manageable parts."},{"s":4,"st":"Wið Færstice · Against Elf-Shot","oe":"Hlude wǣran hȳ · lā hlude","pron":"HLOOD-eh WÆHR-an HOO · LAH HLOOD-eh","eng":"Loud were they · lo, loud","mode":"word","words":[{"oe":"hlude","pron":"HLOOD-eh","eng":"loud, loudly","type":"adverb","accepts":["loud","loudly"],"note":"The charm opens with sound. The hl- is itself loud in the mouth."},{"oe":"wǣran","pron":"WÆHR-an","eng":"were","type":"verb · past pl","accepts":["were"],"note":"Past plural. They were. Something happened."},{"oe":"hȳ","pron":"HOO","eng":"they","type":"pronoun · nom pl","accepts":["they"],"note":"The mighty women who ride through the air."},{"oe":"lā","pron":"LAH","eng":"lo, oh, indeed","type":"interjection","accepts":["lo","oh","indeed","alas"],"note":"The breath between the two hlude's."}],"dive":"<span class='gi'>Hlude · lā hlude</span> — the repetition IS the charm working. Say it aloud: the hl- forces breath through the mouth like wind."},{"s":4,"oe":"ðā hȳ ofer þone hlǣw ridan","pron":"THAH HOO OH-ver THON-eh HLÆW REE-dan","eng":"when they over the mound rode","mode":"word","words":[{"oe":"ofer","pron":"OH-ver","eng":"over, across","type":"preposition","accepts":["over","across","above"],"note":"They ride OVER the mound. Airborne."},{"oe":"hlǣw","pron":"HLÆW","eng":"mound, barrow, hill","type":"noun · masc · acc","accepts":["mound","barrow","hill","burial mound"],"note":"Often a burial mound. The riders come from the places of the dead."},{"oe":"ridan","pron":"REE-dan","eng":"to ride, rode","type":"verb","accepts":["ride","rode","to ride"],"note":"Root of 'ride'. Through the air over the mound."}],"dive":"They ride over the <span class='gi'>hlǣw</span> — the barrow. The riders come from between worlds. The mound is a threshold."},{"s":4,"oe":"Ūt, lytel spere · gif hēr inne sīe","pron":"OOT LOO-tel SPEH-reh · yif HEHR INN-eh SEE-eh","eng":"Out, little spear · if here within it be","mode":"word","words":[{"oe":"ūt","pron":"OOT","eng":"out","type":"adverb","accepts":["out"],"note":"One syllable. The operative core of the whole charm."},{"oe":"lytel","pron":"LOO-tel","eng":"little, small","type":"adjective","accepts":["little","small"],"note":"You diminish the weapon by naming it small."},{"oe":"spere","pron":"SPEH-reh","eng":"spear","type":"noun · neut","accepts":["spear","dart","point"],"note":"The pain is a spear. Naming it makes it removable."},{"oe":"gif","pron":"YIF","eng":"if","type":"conjunction","accepts":["if"],"note":"Root of 'if'. The conditional — a diagnostic."},{"oe":"hēr","pron":"HEHR","eng":"here","type":"adverb","accepts":["here"],"note":"In the body. Where the pain is."},{"oe":"inne","pron":"INN-eh","eng":"within, inside","type":"adverb","accepts":["within","inside","in"],"note":"Inside the body."},{"oe":"sīe","pron":"SEE-eh","eng":"may be, is","type":"verb · subj","accepts":["be","is","may be"],"note":"Subjunctive — the charm doesn't assume. It tests."}],"dive":"<span class='gi'>Ūt, lytel spere</span> — Out, little spear. The most direct operative formula in OE. You command the cause of pain to leave. You call it little. You name it a spear — which means it can be pulled out."},{"s":5,"st":"Bēo-galdor · Bee Charm","oe":"Sitte gē, sīgewīf · sīgað tō eorþan","pron":"SIT-teh YEH SEE-yeh-WEEF · SEE-gath toh EOR-than","eng":"Sit, victory-women · sink to earth","mode":"word","words":[{"oe":"sitte","pron":"SIT-teh","eng":"sit","type":"verb · imperative pl","accepts":["sit"],"note":"Command. Imperative plural."},{"oe":"gē","pron":"YEH","eng":"you (plural)","type":"pronoun · nom pl","accepts":["you","ye"],"note":"Addressing the whole swarm as one entity"},{"oe":"sīgewīf","pron":"SEE-yeh-WEEF","eng":"victory-women","type":"noun · fem · nom pl","accepts":["victory-women","victory women","triumphant women"],"note":"sige (victory) + wīf (women). The bees are warriors, not insects."},{"oe":"sīgað","pron":"SEE-gath","eng":"sink, descend","type":"verb · imperative pl","accepts":["sink","descend","settle","come down"],"note":"Sink — downward. To earth."},{"oe":"tō","pron":"TOH","eng":"to","type":"preposition","accepts":["to"],"note":"Direction"},{"oe":"eorþan","pron":"EOR-than","eng":"earth","type":"noun · fem · dat","accepts":["earth","ground","the earth"],"note":"Come down to earth."}],"dive":"Bees addressed as <span class='gi'>sīgewīf</span> — victory-women. The charm recognises something in the swarm's nature and speaks to it. The charmer commands because the charmer knows what the swarm is."},{"s":5,"oe":"nǣfre gē wilde tō wuda fleogan","pron":"NÆV-reh yeh WILD-eh toh WOOD-ah FLEH-oh-gan","eng":"never you wild to the wood fly","mode":"word","words":[{"oe":"nǣfre","pron":"NÆV-reh","eng":"never","type":"adverb","accepts":["never"],"note":"ne + ǣfre. Absolute prohibition."},{"oe":"wilde","pron":"WILD-eh","eng":"wild, wilful","type":"adjective","accepts":["wild","wilful","untamed"],"note":"The state being forbidden."},{"oe":"wuda","pron":"WOOD-ah","eng":"wood, forest","type":"noun · masc · dat","accepts":["wood","forest","woods"],"note":"The wild place. Where the swarm would be lost."},{"oe":"fleogan","pron":"FLEH-oh-gan","eng":"fly","type":"verb · inf","accepts":["fly","to fly"],"note":"The action forbidden."}],"dive":"<span class='gi'>Wilde tō wuda</span> — wild to the wood. Alliterative w-w binding. The charm holds the boundary between the kept and the lost."},{"s":6,"st":"Rūnstafas · The Rune Poem","oe":"ᚠ Feoh byþ frōfur · fīra gehwylcum","pron":"FEH-oh BOOTH FROH-fur · FEE-rah yeh-HWOOL-kum","eng":"ᚠ Wealth is a comfort · to every person","mode":"word","words":[{"oe":"feoh","pron":"FEH-oh","eng":"wealth, cattle, money","type":"noun · neut","accepts":["wealth","cattle","money","fee","property"],"note":"Root of 'fee'. Originally cattle. The first rune."},{"oe":"byþ","pron":"BOOTH","eng":"is (always, by nature)","type":"verb · 3sg","accepts":["is","is always"],"note":"Gnomic present. A truth about the nature of things."},{"oe":"frōfur","pron":"FROH-fur","eng":"comfort, consolation","type":"noun · fem","accepts":["comfort","consolation","solace","relief"],"note":"What wealth provides. But the full stanza qualifies this."},{"oe":"fīra","pron":"FEE-rah","eng":"of people, of men","type":"noun · gen pl","accepts":["of people","of men","of everyone"],"note":"Genitive plural."},{"oe":"gehwylcum","pron":"yeh-HWOOL-kum","eng":"to each, to every one","type":"pronoun · dat","accepts":["each","every","to each","to every one"],"note":"Dative — comfort TO each person."}],"dive":"Each Rune Poem stanza is a compressed meditation. <span class='gi'>Feoh</span> — wealth, cattle, fee. The full stanza warns: share it freely or lose honour. Wealth that moves is alive. Wealth that hoards is dead."},{"s":6,"oe":"ᚦ Þorn byþ ðearle scearp · ðegna gehwylcum","pron":"THORN BOOTH THEAR-leh SHARP · THEN-ah yeh-HWOOL-kum","eng":"ᚦ Thorn is extremely sharp · to every thane","mode":"word","words":[{"oe":"þorn","pron":"THORN","eng":"thorn","type":"noun · masc","accepts":["thorn"],"note":"The letter þ IS the thorn. The rune names itself."},{"oe":"ðearle","pron":"THEAR-leh","eng":"extremely, severely","type":"adverb","accepts":["extremely","severely","very","exceedingly"],"note":"Not just sharp — extremely sharp."},{"oe":"scearp","pron":"SHARP","eng":"sharp","type":"adjective","accepts":["sharp"],"note":"Root of 'sharp'. Same word."},{"oe":"ðegna","pron":"THEN-ah","eng":"of thanes, of warriors","type":"noun · gen pl","accepts":["of thanes","thanes","warriors","of warriors"],"note":"Even warriors find the thorn sharp."}],"dive":"<span class='gi'>Þorn</span> — the rune that names itself. What is sharp will cut you regardless of your standing. Respect the boundary."},{"s":6,"oe":"ᚩ Ōs byþ ordfruma · ǣlcre sprǣce","pron":"OHS BOOTH ORD-froo-mah · ÆLK-reh SPRÆKH-eh","eng":"ᚩ Mouth is the source · of all speech","mode":"word","words":[{"oe":"ōs","pron":"OHS","eng":"mouth, god, divine voice","type":"noun · masc","accepts":["mouth","god","divine voice","voice"],"note":"Ōs means both 'mouth' and connects to Norse áss (god). Both simultaneously."},{"oe":"ordfruma","pron":"ORD-froo-mah","eng":"source, origin, beginning","type":"noun · masc","accepts":["source","origin","beginning","first cause"],"note":"ord (point) + fruma (first). Where it all starts."},{"oe":"ǣlcre","pron":"ÆLK-reh","eng":"of every, of each","type":"adj · gen fem","accepts":["every","each","of every","of each"],"note":"Genitive feminine."},{"oe":"sprǣce","pron":"SPRÆKH-eh","eng":"speech, language","type":"noun · fem · gen","accepts":["speech","language","of speech"],"note":"Root of 'speak'. The mouth as origin of all galdor."}],"dive":"<span class='gi'>Ōs</span> — the most layered rune. Mouth AND god. The divine and the spoken are the same channel. The rune that explains why charms must be spoken aloud."},{"s":6,"oe":"ᚱ Rād byþ on recyde · rinca gehwylcum","pron":"RAHD BOOTH on REK-ood-eh · RINK-ah yeh-HWOOL-kum","eng":"ᚱ Riding seems easy · to every warrior in the hall","mode":"word","words":[{"oe":"rād","pron":"RAHD","eng":"riding, journey, road","type":"noun · fem","accepts":["riding","journey","road","ride"],"note":"Root of 'road' and 'ride'. The rune of travel."},{"oe":"recyde","pron":"REK-ood-eh","eng":"in the hall, in the house","type":"noun · masc · dat","accepts":["in the hall","hall","house","in the house"],"note":"When you're sitting inside, the journey seems easy."},{"oe":"rinca","pron":"RINK-ah","eng":"of warriors, of men","type":"noun · gen pl","accepts":["of warriors","warriors","of men"],"note":"A warrior-specific term."}],"dive":"<span class='gi'>Rād</span> seems easy from the hall. Much harder on the mile-paths. Don't confuse knowing about a thing with doing the thing."},{"s":6,"oe":"ᛇ Ēoh byþ ūtan · unsmeþe trēow","pron":"EH-oh BOOTH OO-tan · UN-smeth-eh TREH-ow","eng":"ᛇ Yew is outside · a rough tree","mode":"word","words":[{"oe":"ēoh","pron":"EH-oh","eng":"yew","type":"noun · masc","accepts":["yew","yew tree"],"note":"Lives a thousand years. The rune of endurance."},{"oe":"ūtan","pron":"OO-tan","eng":"outside, on the outside","type":"adverb","accepts":["outside","on the outside","without"],"note":"The yew stands outside. Not cultivated."},{"oe":"unsmeþe","pron":"UN-smeth-eh","eng":"rough, unsmooth","type":"adjective","accepts":["rough","unsmooth","harsh","rugged"],"note":"un- + smeþe (smooth). Not polished."},{"oe":"trēow","pron":"TREH-ow","eng":"tree","type":"noun · neut","accepts":["tree"],"note":"Root of 'tree' and 'true' and 'trust'. All the same root. What stands firm."}],"dive":"Rough outside, fire inside. <span class='gi'>Ūtan</span> — outside. A tree that endures a thousand years because it does not seek the comfort of the hall."},{"s":6,"oe":"ᛁ Īs byþ oferceald · ungemetum slidor","pron":"EES BOOTH OH-ver-keh-AHLD · UN-yeh-MET-um SLID-or","eng":"ᛁ Ice is very cold · immeasurably slippery","mode":"word","words":[{"oe":"īs","pron":"EES","eng":"ice","type":"noun · neut","accepts":["ice"],"note":"Root of 'ice'. The rune of frozen surfaces."},{"oe":"oferceald","pron":"OH-ver-keh-AHLD","eng":"very cold, exceedingly cold","type":"adjective","accepts":["very cold","exceedingly cold","overcold"],"note":"ofer- + ceald. More than cold."},{"oe":"ungemetum","pron":"UN-yeh-MET-um","eng":"immeasurably, beyond measure","type":"adverb","accepts":["immeasurably","beyond measure","excessively","exceedingly"],"note":"What cannot be measured."},{"oe":"slidor","pron":"SLID-or","eng":"slippery, treacherous","type":"adjective","accepts":["slippery","treacherous","sliding"],"note":"Root of 'slide' and 'slither'. The surface you cannot hold."}],"dive":"<span class='gi'>Īs</span> — cold beyond measure, slippery beyond grip. Ice glistens like gems, fair to look upon. Beautiful and lethal. What shines is not always safe."}],"hidden":true}];
