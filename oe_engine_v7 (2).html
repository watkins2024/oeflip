// ===== SRS ENGINE =====
const INTERVALS=[0,4,24,72,168,504];
const LEVEL_NAMES=['New','Just learned','Learning','Getting solid','Strong','In the mouth'];
const NEW_PER_DAY=5;

function getDB(){return JSON.parse(localStorage.getItem('oe_srs')||'{}')}
function saveDB(db){localStorage.setItem('oe_srs',JSON.stringify(db))}
function itemKey(type,idx){return type+':'+idx}
function getCard(db,key){return db[key]||{level:0,due:0,reps:0,last:0}}
function isDue(card){if(card.level===0)return false;return Date.now()>=card.due}

function respond(key,quality){
  const db=getDB();let card=getCard(db,key);
  if(quality===0){card.level=Math.max(1,card.level-1)}
  else if(quality===1){}
  else if(quality===2){card.level=Math.min(5,card.level+1);card.reps++}
  else if(quality===3){card.level=Math.min(5,card.level+2);card.reps++}
  card.due=Date.now()+(INTERVALS[card.level]*3600000);card.last=Date.now();
  db[key]=card;saveDB(db);
}

function startLearning(key){
  const db=getDB();db[key]={level:1,due:Date.now()+(INTERVALS[1]*3600000),reps:0,last:Date.now()};saveDB(db);
}

const ALL_ITEMS=[];
OPS.forEach((o,i)=>ALL_ITEMS.push({...o,key:itemKey('op',i),type:'line'}));
CHUNKS.forEach((c,i)=>ALL_ITEMS.push({...c,key:itemKey('ch',i),type:'chunk'}));

function getDueItems(){
  const db=getDB();
  return ALL_ITEMS.filter(item=>{const card=getCard(db,item.key);return card.level>0&&isDue(card)}).sort((a,b)=>{const ca=getCard(db,a.key),cb=getCard(db,b.key);return ca.level-cb.level});
}
function getNewItems(){const db=getDB();return ALL_ITEMS.filter(item=>!db[item.key]||getCard(db,item.key).level===0)}
function getTodayNewCount(){
  const db=getDB();const today=new Date().toDateString();let count=0;
  for(const k in db){const c=db[k];if(c.last&&new Date(c.last).toDateString()===today&&c.reps===0)count++}return count;
}

// ===== STATE =====
let tab='words',flipRevealed=false,currentQueue=[],queueIdx=0,browseFilter='all',textIdx=0;

function setTab(t){tab=t;flipRevealed=false;if(t==='today')buildQueue();render();window.scrollTo({top:0,behavior:'smooth'})}

function buildQueue(){
  const due=getDueItems();const newAvail=getNewItems();const newToday=Math.max(0,NEW_PER_DAY-getTodayNewCount());
  const newChunks=newAvail.filter(i=>i.type==='chunk').slice(0,newToday);
  const newLines=newAvail.filter(i=>i.type==='line').slice(0,Math.max(0,newToday-newChunks.length));
  currentQueue=[...due,...newChunks,...newLines];queueIdx=0;flipRevealed=false;
}

function render(){
  document.getElementById('tabs').innerHTML=[
    {id:'words',label:'\u{1f524} Words'},
    {id:'lines',label:'\u{1f4d6} Lines'},
    {id:'texts',label:'\u{1f4da} Texts'},
    {id:'drill',label:'\u26a1 Drill'},
    {id:'today',label:'\u{1f4cd} Today'},
    {id:'walk',label:'\u{1f6b6} Walk'},
    {id:'progress',label:'\u2b50'}
  ].map(t=>`<button class="tab ${tab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');
  const m=document.getElementById('main');
  ({today:rToday,words:rWords,lines:rAllLines,drill:rDrill,texts:rTexts,walk:rWalk,progress:rProgress})[tab](m);
}

function rToday(m){
  if(currentQueue.length===0)buildQueue();
  const db=getDB();const due=getDueItems();const total=ALL_ITEMS.length;
  const learning=ALL_ITEMS.filter(i=>{const c=getCard(db,i.key);return c.level>0&&c.level<5}).length;
  const known=ALL_ITEMS.filter(i=>getCard(db,i.key).level>=5).length;
  if(currentQueue.length===0||queueIdx>=currentQueue.length){
    m.innerHTML=`<div class="card" style="text-align:center;padding:30px"><h2>Done for now</h2><p>No items due. Come back after the walk.</p><p style="font-size:0.75em;color:var(--gold);margin-top:12px">${learning} learning · ${known} in the mouth · ${total-learning-known} waiting</p></div><div class="card"><h2>Next due</h2>${getNextDueHTML(db)}</div><div class="brand">Galdorcræft</div>`;
    return;
  }
  const item=currentQueue[queueIdx];const card=getCard(db,item.key);const isNew=card.level===0;const remaining=currentQueue.length-queueIdx;
  let h=`<div class="counter">${remaining} remaining · ${due.length} due · ${learning} learning · ${known} owned</div>`;
  if(!flipRevealed){
    h+=`<div class="flip ${item.type==='chunk'?'chunk':''}" onclick="flipRevealed=true;render()">${isNew?'<div style="font-size:0.6em;color:var(--gold);margin-bottom:4px">NEW</div>':''}<div class="eng" style="font-size:1.15em;font-style:normal;color:var(--text)">${item.eng}</div><div class="hint">say the OE first · then tap</div><div class="level">${LEVEL_NAMES[card.level]}</div></div>`;
  } else {
    h+=`<div class="flip ${item.type==='chunk'?'chunk':''}"><div class="oe">${item.oe}</div><div class="pron">${item.pron}</div><div class="eng">${item.eng}</div><div class="level">${LEVEL_NAMES[card.level]}${card.reps?' · '+card.reps+' reps':''}</div></div>`;
    if(isNew){
      h+=`<div class="card" style="text-align:center"><p><strong>Say it aloud. 5 times. Low in the jaw.</strong></p><p style="font-size:0.95em;color:var(--gold);font-weight:700;margin:8px 0">${item.pron}</p></div><div class="resp"><button class="btn-good" onclick="startLearning('${item.key}');nextCard()">Got it — next</button></div>`;
    } else {
      h+=`<div class="resp"><button class="btn-again" onclick="respond('${item.key}',0);nextCard()">Again</button><button class="btn-hard" onclick="respond('${item.key}',1);nextCard()">Hard</button><button class="btn-good" onclick="respond('${item.key}',2);nextCard()">Good</button><button class="btn-easy" onclick="respond('${item.key}',3);nextCard()">Easy</button></div>`;
    }
  }
  h+=`<div class="brand">Galdorcræft</div>`;m.innerHTML=h;
}
function nextCard(){queueIdx++;flipRevealed=false;render()}
function getNextDueHTML(db){
  const items=ALL_ITEMS.filter(i=>{const c=getCard(db,i.key);return c.level>0}).sort((a,b)=>getCard(db,a.key).due-getCard(db,b.key).due).slice(0,5);
  if(!items.length)return '<p>Start with the <strong>Words</strong> tab.</p>';
  return items.map(i=>{const c=getCard(db,i.key);const mins=Math.max(0,Math.round((c.due-Date.now())/60000));const time=mins<60?mins+'m':Math.round(mins/60)+'h';return `<div class="stat"><span class="lab">${i.oe}</span><span class="val">${mins<=0?'now':time}</span></div>`}).join('');
}

// ===== WORDS =====
function rWords(m){
  const db=getDB();
  const sits=[...new Set(CHUNKS.map(c=>c.sit))];
  const learned=CHUNKS.filter((c,ci)=>{const card=getCard(db,itemKey('ch',ci));return card.level>=5}).length;
  let h=`<div class="card"><h2>\u{1f524} Words</h2><p>The building blocks. Learn these first — they go into the mouth before lines do. Tap + Learn to add to daily rotation.</p>
  <p style="font-size:0.82em;color:var(--gold);font-weight:700">${learned} / ${CHUNKS.length} in the mouth</p></div>`;
  h+=`<div class="filter-row"><button class="filter-btn ${browseFilter==='all'?'active':''}" onclick="browseFilter='all';render()">All</button>${sits.map(s=>`<button class="filter-btn ${browseFilter===s?'active':''}" onclick="browseFilter='${s}';render()">${s}</button>`).join('')}</div>`;
  const chunks=browseFilter==='all'?CHUNKS:CHUNKS.filter(c=>c.sit===browseFilter);
  for(let i=0;i<chunks.length;i++){
    const ch=chunks[i];const ci=CHUNKS.indexOf(ch);const key=itemKey('ch',ci);const card=getCard(db,key);
    const status=card.level>=5?'known':card.level>0?'learning':'new';
    h+=`<div class="browse-item" style="display:flex;align-items:center;justify-content:space-between">
      <div style="flex:1">
        <div style="font-size:1.4em;font-weight:800;color:var(--text)">${ch.oe}</div>
        <div style="font-size:0.88em;color:var(--gold);font-weight:700">${ch.pron}</div>
        <div style="font-size:0.85em;color:var(--dim);font-style:italic">${ch.eng}</div>
      </div>
      <div style="text-align:right">
        <span class="bi-status s-${status}" style="display:block;margin-bottom:4px">${LEVEL_NAMES[card.level]}</span>
        ${card.level===0?`<button class="add-btn" onclick="event.stopPropagation();startLearning('${key}');render()">+ Learn</button>`:''}
      </div>
    </div>`;
  }
  h+=`<div class="brand">Galdorcræft</div>`;m.innerHTML=h;
}

// ===== LINES — all sources flat =====
function rAllLines(m){
  const db=getDB();
  const allLines=[];
  OPS.forEach((o,i)=>allLines.push({...o,src:'Operative',key:itemKey('op',i)}));
  TEXTS.forEach((t,ti)=>{t.lines.forEach((l,li)=>{
    allLines.push({...l,src:t.short||t.title,key:'txt:'+ti+':'+li});
  })});
  let h=`<div class="card"><h2>\u{1f4d6} Lines</h2><p>All lines from all sources. Tap to expand — word-by-word breakdowns, etymology, deep dives. Add any line to daily practice.</p>
  <p style="font-size:0.78em;color:var(--dim)">${allLines.length} lines across all texts</p></div>`;
  const srcNames=['All','Operative',...TEXTS.map(t=>t.short||t.title)];
  h+=`<div class="filter-row">${srcNames.map(s=>`<button class="filter-btn ${(browseFilter||'All')===s?'active':''}" onclick="browseFilter='${s}';render()">${s}</button>`).join('')}</div>`;
  const filtered=(browseFilter||'All')==='All'?allLines:allLines.filter(l=>l.src===browseFilter);
  for(let i=0;i<filtered.length;i++){
    const line=filtered[i];const id='aln_'+i;const card=getCard(db,line.key);const inSRS=card.level>0;
    if(line.st)h+=`<div style="font-size:0.72em;color:var(--gold);padding:10px 12px 2px;font-weight:700;border-top:1px solid var(--border);margin-top:4px">${line.st}</div>`;
    h+=`<div class="text-line" onclick="document.getElementById('${id}').classList.toggle('show')">
      <div class="tl-pron">${line.pron}${inSRS?` <span class="bi-status s-${card.level>=5?'known':'learning'}" style="font-size:0.75em">${LEVEL_NAMES[card.level]}</span>`:''}</div>
      <div class="tl-oe">${line.oe}</div>
      <div class="tl-eng">${line.eng}</div>
      <div style="font-size:0.6em;color:var(--light)">${line.src}</div>
    </div>`;
    h+=`<div class="text-detail" id="${id}">`;
    if(line.words){h+=`<div style="margin-bottom:10px">${line.words.map(w=>`<div class="wd"><span class="woe">${w.oe}</span> <span class="wen">${w.eng}</span><br><span class="wtype">${w.type||''}</span>${w.note?`<br><span style="font-size:0.85em;color:var(--dim);font-style:italic;display:block;margin-top:2px">${w.note}</span>`:''}</div>`).join('')}</div>`}
    if(line.dive)h+=`<div class="dive">${line.dive}</div>`;
    if(!inSRS){
      h+=`<div style="margin-top:8px;text-align:center"><button class="add-btn" onclick="event.stopPropagation();addLine(this,'${line.key.replace(/'/g,"\\'")}')">+ Add to daily practice</button></div>`;
    } else {
      h+=`<div style="margin-top:6px;text-align:center;font-size:0.7em;color:var(--green)">✅ In rotation</div>`;
    }
    h+=`</div>`;
  }
  h+=`<div class="brand">Galdorcræft</div>`;m.innerHTML=h;
}
function addLine(btn,key){
  let item;
  if(key.startsWith('op:')){const i=parseInt(key.split(':')[1]);item={...OPS[i],key:key,type:'line'}}
  else if(key.startsWith('txt:')){const p=key.split(':');const ti=parseInt(p[1]),li=parseInt(p[2]);const l=TEXTS[ti].lines[li];item={oe:l.oe,pron:l.pron,eng:l.eng,sit:'text',key:key,type:'line'}}
  if(item&&!ALL_ITEMS.find(i=>i.key===key))ALL_ITEMS.push(item);
  startLearning(key);
  if(btn){btn.outerHTML='<span style="font-size:0.7em;color:var(--green)">✅ Added</span>'}
}

// ===== DRILL =====
function rDrill(m){
  const db=getDB();const known=ALL_ITEMS.filter(i=>getCard(db,i.key).level>0);
  if(known.length<3){m.innerHTML=`<div class="empty">Learn at least 3 items in <strong>Words</strong> first.</div>`;return}
  if(!window._dp||window._dp.length===0){window._dp=[...known].sort(()=>Math.random()-0.5);window._di=0}
  const item=window._dp[window._di%window._dp.length];
  let h=`<div class="counter">${known.length} items in rotation</div>`;
  if(!flipRevealed){
    h+=`<div class="flip ${item.type==='chunk'?'chunk':''}" onclick="flipRevealed=true;render()"><div class="eng" style="font-size:1.15em;font-style:normal;color:var(--text)">${item.eng}</div><div class="hint">produce the OE · say it · then tap</div></div>`;
  } else {
    h+=`<div class="flip ${item.type==='chunk'?'chunk':''}"><div class="oe">${item.oe}</div><div class="pron">${item.pron}</div><div class="eng">${item.eng}</div></div><div class="resp"><button class="btn-again" onclick="respond('${item.key}',0);dN()">Missed</button><button class="btn-good" onclick="respond('${item.key}',2);dN()">Got it</button></div>`;
  }
  h+=`<div class="brand">Galdorcræft</div>`;m.innerHTML=h;
}
function dN(){window._di=(window._di||0)+1;flipRevealed=false;render()}

// ===== TEXTS — full reading =====
function rTexts(m){
  let h=`<div class="card"><h2>\u{1f4da} Full Texts</h2><p>The full poems with pronunciation. Tap any line for word-by-word and deep dive. The reward.</p></div>`;
  h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
    <a href="https://www.oldenglishaerobics.net/wanderer.php" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border:1px solid var(--border);border-radius:var(--rs)">\u{1f50a} Wanderer</a>
    <a href="https://www.oldenglishaerobics.net/seafarer.php" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border:1px solid var(--border);border-radius:var(--rs)">\u{1f50a} Seafarer</a>
    <a href="https://www.oldenglishaerobics.net/" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border:1px solid var(--border);border-radius:var(--rs)">\u{1f50a} OE Aerobics</a>
  </div>`;
  h+=`<div class="filter-row">${TEXTS.map((t,i)=>`<button class="filter-btn ${textIdx===i?'active':''}" onclick="textIdx=${i};render()">${t.short||t.title}</button>`).join('')}</div>`;
  const text=TEXTS[textIdx];const db=getDB();
  h+=`<div class="card"><h2>${text.title}</h2><p style="font-size:0.75em">${text.lines.length} lines</p></div>`;
  for(let li=0;li<text.lines.length;li++){
    const line=text.lines[li];const id='ftl_'+textIdx+'_'+li;
    if(line.st)h+=`<div style="font-size:0.72em;color:var(--gold);padding:10px 12px 2px;font-weight:700;border-top:1px solid var(--border);margin-top:6px">${line.st}</div>`;
    h+=`<div class="text-line" onclick="document.getElementById('${id}').classList.toggle('show')">
      <div class="tl-pron">${line.pron}</div>
      <div class="tl-oe">${line.oe}</div>
      <div class="tl-eng">${line.eng}</div>
    </div>`;
    h+=`<div class="text-detail" id="${id}">`;
    if(line.words){
      h+=`<div style="margin-bottom:10px">`;
      for(const w of line.words){
        h+=`<div class="wd"><span class="woe">${w.oe}</span> <span class="wen">${w.eng}</span><br><span class="wtype">${w.type||''}</span>`;
        if(w.note)h+=`<br><span style="font-size:0.85em;color:var(--dim);font-style:italic;display:block;margin-top:2px">${w.note}</span>`;
        h+=`</div>`;
      }
      h+=`</div>`;
    }
    if(line.dive)h+=`<div class="dive">${line.dive}</div>`;
    const srsKey='txt:'+textIdx+':'+li;const card=getCard(db,srsKey);
    h+=`<div style="margin-top:8px;text-align:center">${card.level>0?`<span style="font-size:0.7em;color:var(--green)">✅ In rotation (${LEVEL_NAMES[card.level]})</span>`:`<button class="add-btn" onclick="event.stopPropagation();addLine(this,'${srsKey}')">+ Add to daily practice</button>`}</div>`;
    h+=`</div>`;
  }
  h+=`<div class="brand">Galdorcræft</div>`;m.innerHTML=h;
}

// ===== WALK =====
function rWalk(m){
  let h=`<div class="card"><h2>\u{1f6b6} Pre-Walk Priming</h2><p>Tap a stage. Say each line aloud. Then walk.</p></div>`;
  for(const stage of WALK_SEQ){
    const stageOps=OPS.filter(o=>stage.sits.includes(o.sit));const stageChunks=CHUNKS.filter(c=>stage.sits.includes(c.sit));
    const id='stg_'+stage.stage.replace(/\s/g,'');
    h+=`<div class="stage"><div class="stage-h" onclick="document.getElementById('${id}').classList.toggle('open')"><h3>${stage.stage}</h3><span class="ct">${stageOps.length} lines · ${stageChunks.length} words</span></div><div class="stage-b" id="${id}"><div style="font-size:0.75em;color:var(--dim);padding:4px 0;font-style:italic">${stage.desc}</div>`;
    for(const op of stageOps){h+=`<div class="stage-item"><div class="si-pron">${op.pron}</div><div class="si-oe">${op.oe}</div><div class="si-eng">${op.eng}</div></div>`}
    if(stageChunks.length){h+=`<div style="font-size:0.7em;color:var(--gold);padding:6px 0 2px;font-weight:700">WORDS</div><div style="display:flex;flex-wrap:wrap;gap:4px;padding-bottom:6px">`;for(const ch of stageChunks){h+=`<span style="background:var(--gold-bg);border:1px solid var(--border);border-radius:var(--rs);padding:3px 8px;font-size:0.78em"><strong style="color:var(--gold)">${ch.oe}</strong> <span style="color:var(--dim)">${ch.eng}</span></span>`}h+=`</div>`}
    h+=`</div></div>`;
  }
  h+=`<div class="brand">Galdorcræft</div>`;m.innerHTML=h;
}

// ===== PROGRESS =====
function rProgress(m){
  const db=getDB();const counts=[0,0,0,0,0,0];let totalReps=0;
  ALL_ITEMS.forEach(i=>{const c=getCard(db,i.key);counts[c.level]++;totalReps+=c.reps||0});
  let textAdded=0;for(const k in db){if(k.startsWith('txt:'))textAdded++}
  const total=ALL_ITEMS.length;
  let h=`<div class="card"><h2>\u2b50 Progress</h2><div class="level-bar">${counts.map((c,i)=>c?`<div class="level-seg l${i}" style="flex:${c}">${c}</div>`:'').join('')}</div><div style="display:flex;gap:6px;flex-wrap:wrap;font-size:0.65em;margin-top:4px">${LEVEL_NAMES.map((n,i)=>`<span class="l${i}" style="padding:1px 6px;border-radius:4px;color:#fff">${n}: ${counts[i]}</span>`).join('')}</div></div>`;
  h+=`<div class="card">
    <div class="stat"><span class="lab">Words (chunks)</span><span class="val">${CHUNKS.length}</span></div>
    <div class="stat"><span class="lab">Operative lines</span><span class="val">${OPS.length}</span></div>
    <div class="stat"><span class="lab">Text lines added</span><span class="val">${textAdded}</span></div>
    <div class="stat"><span class="lab">In rotation</span><span class="val">${total-counts[0]}</span></div>
    <div class="stat"><span class="lab">In the mouth</span><span class="val">${counts[5]}</span></div>
    <div class="stat"><span class="lab">Total productions</span><span class="val">${totalReps}</span></div>
    <div class="stat"><span class="lab">Due now</span><span class="val">${getDueItems().length}</span></div>
  </div>`;
  h+=`<div class="card" style="text-align:center"><button class="add-btn" style="background:var(--red)" onclick="if(confirm('Reset all progress? Cannot be undone.')){localStorage.removeItem('oe_srs');location.reload()}">Reset all progress</button></div>`;
  h+=`<div class="brand">Galdorcræft</div>`;m.innerHTML=h;
}

buildQueue();render();

</script>
