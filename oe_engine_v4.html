<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galdorcræft — OE Practice Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--surface:#16213e;--text:#e0d6c8;--dim:#9a938b;--light:#6b6560;--gold:#b8860b;--gold-lt:#f5e6c8;--gold-bg:rgba(184,134,11,0.15);--green:#4a9e6f;--green-bg:rgba(74,158,111,0.15);--blue:#5b8fb9;--blue-bg:rgba(91,143,185,0.15);--purple:#9b72b0;--purple-bg:rgba(155,114,176,0.15);--border:#2a2a4a;--r:12px;--rs:8px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);font-size:17px;line-height:1.7;min-height:100vh}
#app{max-width:600px;margin:0 auto;padding:10px 14px 60px}
header{text-align:center;padding:20px 0 12px}
header h1{font-size:1.3em;font-weight:800;color:var(--gold);letter-spacing:1px}
header .sub{font-size:0.7em;color:var(--dim)}
.tabs{display:flex;gap:3px;background:var(--surface);border-radius:var(--r);padding:4px;margin-bottom:12px}
.tab{flex:1;padding:8px 4px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.62em;border:none;cursor:pointer;background:transparent;color:var(--dim);border-radius:var(--rs);white-space:nowrap;transition:all 0.2s}
.tab.active{background:var(--gold);color:#fff}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.card h2{font-size:0.95em;color:var(--gold);margin-bottom:6px;font-weight:800}
.card p{font-size:0.85em;color:var(--dim);margin-bottom:6px}
/* SITUATION GROUPS */
.sit-group{margin-bottom:12px}
.sit-header{padding:10px 14px;background:var(--gold-bg);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sit-header h3{font-size:0.82em;color:var(--gold);font-weight:800;margin:0}
.sit-header .ct{font-size:0.7em;color:var(--dim)}
.sit-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.sit-body.open{display:block}
/* LINE CARD */
.line{padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.line:last-child{border-bottom:none}
.line:hover{background:rgba(184,134,11,0.08)}
.line.expanded{background:rgba(184,134,11,0.12)}
.line .pron{font-size:0.82em;color:var(--gold);font-weight:700;letter-spacing:0.5px;margin-bottom:2px}
.line .oe{font-size:1em;color:var(--text);font-weight:600;margin-bottom:2px}
.line .eng{font-size:0.82em;color:var(--dim);font-style:italic}
.line .src{font-size:0.65em;color:var(--light);margin-top:2px}
/* EXPANDED */
.line-detail{display:none;padding:10px 14px;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border)}
.line-detail.show{display:block}
.wd{display:inline-block;background:var(--gold-bg);border:1px solid var(--border);border-radius:var(--rs);padding:4px 8px;margin:3px;font-size:0.78em}
.wd .woe{font-weight:700;color:var(--gold)}.wd .wen{color:var(--dim)}
.wd .wtype{font-size:0.8em;color:var(--light)}
.dive{font-size:0.82em;color:var(--dim);line-height:1.6;margin-top:8px;padding:8px;background:rgba(0,0,0,0.15);border-radius:var(--rs)}
.dive .gi{color:var(--gold);font-weight:700}
/* DRILL */
.drill-card{background:var(--surface);border:2px solid var(--gold);border-radius:var(--r);padding:20px;margin-bottom:10px;text-align:center}
.drill-sit{font-size:0.75em;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.drill-prompt{font-size:0.95em;color:var(--text);margin-bottom:12px}
.drill-input{width:100%;padding:12px;border:2px solid var(--border);border-radius:var(--rs);background:rgba(0,0,0,0.2);color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9em;outline:none;text-align:center}
.drill-input:focus{border-color:var(--gold)}
.drill-reveal{margin-top:12px;padding:14px;background:var(--gold-bg);border-radius:var(--rs);text-align:left}
.drill-reveal .pron{color:var(--gold);font-weight:700;font-size:0.85em}
.drill-reveal .oe{color:var(--text);font-weight:600;font-size:0.95em;margin:4px 0}
.drill-reveal .eng{color:var(--dim);font-style:italic;font-size:0.82em}
.btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82em;padding:10px 16px;border-radius:var(--rs);border:none;cursor:pointer;transition:all 0.2s}
.btn-g{background:var(--gold);color:#fff}.btn-g:hover{background:#9a7209}
.btn-s{background:transparent;border:1px solid var(--border);color:var(--dim)}.btn-s:hover{border-color:var(--gold);color:var(--gold)}
.btn-row{display:flex;gap:8px;justify-content:center;margin-top:10px}
/* CORE */
.core-badge{display:inline-block;padding:2px 6px;border-radius:6px;font-size:0.6em;font-weight:700;margin-left:6px}
.core-active{background:var(--green-bg);color:var(--green)}
.core-shelf{background:var(--blue-bg);color:var(--blue)}
.brand{font-size:0.55em;color:var(--light);text-align:center;margin-top:16px}
@media(max-width:400px){body{font-size:16px}}
</style>
</head>
<body>
<div id="app">
<header>
<h1>Galdorcr&aelig;ft</h1>
<div class="sub">Old English Practice Engine</div>
</header>
<div class="tabs" id="tabs"></div>
<div id="main"></div>
</div>
<script>
const TEXTS=
[{"id": "wanderer", "title": "Sē Wandrere", "short": "Wanderer", "audio": "https://www.oldenglishaerobics.net/wanderer.php", "lines": [{"s": 1, "st": "The Solitary One's Prayer", "oe": "Oft him ānhaga āre gebīdeð", "pron": "OFT him AHN-hah-gah AH-reh geh-BEE-deth", "eng": "Often the solitary one grace awaits", "mode": "word", "words": [{"oe": "oft", "pron": "OFT", "eng": "often", "type": "adverb", "accepts": ["often", "frequently"], "note": "Same word survived unchanged a thousand years"}, {"oe": "him", "pron": "HIM", "eng": "him, for him", "type": "pronoun · dative", "accepts": ["him", "for him", "to him"], "note": "Dative — grace is awaited FOR him"}, {"oe": "ānhaga", "pron": "AHN-hah-gah", "eng": "solitary one, lone-dweller", "type": "noun · masc", "accepts": ["solitary one", "lone-dweller", "loner", "solitary", "hermit"], "note": "ān (one) + haga (enclosure) — enclosed in oneness"}, {"oe": "āre", "pron": "AH-reh", "eng": "grace, mercy, honour", "type": "noun · fem · gen", "accepts": ["grace", "mercy", "honour", "honor"], "note": "Genitive — waits FOR grace. Ār only flows between people."}, {"oe": "gebīdeð", "pron": "geh-BEE-deth", "eng": "awaits, endures", "type": "verb · 3sg", "accepts": ["awaits", "waits", "endures", "experiences", "waits for"], "note": "ge- = completion · bīdan = to wait AND endure. The waiting IS the endurance."}], "dive": "<span class='gi'>Ānhaga</span> — one-enclosure. Not just alone but walled into aloneness. <span class='gi'>Āre gebīdeð</span> — he waits for grace. Ār is relational — requires another person. He waits for something that cannot come while he is alone."}, {"s": 1, "oe": "metudes miltse · þēah þe hē mōdcearig", "pron": "MET-ood-es MILT-seh · THEH-ah theh heh MOHD-keh-ah-rig", "eng": "the creator's mercy · though he mind-sorrowful", "mode": "word", "words": [{"oe": "metudes", "pron": "MET-ood-es", "eng": "of the creator", "type": "noun · masc · gen", "accepts": ["creator's", "of the creator", "god's"], "note": "From metan (to measure) — god as measurer of fate"}, {"oe": "miltse", "pron": "MILT-seh", "eng": "mercy, kindness", "type": "noun · fem", "accepts": ["mercy", "kindness", "compassion", "pity"], "note": "What the creator might extend"}, {"oe": "þēah þe", "pron": "THEH-ah theh", "eng": "although, though", "type": "conjunction", "accepts": ["although", "though", "even though"], "note": "The hinge-word. Holds two truths together. Learn this cold."}, {"oe": "hē", "pron": "HEH", "eng": "he", "type": "pronoun · nom", "accepts": ["he"], "note": "Nominative — the subject"}, {"oe": "mōdcearig", "pron": "MOHD-keh-ah-rig", "eng": "mind-sorrowful, troubled in spirit", "type": "adj · compound", "accepts": ["mind-sorrowful", "sorrowful", "troubled", "anxious", "sad"], "note": "mōd + cearig — mind and feeling as one state"}], "dive": "<span class='gi'>Þēah þe</span> — although. The crucial connective. He waits for mercy ALTHOUGH he is mōdcearig. Grace and grief coexist. <span class='gi'>Mōdcearig</span> refuses to separate thinking from feeling."}, {"s": 1, "oe": "geond lagulāde longe sceolde", "pron": "geh-OND LAH-goo-LAH-deh LONG-eh SHEH-old-eh", "eng": "across the sea-way long had to", "mode": "word", "words": [{"oe": "geond", "pron": "geh-OND", "eng": "across, through", "type": "preposition", "accepts": ["across", "through", "throughout", "over"], "note": "Movement pervading a space"}, {"oe": "lagulāde", "pron": "LAH-goo-LAH-deh", "eng": "sea-way, water-path", "type": "noun · fem · acc", "accepts": ["sea-way", "sea way", "water-path", "ocean path", "sea path"], "note": "lagu (water) + lād (way) — kenning. The sea is a road."}, {"oe": "longe", "pron": "LONG-eh", "eng": "long, for a long time", "type": "adverb", "accepts": ["long", "for a long time", "a long time"], "note": "Duration — not a short crossing"}, {"oe": "sceolde", "pron": "SHEH-old-eh", "eng": "had to, must", "type": "verb · past · 3sg", "accepts": ["had to", "must", "was obliged", "should", "ought"], "note": "Past of sculan — compulsion, not choice"}], "dive": "<span class='gi'>Lagulād</span> — water-road. A kenning. The sea is a path with no destination. <span class='gi'>Sceolde</span> at the end: compulsion. He HAD to cross."}, {"s": 1, "oe": "hrēran mid hondum hrīmcealde sǣ", "pron": "HREH-ran mid HOND-um HREEM-cheh-ahld-eh SAE", "eng": "stir with hands the frost-cold sea", "mode": "word", "words": [{"oe": "hrēran", "pron": "HREH-ran", "eng": "to stir, to row", "type": "verb · inf", "accepts": ["stir", "to stir", "move", "to move", "row", "to row"], "note": "Physical rowing — hands in frozen water"}, {"oe": "mid", "pron": "MID", "eng": "with", "type": "preposition", "accepts": ["with", "by means of"], "note": "Takes dative. Same word, same meaning, a thousand years."}, {"oe": "hondum", "pron": "HOND-um", "eng": "hands", "type": "noun · fem · dat pl", "accepts": ["hands", "with hands"], "note": "-um marks dative plural across all genders"}, {"oe": "hrīmcealde", "pron": "HREEM-cheh-ahld-eh", "eng": "frost-cold", "type": "adj · compound", "accepts": ["frost-cold", "rime-cold", "frost cold", "freezing", "icy"], "note": "hrīm (frost) + ceald (cold) — temperature in the compound"}, {"oe": "sǣ", "pron": "SAE", "eng": "sea", "type": "noun · fem · acc", "accepts": ["sea", "ocean", "the sea"], "note": "Feminine — sēo sǣ. The sea is she."}], "dive": "The alliteration hammers: <strong>hr</strong>ēran · <strong>h</strong>ondum · <strong>hr</strong>īmcealde. Three h-sounds like breath through cold air. <span class='gi'>Mid</span> — learn this preposition. With. It's everywhere."}, {"s": 1, "oe": "wadan wræclāstas · wyrd bið ful ārǣd", "pron": "WAH-dan WRETCH-LAHS-tas · WOORD bith fool AH-RAED", "eng": "tread exile-tracks · fate is fully determined", "mode": "word", "words": [{"oe": "wadan", "pron": "WAH-dan", "eng": "to tread, to wade", "type": "verb · inf", "accepts": ["tread", "to tread", "wade", "to wade", "go", "walk"], "note": "Root of 'wade' — heavy movement through resistance"}, {"oe": "wræclāstas", "pron": "WRETCH-LAHS-tas", "eng": "exile-tracks", "type": "noun · masc · acc pl", "accepts": ["exile-tracks", "exile tracks", "exile paths", "paths of exile"], "note": "wræc (exile) + lāst (track) — physical footprints"}, {"oe": "wyrd", "pron": "WOORD", "eng": "fate, what is becoming", "type": "noun · fem", "accepts": ["fate", "destiny", "what becomes", "fortune", "wyrd"], "note": "From weorðan (to become) — not fixed but unfolding"}, {"oe": "bið", "pron": "BITH", "eng": "is (always)", "type": "verb · 3sg", "accepts": ["is", "will be", "is always"], "note": "Gnomic — bið means 'is by nature', not just 'is right now'"}, {"oe": "ful", "pron": "FOOL", "eng": "fully, very", "type": "adverb", "accepts": ["fully", "very", "completely"], "note": "Intensifier"}, {"oe": "ārǣd", "pron": "AH-RAED", "eng": "determined, fixed, counselled", "type": "adj · pp", "accepts": ["determined", "resolved", "fixed", "ordained", "counselled", "decreed"], "note": "ā- + rǣd — fully read into existence. Same root as rǣdan."}], "dive": "<span class='gi'>Wyrd bið ful ārǣd</span> closes the stanza like a door. <span class='gi'>Ārǣd</span> shares its root with rǣdan — to read, to counsel. Fate has been fully read. It cannot be unread."}, {"s": 2, "st": "The Exile Speaks", "oe": "Swā cwæð eardstapa · earfeþa gemyndig", "pron": "SWAH KWÆTH EARD-stah-pah · EAR-feth-ah geh-MOOND-ig", "eng": "So spoke the earth-stepper · hardships mindful", "mode": "word", "words": [{"oe": "swā", "pron": "SWAH", "eng": "so, thus", "type": "adverb", "accepts": ["so", "thus", "in this way"], "note": "Narrative connector — 'so spoke...'"}, {"oe": "cwæð", "pron": "KWÆTH", "eng": "spoke, said", "type": "verb · past · 3sg", "accepts": ["spoke", "said", "quoth"], "note": "Past of cweðan — root of archaic 'quoth'"}, {"oe": "eardstapa", "pron": "EARD-stah-pah", "eng": "earth-stepper, land-treader", "type": "noun · masc", "accepts": ["earth-stepper", "earth stepper", "land-treader", "wanderer"], "note": "eard (land) + stapa (stepper) — defined by walking"}, {"oe": "earfeþa", "pron": "EAR-feth-ah", "eng": "of hardships", "type": "noun · gen pl", "accepts": ["hardships", "of hardships", "difficulties", "troubles"], "note": "Genitive plural — the hardships he carries"}, {"oe": "gemyndig", "pron": "geh-MOOND-ig", "eng": "mindful, remembering", "type": "adjective", "accepts": ["mindful", "remembering", "mindful of", "aware"], "note": "From gemynd (memory) — carrying memory as weight"}], "dive": "<span class='gi'>Eardstapa</span> — earth-stepper. Not wanderer. Stepper. The physical act of foot after foot. <span class='gi'>Earfeþa gemyndig</span> — mindful of hardships. Memory in OE is not passive. It is carrying."}, {"s": 2, "oe": "wrāþra wælsleahta · winemǣga hryre", "pron": "WRAH-thrah WÆHL-sleaht-ah · WEEN-eh-MAE-gah HROO-reh", "eng": "of cruel slaughters · of dear-kinsmen's fall", "mode": "sentence", "dive": "Three genitives stacked: cruel slaughters, dear-kinsmen's fall. Each one a weight on <span class='gi'>gemyndig</span> from the previous line. The memory is specific — not abstract suffering but particular deaths of particular people."}, {"s": 2, "oe": "Oft ic sceolde āna ūhtna gehwylce", "pron": "OFT itch SHEH-old-eh AH-nah OOKHT-nah geh-HWOOL-cheh", "eng": "Often I had to alone each dawn-hour", "mode": "word", "words": [{"oe": "ic", "pron": "ITCH", "eng": "I", "type": "pronoun · nom", "accepts": ["I"], "note": "First person. The voice shifts to direct speech."}, {"oe": "sceolde", "pron": "SHEH-old-eh", "eng": "had to, must", "type": "verb · past · 1sg", "accepts": ["had to", "must", "was obliged"], "note": "Same verb as line 3 — compulsion again"}, {"oe": "āna", "pron": "AH-nah", "eng": "alone", "type": "adjective", "accepts": ["alone", "on my own", "solitary"], "note": "The condition. Not chosen solitude — enforced."}, {"oe": "ūhtna", "pron": "OOKHT-nah", "eng": "of dawn-hours, pre-dawn", "type": "noun · gen pl", "accepts": ["dawn-hours", "dawn hours", "pre-dawn", "dawn", "before dawn"], "note": "ūht = the hour before dawn — the liminal time"}, {"oe": "gehwylce", "pron": "geh-HWOOL-cheh", "eng": "each, every", "type": "pronoun", "accepts": ["each", "every", "each one", "every one"], "note": "ge- (collective) + hwylc (which/each) — every single one"}], "dive": "<span class='gi'>Ūhtna gehwylce</span> — each dawn-hour. He does this every morning. The grief is not an event but a routine. Dawn practice as sorrow."}, {"s": 2, "oe": "mīne ceare cwīþan · nis nū cwicra nān", "pron": "MEE-neh KEH-ah-reh KWEETH-an · nis noo KWITCH-rah NAHN", "eng": "my cares bewail · there is not now of the living none", "mode": "word", "words": [{"oe": "mīne", "pron": "MEE-neh", "eng": "my", "type": "possessive · acc pl", "accepts": ["my", "mine"], "note": "Accusative plural agreeing with ceare"}, {"oe": "ceare", "pron": "KEH-ah-reh", "eng": "cares, sorrows", "type": "noun · fem · acc pl", "accepts": ["cares", "sorrows", "griefs", "troubles", "worries"], "note": "The things he carries — accusative, the object of bewailing"}, {"oe": "cwīþan", "pron": "KWEETH-an", "eng": "to bewail, to lament", "type": "verb · inf", "accepts": ["bewail", "lament", "to bewail", "to lament", "mourn"], "note": "Not just speaking — speaking pain specifically"}, {"oe": "nis", "pron": "NIS", "eng": "is not, there is not", "type": "verb", "accepts": ["is not", "there is not", "not is"], "note": "Contraction of ne + is — negation fused with the verb"}, {"oe": "nū", "pron": "NOO", "eng": "now", "type": "adverb", "accepts": ["now"], "note": "The present tense of absence"}, {"oe": "cwicra", "pron": "KWITCH-rah", "eng": "of the living", "type": "adj · gen pl", "accepts": ["of the living", "living", "alive", "of living ones"], "note": "Root of 'quick' — originally meant alive"}, {"oe": "nān", "pron": "NAHN", "eng": "none, no one", "type": "pronoun", "accepts": ["none", "no one", "not one", "nobody"], "note": "ne + ān — not one. Double negative intensifies."}], "dive": "<span class='gi'>Nis nū cwicra nān</span> — there is not now among the living anyone. The wound beneath the exile: not just loss of hall and lord but loss of someone to speak to."}, {"s": 2, "oe": "þe ic him mōdsefan mīnne durre", "pron": "theh itch him MOHD-sef-an MEEN-eh DOOR-eh", "eng": "to whom I my mind-heart dare", "mode": "sentence", "dive": "<span class='gi'>Mōdsefa</span> — mind-heart. Deeper than mōd alone: mōd (mind/heart) + sefa (feeling/inner self). The interior has no audience. <span class='gi'>Durre</span> — dare. Subjunctive. Even if someone existed, would he dare?"}, {"s": 2, "oe": "sweotule āsecgan", "pron": "SWEH-oh-tool-eh AH-sedg-an", "eng": "clearly speak", "mode": "sentence", "dive": "Two words that complete the previous thought: clearly speak. <span class='gi'>Sweotule</span> — openly, plainly. What he cannot do. The interior life has no outlet."}, {"s": 3, "st": "The Code of Silence", "oe": "Ic tō sōþe wāt þæt biþ in eorle", "pron": "ITCH toh SOHTH-eh WAHT thæt BITH in EOR-leh", "eng": "I as truth know that it is in a man", "mode": "word", "words": [{"oe": "tō", "pron": "TOH", "eng": "to, as, for", "type": "preposition", "accepts": ["to", "as", "for"], "note": "tō sōþe — as truth, in truth, truly"}, {"oe": "sōþe", "pron": "SOHTH-eh", "eng": "truth", "type": "noun · neut · dat", "accepts": ["truth", "sooth"], "note": "Dative after tō — 'as truth'. The plain word for truth."}, {"oe": "wāt", "pron": "WAHT", "eng": "know", "type": "verb · 1sg", "accepts": ["know", "I know"], "note": "From witan — to know. Ic wāt / ic nāt."}, {"oe": "þæt", "pron": "THÆHT", "eng": "that", "type": "conjunction", "accepts": ["that"], "note": "Introducing the subordinate clause — what he knows"}, {"oe": "biþ", "pron": "BITH", "eng": "is (always)", "type": "verb · 3sg", "accepts": ["is", "is always", "will be"], "note": "Gnomic — permanent truth"}, {"oe": "in", "pron": "IN", "eng": "in", "type": "preposition", "accepts": ["in"], "note": "Same word, same place, same meaning"}, {"oe": "eorle", "pron": "EOR-leh", "eng": "a man, a nobleman", "type": "noun · masc · dat", "accepts": ["man", "nobleman", "warrior", "earl"], "note": "Dative — the custom exists IN a man, inside him"}], "dive": "<span class='gi'>Ic tō sōþe wāt</span> — I know as truth. Not opinion. Known fact. What follows is the OE code of masculine endurance."}, {"s": 3, "oe": "indryhten þēaw · þæt hē his ferðlocan", "pron": "IN-drooht-en THEH-aw · thæt heh his FERTH-lok-an", "eng": "a noble custom · that he his spirit-locker", "mode": "word", "words": [{"oe": "indryhten", "pron": "IN-drooht-en", "eng": "noble, honourable", "type": "adjective", "accepts": ["noble", "honourable", "honorable", "worthy", "lordly"], "note": "inn + dryhten (lord) — inwardly lordly"}, {"oe": "þēaw", "pron": "THEH-aw", "eng": "custom, practice, habit", "type": "noun · masc", "accepts": ["custom", "practice", "habit", "virtue", "way"], "note": "The expected behaviour — what a proper man does"}, {"oe": "his", "pron": "HIS", "eng": "his", "type": "possessive", "accepts": ["his"], "note": ""}, {"oe": "ferðlocan", "pron": "FERTH-lok-an", "eng": "spirit-locker, heart-enclosure", "type": "noun · masc · acc", "accepts": ["spirit-locker", "spirit locker", "breast", "heart", "heart-enclosure", "chest"], "note": "ferð (spirit) + loca (enclosure) — the chest as locked container for feeling"}], "dive": "<span class='gi'>Ferðloca</span> — spirit-locker. The first of two kennings for the heart. The chest is a locked room. What's inside must stay inside."}, {"s": 3, "oe": "fæste binde · healde his hordcofan", "pron": "FÆST-eh BIND-eh · HEH-ald-eh his HORD-kof-an", "eng": "fast bind · hold his treasure-chamber", "mode": "word", "words": [{"oe": "fæste", "pron": "FÆST-eh", "eng": "fast, firmly", "type": "adverb", "accepts": ["fast", "firmly", "tightly", "securely"], "note": "The binding must be tight — no leakage"}, {"oe": "binde", "pron": "BIND-eh", "eng": "bind", "type": "verb · subj", "accepts": ["bind", "should bind", "must bind"], "note": "Subjunctive — what he ought to do"}, {"oe": "healde", "pron": "HEH-ald-eh", "eng": "hold, keep, guard", "type": "verb · subj", "accepts": ["hold", "keep", "guard", "should hold"], "note": "Subjunctive again — the duty"}, {"oe": "hordcofan", "pron": "HORD-kof-an", "eng": "treasure-chamber, heart", "type": "noun · masc · acc", "accepts": ["treasure-chamber", "treasure chamber", "heart", "hoard-chamber"], "note": "hord (treasure) + cofa (chamber) — second kenning for the same thing"}], "dive": "Two kennings for one thing: <span class='gi'>ferðloca</span> and <span class='gi'>hordcofa</span>. Spirit-locker and treasure-chamber. The heart is where you keep your treasure locked."}, {"s": 3, "oe": "hycge swā hē wille", "pron": "HOODGE-eh swah heh WIL-eh", "eng": "think as he will", "mode": "sentence", "dive": "<span class='gi'>Hycge swā hē wille</span> — let him think as he will. The thinking is free. The speaking is forbidden. Total internal freedom, total external restraint."}, {"s": 4, "st": "The Weary Spirit", "oe": "Ne mæg wērigmōd wyrde wiðstondan", "pron": "neh MAG WEH-rig-mohd WOOR-deh with-STOND-an", "eng": "Not can the weary-minded one fate withstand", "mode": "word", "words": [{"oe": "ne", "pron": "NEH", "eng": "not", "type": "negative", "accepts": ["not"], "note": "Sits before the verb. The basic negator."}, {"oe": "mæg", "pron": "MAG", "eng": "can, is able", "type": "verb · 3sg", "accepts": ["can", "is able", "may"], "note": "From magan — power/ability"}, {"oe": "wērigmōd", "pron": "WEH-rig-mohd", "eng": "weary-minded, exhausted in spirit", "type": "adj · compound", "accepts": ["weary-minded", "weary in mind", "exhausted", "weary spirited"], "note": "wērig (weary) + mōd (mind) — the fatigue is mental-spiritual"}, {"oe": "wyrde", "pron": "WOOR-deh", "eng": "fate", "type": "noun · fem · dat", "accepts": ["fate", "destiny", "wyrd"], "note": "Dative — withstand AGAINST fate"}, {"oe": "wiðstondan", "pron": "with-STOND-an", "eng": "to withstand, to resist", "type": "verb · inf", "accepts": ["withstand", "to withstand", "resist", "stand against"], "note": "wið (against) + stondan — same word, same meaning in modern English"}], "dive": "The Wanderer line you already know. <span class='gi'>Wērigmōd</span> — not just tired but weary in the seat of feeling. And fate cannot be withstood. This is not defeat — it is structural truth."}, {"s": 4, "oe": "ne se hrēo hyge helpe gefremman", "pron": "neh seh HREH-oh HOODGE-eh HELP-eh geh-FREM-an", "eng": "nor the troubled mind help produce", "mode": "sentence", "dive": "The troubled mind (<span class='gi'>hrēo hyge</span>) cannot produce help either. Two negatives: can't withstand fate AND can't think your way out. The weary spirit and the troubled mind are both helpless."}, {"s": 4, "oe": "Forðon dōmgeorne drēorigmōd", "pron": "for-THON DOHM-geh-orn-eh DREH-or-ig-mohd", "eng": "Therefore the glory-eager one dreary-minded", "mode": "sentence", "dive": "<span class='gi'>Dōmgeorne</span> — glory-eager. <span class='gi'>Drēorigmōd</span> — dreary/bloody-minded. The one who wants glory is the one with the bloodied mind. They're the same person."}, {"s": 4, "oe": "oft in hyra brēostcofan bindað fæste", "pron": "OFT in HOOR-ah BREHST-kof-an BIND-ath FÆST-eh", "eng": "often in their breast-chamber bind fast", "mode": "sentence", "dive": "Third kenning for the heart: <span class='gi'>brēostcofa</span> — breast-chamber. They bind fast in there. The ferðloca, hordcofa, brēostcofa — three names for the locked interior."}, {"s": 4, "oe": "Swā þisne middangeard ealra dōgra gehwām", "pron": "SWAH THIS-neh MID-an-geh-ard EAHL-rah DOHG-rah geh-HWAHM", "eng": "So this middle-earth each of all days", "mode": "sentence", "dive": "<span class='gi'>Middangeard</span> — middle-earth. The human world. Tolkien took the word directly. <span class='gi'>Ealra dōgra gehwām</span> — each of all days. Every day the world drēoseð."}, {"s": 4, "oe": "drēoseð ond fealleð", "pron": "DREH-oh-seth ond FEH-ahl-eth", "eng": "crumbles and falls", "mode": "word", "words": [{"oe": "drēoseð", "pron": "DREH-oh-seth", "eng": "crumbles, falls, decays", "type": "verb · 3sg", "accepts": ["crumbles", "falls", "decays", "declines", "perishes"], "note": "The same verb for warriors falling and joy falling. Everything drēoseð."}, {"oe": "fealleð", "pron": "FEH-ahl-eth", "eng": "falls", "type": "verb · 3sg", "accepts": ["falls"], "note": "Root of modern 'fall'. Paired with drēoseð — crumbles AND falls."}], "dive": "Two verbs for one motion. <span class='gi'>Drēoseð ond fealleð</span>. The world doesn't decline gracefully. It crumbles and falls. Every day."}, {"s": 5, "st": "The Gold-Friend in the Ground", "oe": "Gemon hē selesecgas ond sincþege", "pron": "GEH-mon heh SEL-eh-SEDGE-as ond SINK-theh-geh", "eng": "He remembers hall-warriors and treasure-receiving", "mode": "word", "words": [{"oe": "gemon", "pron": "GEH-mon", "eng": "he remembers", "type": "verb · 3sg", "accepts": ["remembers", "he remembers", "recalls"], "note": "From gemunan — involuntary memory"}, {"oe": "selesecgas", "pron": "SEL-eh-SEDGE-as", "eng": "hall-warriors", "type": "noun · masc · acc pl", "accepts": ["hall-warriors", "hall warriors", "hall-men", "retainers"], "note": "sele (hall) + secg (man) — defined by their place"}, {"oe": "ond", "pron": "OND", "eng": "and", "type": "conjunction", "accepts": ["and"], "note": "Variant spelling of 'and'"}, {"oe": "sincþege", "pron": "SINK-theh-geh", "eng": "treasure-receiving, gift-giving", "type": "noun · fem · acc", "accepts": ["treasure-receiving", "treasure receiving", "gift-receiving", "receiving treasure"], "note": "sinc (treasure) + þege (receiving) — the ritual"}], "dive": "<span class='gi'>Gemon</span> — remembers. Not chooses to remember. The memory comes to him. <span class='gi'>Selesecgas</span> — hall-warriors. They exist in relation to a place. Without the hall, they are nothing."}, {"s": 5, "oe": "hū hine on geoguðe his goldwine", "pron": "hoo HIN-eh on GEH-oh-gooth-eh his GOLD-ween-eh", "eng": "how him in youth his gold-friend", "mode": "word", "words": [{"oe": "hū", "pron": "HOO", "eng": "how", "type": "adverb", "accepts": ["how"], "note": "Same word survived"}, {"oe": "hine", "pron": "HIN-eh", "eng": "him", "type": "pronoun · acc", "accepts": ["him"], "note": "Accusative — he is the object of the lord's attention"}, {"oe": "geoguðe", "pron": "GEH-oh-gooth-eh", "eng": "youth", "type": "noun · fem · dat", "accepts": ["youth", "young days", "early days"], "note": "When things were whole"}, {"oe": "goldwine", "pron": "GOLD-ween-eh", "eng": "gold-friend, generous lord", "type": "noun · masc", "accepts": ["gold-friend", "gold friend", "generous lord", "lord", "ring-giver"], "note": "gold + wine (friend) — lord defined by generosity"}], "dive": "<span class='gi'>Goldwine</span> — the kenning that tells you everything. Not ruler. Not commander. Gold-friend. The lord's function was distribution."}, {"s": 5, "oe": "wenede tō wiste · wyn eal gedrēas", "pron": "WEN-ed-eh toh WIST-eh · WOON eahl geh-DREH-ahs", "eng": "accustomed to feasting · joy all has fallen", "mode": "word", "words": [{"oe": "wenede", "pron": "WEN-ed-eh", "eng": "accustomed, trained", "type": "verb · past · 3sg", "accepts": ["accustomed", "trained", "used to", "habituated"], "note": "The lord trained him up — personal formation"}, {"oe": "wiste", "pron": "WIST-eh", "eng": "feasting, food", "type": "noun · fem · dat", "accepts": ["feasting", "feast", "food", "sustenance", "banquet"], "note": "Communal feast — not just eating"}, {"oe": "wyn", "pron": "WOON", "eng": "joy, delight", "type": "noun · fem", "accepts": ["joy", "delight", "pleasure", "bliss"], "note": "Quieter than drēam — more personal"}, {"oe": "eal", "pron": "EAHL", "eng": "all, entirely", "type": "adjective", "accepts": ["all", "entirely", "completely"], "note": "Total. Everything."}, {"oe": "gedrēas", "pron": "geh-DREH-ahs", "eng": "has fallen, perished", "type": "verb · past · 3sg", "accepts": ["fell", "has fallen", "perished", "collapsed", "declined"], "note": "ge- + drēosan — completely fallen. Done."}], "dive": "<span class='gi'>Wyn eal gedrēas</span> — joy all has fallen. Three words. Total collapse. The ge- prefix marks completeness. Not fading. Fallen. Past."}, {"s": 6, "st": "The Dream on the Waves", "oe": "Þonne onwæcneð eft winelēas guma", "pron": "THON-eh on-WÆCH-neth EFT WEEN-eh-lehs GOO-mah", "eng": "Then awakens again the friendless man", "mode": "word", "words": [{"oe": "þonne", "pron": "THON-eh", "eng": "then, when", "type": "adverb", "accepts": ["then", "when"], "note": "Temporal — shifting to the waking moment"}, {"oe": "onwæcneð", "pron": "on-WÆCH-neth", "eng": "awakens", "type": "verb · 3sg", "accepts": ["awakens", "wakes", "wakes up"], "note": "on- = into. Waking INTO reality."}, {"oe": "eft", "pron": "EFT", "eng": "again, afterwards", "type": "adverb", "accepts": ["again", "afterwards", "once more", "back"], "note": "The repetition word — this happens every time"}, {"oe": "winelēas", "pron": "WEEN-eh-lehs", "eng": "friendless", "type": "adjective", "accepts": ["friendless", "without friends", "companionless"], "note": "wine (friend) + lēas (without) — the -lēas suffix strips"}, {"oe": "guma", "pron": "GOO-mah", "eng": "man, person", "type": "noun · masc", "accepts": ["man", "person", "warrior"], "note": "Poetic word for a human being"}], "dive": "<span class='gi'>Onwæcneð eft</span> — awakens again. The 'again' is the knife. This is not one bad morning. It's every morning. The friendless man wakes into absence repeatedly."}, {"s": 6, "oe": "gesihð him beforan fealwe wēgas", "pron": "geh-SIHTH him beh-FOR-an FEAHL-weh WAH-gas", "eng": "sees before him fallow waves", "mode": "word", "words": [{"oe": "gesihð", "pron": "geh-SIHTH", "eng": "sees", "type": "verb · 3sg", "accepts": ["sees", "beholds", "perceives"], "note": "ge- + sēon — sees fully, perceives"}, {"oe": "beforan", "pron": "beh-FOR-an", "eng": "before, in front of", "type": "preposition", "accepts": ["before", "in front of", "ahead"], "note": "Spatial — the waves are what he sees when he opens his eyes"}, {"oe": "fealwe", "pron": "FEAHL-weh", "eng": "fallow, dark, tawny", "type": "adjective", "accepts": ["fallow", "dark", "tawny", "grey", "gray", "dull"], "note": "The colour of winter waves — grey-brown-dark"}, {"oe": "wēgas", "pron": "WAH-gas", "eng": "waves", "type": "noun · masc · acc pl", "accepts": ["waves"], "note": "What he sees instead of the hall. Water where walls should be."}], "dive": "<span class='gi'>Fealwe wēgas</span> — fallow waves. Not blue, not green. Fallow — the colour of dead fields and winter water. The sea has the colour of absence."}, {"s": 6, "oe": "baþian brimfuglas · brǣdan feþra", "pron": "BAHTH-ee-an BRIM-fug-las · BRÆHD-an FETH-rah", "eng": "bathing sea-birds · spreading feathers", "mode": "sentence", "dive": "Sea-birds bathing and spreading feathers. Life continuing without him. The birds have the sea as home. He doesn't."}, {"s": 6, "oe": "hrēosan hrīm ond snāw · hagle gemenged", "pron": "HREH-oh-san HREEM ond SNAH · HAHG-leh geh-MENG-ed", "eng": "falling frost and snow · with hail mingled", "mode": "sentence", "dive": "Weather as emotional landscape. <span class='gi'>Hrēosan</span> — to fall, collapse. The same verb used for the fall of warriors. Frost falls like men fall."}, {"s": 6, "oe": "Þonne bēoð þȳ hefigran heortan benne", "pron": "THON-eh BEH-oth THOO HEF-ig-ran HEORT-an BEN-neh", "eng": "Then are the heavier the heart's wounds", "mode": "word", "words": [{"oe": "bēoð", "pron": "BEH-oth", "eng": "are", "type": "verb · pl", "accepts": ["are"], "note": "Plural present of bēon"}, {"oe": "þȳ", "pron": "THOO", "eng": "the (more), by that", "type": "instrumental", "accepts": ["the", "by that", "more"], "note": "Instrumental case — 'the heavier BY that'"}, {"oe": "hefigran", "pron": "HEF-ig-ran", "eng": "heavier, more grievous", "type": "adj · comparative", "accepts": ["heavier", "more heavy", "more grievous"], "note": "Comparative of hefig — grief has physical weight"}, {"oe": "heortan", "pron": "HEORT-an", "eng": "heart's, of the heart", "type": "noun · fem · gen", "accepts": ["heart's", "of the heart", "heart"], "note": "Genitive — the wounds belong to the heart"}, {"oe": "benne", "pron": "BEN-neh", "eng": "wounds", "type": "noun · fem · nom pl", "accepts": ["wounds", "injuries"], "note": "Physical word for emotional injury — the heart bleeds"}], "dive": "<span class='gi'>Hefigran</span> — heavier. The comparative. Not just heavy — heavier THAN BEFORE. Each repetition adds weight. Grief accumulates."}, {"s": 6, "oe": "sāre æfter swǣsne · sorg bið genīwad", "pron": "SAH-reh ÆHF-ter SWÆHS-neh · SORG bith geh-NEE-wad", "eng": "sore after the beloved · sorrow is renewed", "mode": "word", "words": [{"oe": "sāre", "pron": "SAH-reh", "eng": "sorely, painfully", "type": "adverb", "accepts": ["sorely", "painfully", "grievously"], "note": "Pain as adverb — modifies the whole situation"}, {"oe": "æfter", "pron": "ÆHF-ter", "eng": "after, for, in longing for", "type": "preposition", "accepts": ["after", "for", "in longing for"], "note": "æfter + dative = longing for, grieving for"}, {"oe": "swǣsne", "pron": "SWÆHS-neh", "eng": "the beloved, the dear one", "type": "adj/noun · acc", "accepts": ["beloved", "dear", "dear one", "beloved one"], "note": "What is lost — the dear kinsman, the own-one"}, {"oe": "sorg", "pron": "SORG", "eng": "sorrow", "type": "noun · fem", "accepts": ["sorrow", "grief", "care"], "note": "The core grief-word"}, {"oe": "genīwad", "pron": "geh-NEE-wad", "eng": "renewed, made new", "type": "verb · pp", "accepts": ["renewed", "made new", "refreshed"], "note": "ge- + nīwe (new) — the grief is perpetually fresh"}], "dive": "<span class='gi'>Sorg bið genīwad</span> — sorrow is renewed. Not 'sorrow continues'. RENEWED. Made new. Fresh every time. The wound doesn't scar. It reopens."}, {"s": 6, "oe": "þonne māga gemynd mōd geondhweorfeð", "pron": "THON-eh MAH-gah geh-MOOND MOHD geh-OND-HWEORF-eth", "eng": "when kinsmen's memory the mind passes-through", "mode": "word", "words": [{"oe": "māga", "pron": "MAH-gah", "eng": "of kinsmen", "type": "noun · masc · gen pl", "accepts": ["kinsmen's", "of kinsmen", "kinsmen"], "note": "The kin-network — plural genitive"}, {"oe": "gemynd", "pron": "geh-MOOND", "eng": "memory, remembrance", "type": "noun · fem", "accepts": ["memory", "remembrance", "mind"], "note": "The memory as active force"}, {"oe": "mōd", "pron": "MOHD", "eng": "mind, heart, spirit", "type": "noun · neut · acc", "accepts": ["mind", "heart", "spirit"], "note": "The accusative — memory passes THROUGH the mind"}, {"oe": "geondhweorfeð", "pron": "geh-OND-HWEORF-eth", "eng": "passes through, turns through", "type": "verb · 3sg", "accepts": ["passes through", "turns through", "traverses", "moves through"], "note": "geond (through) + hweorfan (to turn) — memory as weather moving through a valley"}], "dive": "<span class='gi'>Geondhweorfeð</span> — passes through. Memory doesn't sit still. It MOVES through the mind like weather through a valley. You can't hold it. It transits."}, {"s": 6, "oe": "grēteð glīwstafum · georne geondsceawað", "pron": "GREH-teth GLEE-stahf-um · GEH-orn-eh geh-OND-SHEH-ah-wath", "eng": "he greets with joy-staves · eagerly gazes-over", "mode": "word", "words": [{"oe": "grēteð", "pron": "GREH-teth", "eng": "greets, salutes", "type": "verb · 3sg", "accepts": ["greets", "salutes", "hails"], "note": "He greets them — with everything he has"}, {"oe": "glīwstafum", "pron": "GLEE-stahf-um", "eng": "with joy-staves, with music-marks", "type": "noun · masc · dat pl", "accepts": ["joy-staves", "joy staves", "joy-letters", "music marks"], "note": "glīw (joy) + stæf (letter/staff) — the fundamental marks of gladness"}, {"oe": "georne", "pron": "GEH-orn-eh", "eng": "eagerly, earnestly", "type": "adverb", "accepts": ["eagerly", "earnestly", "keenly", "intently"], "note": "Not casually — with hunger"}, {"oe": "geondsceawað", "pron": "geh-OND-SHEH-ah-wath", "eng": "gazes over, surveys", "type": "verb · 3sg", "accepts": ["gazes over", "surveys", "looks over", "examines"], "note": "geond (over/through) + scēawian (to see) — searching vision"}], "dive": "<span class='gi'>Glīwstafum</span> — the heartbreak word. Joy-staves. He greets them with the fundamental elements of gladness. The capacity for joy is intact. There is no one to receive it."}, {"s": 6, "oe": "secga geseldan · swimmað eft on weg", "pron": "SETCH-ah geh-SELD-an · SWIM-ath EFT on WEG", "eng": "the companions of men · they swim again away", "mode": "word", "words": [{"oe": "secga", "pron": "SETCH-ah", "eng": "of men, of warriors", "type": "noun · masc · gen pl", "accepts": ["of men", "of warriors", "men's"], "note": "Genitive plural of secg (man/warrior)"}, {"oe": "geseldan", "pron": "geh-SELD-an", "eng": "companions, hall-fellows", "type": "noun · masc · nom pl", "accepts": ["companions", "hall-fellows", "comrades"], "note": "From seld (seat) — those who share your bench"}, {"oe": "swimmað", "pron": "SWIM-ath", "eng": "they swim", "type": "verb · pl", "accepts": ["swim", "they swim"], "note": "Present plural — happening now, in the vision"}, {"oe": "eft", "pron": "EFT", "eng": "again, away", "type": "adverb", "accepts": ["again", "away", "back"], "note": "Again. Every time. They always leave."}, {"oe": "on weg", "pron": "on WEG", "eng": "away", "type": "adverb", "accepts": ["away", "on the way", "onwards"], "note": "Literally 'on the way' — away from him"}], "dive": "<span class='gi'>Swimmað eft on weg</span> — they swim again away. The companions appear and leave. Every time. The 'again' confirms the repetition. This is not one dream but the dream that keeps coming."}, {"s": 6, "oe": "flēotendra ferð nō þǣr fela bringeð", "pron": "FLEH-oh-tend-rah FERTH noh THÆHR FEL-ah BRING-eth", "eng": "the floating spirits not there much bring", "mode": "word", "words": [{"oe": "flēotendra", "pron": "FLEH-oh-tend-rah", "eng": "of floating ones", "type": "participle · gen pl", "accepts": ["floating", "of floating ones", "drifting"], "note": "Present participle genitive plural — the floating ones"}, {"oe": "ferð", "pron": "FERTH", "eng": "spirit, mind, soul", "type": "noun · masc", "accepts": ["spirit", "mind", "soul", "spirits"], "note": "The essential self — deeper than mōd"}, {"oe": "nō", "pron": "NOH", "eng": "not, not at all", "type": "negative", "accepts": ["not", "not at all", "never"], "note": "Emphatic negative"}, {"oe": "þǣr", "pron": "THÆHR", "eng": "there", "type": "adverb", "accepts": ["there"], "note": "In that place — on the water where they appear"}, {"oe": "fela", "pron": "FEL-ah", "eng": "much, many", "type": "adjective", "accepts": ["much", "many", "a lot"], "note": "Not much. Not many words."}, {"oe": "bringeð", "pron": "BRING-eth", "eng": "brings", "type": "verb · 3sg", "accepts": ["brings", "carries"], "note": "Same word. They don't bring what he needs."}], "dive": "<span class='gi'>Flēotendra ferð</span> — the floating spirits. They appear. He greets them. They bring nothing back. No familiar speech. The recognition is one-directional."}, {"s": 6, "oe": "cūðra cwidegiedda · cearo bið genīwad", "pron": "KOOTH-rah KWID-eh-GEE-ed-ah · KEH-ah-roh bith geh-NEE-wad", "eng": "of known speech · care is renewed", "mode": "word", "words": [{"oe": "cūðra", "pron": "KOOTH-rah", "eng": "of known, of familiar", "type": "adj · gen pl", "accepts": ["known", "familiar", "of known", "of familiar"], "note": "What the spirits fail to bring — familiar words"}, {"oe": "cwidegiedda", "pron": "KWID-eh-GEE-ed-ah", "eng": "speech, utterances", "type": "noun · gen pl", "accepts": ["speech", "utterances", "sayings", "words", "spoken words"], "note": "cwide (speech) + giedd (song) — formal spoken words"}, {"oe": "cearo", "pron": "KEH-ah-roh", "eng": "care, grief", "type": "noun · fem", "accepts": ["care", "grief", "sorrow", "anxiety"], "note": "Variant of cearu — echoes sorg from earlier"}, {"oe": "genīwad", "pron": "geh-NEE-wad", "eng": "renewed", "type": "verb · pp", "accepts": ["renewed", "made new"], "note": "The refrain. Again. Renewed."}], "dive": "<span class='gi'>Cearo bið genīwad</span> echoes <span class='gi'>sorg bið genīwad</span> from six lines earlier. The poem keeps saying it. The grief doesn't age. It freshens. The joy goes out. The silence comes back."}, {"s": 9, "st": "The Wise One Sees", "oe": "Ongietan sceal glēaw hæle hū gǣstlīc bið", "pron": "ON-gee-tan sheahl GLEH-aw HAL-eh hoo GAHST-lich BITH", "eng": "Perceive must the wise man how ghostly it will be", "mode": "word", "words": [{"oe": "ongietan", "pron": "ON-gee-tan", "eng": "to perceive, to understand", "type": "verb · inf", "accepts": ["perceive", "to perceive", "understand", "grasp", "comprehend"], "note": "Deep perception. Not casual knowing."}, {"oe": "sceal", "pron": "SHEAHL", "eng": "must, shall", "type": "verb · 3sg", "accepts": ["must", "shall", "should", "ought"], "note": "The wise man MUST see this."}, {"oe": "glēaw", "pron": "GLEH-aw", "eng": "wise, prudent, keen", "type": "adjective", "accepts": ["wise", "prudent", "keen", "clever", "discerning"], "note": "Practical wisdom — perception not book-learning"}, {"oe": "hæle", "pron": "HAL-eh", "eng": "man, hero", "type": "noun · masc", "accepts": ["man", "hero", "warrior", "person"], "note": "Poetic word carrying dignity"}, {"oe": "gǣstlīc", "pron": "GAHST-lich", "eng": "ghostly, spiritual, terrible", "type": "adjective", "accepts": ["ghostly", "spiritual", "terrible", "desolate", "spectral"], "note": "From gāst — both holy terror and desolation"}], "dive": "The poem's pivot. <span class='gi'>Ongietan sceal</span> — must perceive. <span class='gi'>Gǣstlīc</span> vibrates between spiritual and terrifying."}, {"s": 9, "oe": "þonne ealre þisse worulde wela wēste stondeð", "pron": "THON-eh EAHL-reh THIS-eh WOR-uld-eh WEL-ah WEHST-eh STOND-eth", "eng": "when all this world's wealth waste stands", "mode": "word", "words": [{"oe": "ealre", "pron": "EAHL-reh", "eng": "of all", "type": "adj · gen", "accepts": ["all", "of all", "entire"], "note": "Genitive"}, {"oe": "worulde", "pron": "WOR-uld-eh", "eng": "of the world", "type": "noun · fem · gen", "accepts": ["world's", "of the world", "world"], "note": "Genitive feminine"}, {"oe": "wela", "pron": "WEL-ah", "eng": "wealth, prosperity", "type": "noun · masc", "accepts": ["wealth", "prosperity", "riches", "abundance"], "note": "Everything the world offers"}, {"oe": "wēste", "pron": "WEHST-eh", "eng": "waste, desolate", "type": "adjective", "accepts": ["waste", "desolate", "empty", "barren"], "note": "Root of 'waste'. Still there but emptied of meaning."}, {"oe": "stondeð", "pron": "STOND-eth", "eng": "stands", "type": "verb · 3sg", "accepts": ["stands"], "note": "Doesn't vanish. STANDS. Emptiness has architecture."}], "dive": "<span class='gi'>Wela wēste stondeð</span> — wealth stands waste. The wealth doesn't disappear. It stands desolate. The ruins remain. The life has left."}, {"s": 9, "oe": "swā nū missenlīce geond þisne middangeard", "pron": "swah noo MIS-en-lee-cheh geh-OND THIS-neh MID-an-geh-ard", "eng": "as now variously across this middle-earth", "mode": "sentence", "dive": "<span class='gi'>Missenlīce</span> — variously. The ruin takes different forms across the middangeard. Everywhere, but each place differently."}, {"s": 9, "oe": "winde biwāune weallas stondaþ", "pron": "WIND-eh bi-WAH-oon-eh WEAHL-as STOND-ath", "eng": "by wind blown-upon walls stand", "mode": "word", "words": [{"oe": "winde", "pron": "WIND-eh", "eng": "by wind", "type": "noun · masc · dat", "accepts": ["wind", "by wind", "the wind"], "note": "The wind is the agent"}, {"oe": "biwāune", "pron": "bi-WAH-oon-eh", "eng": "blown upon, buffeted", "type": "verb · pp", "accepts": ["blown upon", "buffeted", "blown", "wind-blown"], "note": "The wind works on the walls over time"}, {"oe": "weallas", "pron": "WEAHL-as", "eng": "walls", "type": "noun · masc · nom pl", "accepts": ["walls"], "note": "The ruins. They stand but the wind wears them."}, {"oe": "stondaþ", "pron": "STOND-ath", "eng": "stand", "type": "verb · pl", "accepts": ["stand", "they stand"], "note": "Present tense — they stand NOW"}], "dive": "The OE poets saw Roman ruins and read them as proof that everything falls. <span class='gi'>Weallas stondaþ</span> — present tense. Go look."}, {"s": 9, "oe": "hrīme bihrorene · hrȳðge þā ederas", "pron": "HREEM-eh bi-HROR-en-eh · HROODGE-eh thah ED-er-as", "eng": "with frost covered · storm-beaten the buildings", "mode": "word", "words": [{"oe": "hrīme", "pron": "HREEM-eh", "eng": "with frost", "type": "noun · masc · dat", "accepts": ["frost", "with frost", "rime"], "note": "Same hrīm from the opening. Frost everywhere."}, {"oe": "bihrorene", "pron": "bi-HROR-en-eh", "eng": "covered, fallen upon", "type": "verb · pp", "accepts": ["covered", "fallen upon", "encrusted"], "note": "bi- + hrēosan (to fall) — the verb of falling again"}, {"oe": "hrȳðge", "pron": "HROODGE-eh", "eng": "storm-beaten, ruinous", "type": "adjective", "accepts": ["storm-beaten", "ruinous", "battered", "decayed"], "note": "Beaten by storms. Time as weather."}, {"oe": "ederas", "pron": "ED-er-as", "eng": "buildings, enclosures", "type": "noun · masc · nom pl", "accepts": ["buildings", "enclosures", "dwellings", "houses"], "note": "The built environment — now ruined"}], "dive": "<span class='gi'>Hrīme bihrorene</span> — frost fallen on them. <span class='gi'>Hrēosan</span> again — frost falling, warriors falling, joy falling. Everything in this poem falls the same way."}, {"s": 9, "oe": "Wōriað þā wīnsalo · waldend licgað", "pron": "WOH-ree-ath thah WEEN-sah-loh · WAHLD-end LICH-gath", "eng": "Decay the wine-halls · rulers lie dead", "mode": "word", "words": [{"oe": "wōriað", "pron": "WOH-ree-ath", "eng": "decay, crumble", "type": "verb · pl", "accepts": ["decay", "crumble", "totter", "deteriorate"], "note": "Present tense — decaying NOW"}, {"oe": "wīnsalo", "pron": "WEEN-sah-loh", "eng": "wine-halls, mead-halls", "type": "noun · neut · nom pl", "accepts": ["wine-halls", "wine halls", "mead-halls", "mead halls"], "note": "Where the drēam was. Decaying."}, {"oe": "waldend", "pron": "WAHLD-end", "eng": "rulers, lords", "type": "noun · masc · nom pl", "accepts": ["rulers", "lords", "wielders", "leaders"], "note": "From wealdan (to wield)"}, {"oe": "licgað", "pron": "LICH-gath", "eng": "lie, lie dead", "type": "verb · pl", "accepts": ["lie", "lie dead", "are fallen"], "note": "Present tense — they lie NOW. The dead don't become past tense."}], "dive": "<span class='gi'>Wīnsalo</span> — wine-halls. Where the drēam was. <span class='gi'>Waldend licgað</span> — rulers lie dead. Present tense. Still lying."}, {"s": 9, "oe": "drēame bidrorene · duguþ eal gecrong", "pron": "DREHM-eh bi-DROR-en-eh · DOO-gooth eahl geh-KRONG", "eng": "of joy bereft · the company all perished", "mode": "word", "words": [{"oe": "drēame", "pron": "DREHM-eh", "eng": "of joy, of music", "type": "noun · masc · dat", "accepts": ["joy", "of joy", "music", "mirth"], "note": "Bereft OF joy. The drēam is what's been taken."}, {"oe": "bidrorene", "pron": "bi-DROR-en-eh", "eng": "bereft, deprived", "type": "verb · pp", "accepts": ["bereft", "deprived", "stripped of", "fallen from"], "note": "bi- + drēosan again — fallen FROM joy"}, {"oe": "duguþ", "pron": "DOO-gooth", "eng": "the company, proven warriors", "type": "noun · fem", "accepts": ["company", "host", "warriors", "retainers"], "note": "The heart of the hall. All gone."}, {"oe": "gecrong", "pron": "geh-KRONG", "eng": "perished, fell in battle", "type": "verb · past · 3sg", "accepts": ["perished", "fell", "died", "was killed"], "note": "ge- + cringan — to fall in battle. Total."}], "dive": "<span class='gi'>Duguþ eal gecrong</span> — the whole company perished. <span class='gi'>Eal</span>. All. No survivors."}, {"s": 9, "oe": "wlonc bi wealle", "pron": "WLONK bi WEAHL-eh", "eng": "proud by the wall", "mode": "sentence", "dive": "Three words. The warrior died proud, at the wall. Now both are ruins."}, {"s": 10, "st": "How They Died", "oe": "Sume wīg fornom · ferede in forðwege", "pron": "SOOM-eh WEEG for-NOM · FER-ed-eh in FORTH-weh-geh", "eng": "Some war took away · carried on the forth-way", "mode": "word", "words": [{"oe": "sume", "pron": "SOOM-eh", "eng": "some", "type": "pronoun", "accepts": ["some"], "note": "First of a list — different deaths"}, {"oe": "wīg", "pron": "WEEG", "eng": "war, battle", "type": "noun · neut", "accepts": ["war", "battle", "fight"], "note": "War as agent — war TOOK them"}, {"oe": "fornom", "pron": "for-NOM", "eng": "took away, destroyed", "type": "verb · past · 3sg", "accepts": ["took away", "destroyed", "carried off", "seized"], "note": "for- + niman — completely took"}, {"oe": "forðwege", "pron": "FORTH-weh-geh", "eng": "the forth-way, death's road", "type": "noun · masc · dat", "accepts": ["forth-way", "way forward", "death's road", "death road"], "note": "forð + weg — the one-way road"}], "dive": "<span class='gi'>Forðweg</span> — the forth-way. Death as a road that only goes forward. No return."}, {"s": 10, "oe": "sumne fugel oþbær ofer hēanne holm", "pron": "SOOM-neh FOO-gel oth-BAHR OF-er HEH-ahn-neh HOLM", "eng": "one a bird carried off over the high sea", "mode": "word", "words": [{"oe": "sumne", "pron": "SOOM-neh", "eng": "one, a certain one", "type": "pronoun · acc", "accepts": ["one", "a certain one"], "note": "Accusative — the bird carried THIS one"}, {"oe": "fugel", "pron": "FOO-gel", "eng": "bird", "type": "noun · masc", "accepts": ["bird", "fowl"], "note": "The carrion bird. Eagle or raven."}, {"oe": "oþbær", "pron": "oth-BAHR", "eng": "carried off, bore away", "type": "verb · past · 3sg", "accepts": ["carried off", "bore away", "took away"], "note": "oþ- + beran — carried away"}, {"oe": "holm", "pron": "HOLM", "eng": "sea, ocean", "type": "noun · masc · acc", "accepts": ["sea", "ocean", "water", "waves"], "note": "Another sea-word. OE has many."}], "dive": "A bird carried one over the high sea. The battlefield carrion-bird takes the body. The dead travel further than the living."}, {"s": 10, "oe": "sumne se hāra wulf dēaðe gedǣlde", "pron": "SOOM-neh seh HAH-rah WOOLF DEHTH-eh geh-DÆHLD-eh", "eng": "one the grey wolf with death shared", "mode": "word", "words": [{"oe": "hāra", "pron": "HAH-rah", "eng": "grey, hoary", "type": "adjective", "accepts": ["grey", "gray", "hoary", "grizzled"], "note": "The old grey wolf"}, {"oe": "wulf", "pron": "WOOLF", "eng": "wolf", "type": "noun · masc", "accepts": ["wolf"], "note": "The battlefield wolf"}, {"oe": "dēaðe", "pron": "DEHTH-eh", "eng": "with death", "type": "noun · masc · dat", "accepts": ["death", "with death"], "note": "The wolf shared the man WITH death. Death is the third party."}, {"oe": "gedǣlde", "pron": "geh-DÆHLD-eh", "eng": "shared, divided", "type": "verb · past · 3sg", "accepts": ["shared", "divided", "dealt"], "note": "ge- + dǣlan — root of 'deal'. Death is a transaction."}], "dive": "<span class='gi'>Dēaðe gedǣlde</span> — shared with death. The wolf and death divide the man between them. A transaction."}, {"s": 10, "oe": "sumne drēorighlēor in eorðscræfe eorl gehȳdde", "pron": "SOOM-neh DREH-or-ig-HLEH-or in EORTH-skref-eh EOR-l geh-HOOD-eh", "eng": "one dreary-faced in an earth-cave a man hid", "mode": "word", "words": [{"oe": "drēorighlēor", "pron": "DREH-or-ig-HLEH-or", "eng": "dreary-faced, sad-cheeked", "type": "adj · compound", "accepts": ["dreary-faced", "sad-faced", "mournful-faced", "bloody-faced"], "note": "drēorig + hlēor — the face shows the grief. Or the blood."}, {"oe": "eorðscræfe", "pron": "EORTH-skref-eh", "eng": "earth-cave, grave", "type": "noun · neut · dat", "accepts": ["earth-cave", "earth cave", "grave", "tomb"], "note": "The grave as a hole in the ground"}, {"oe": "gehȳdde", "pron": "geh-HOOD-eh", "eng": "hid, buried", "type": "verb · past · 3sg", "accepts": ["hid", "buried", "concealed"], "note": "From hȳdan — burial as hiding the dead"}], "dive": "The last of the list. <span class='gi'>Gehȳdde</span> — hid. Burial is hiding the dead in the earth."}, {"s": 11, "st": "The Creator Empties the World", "oe": "Ȳþde swā þisne eardgeard ælda Scyppend", "pron": "OOTH-deh swah THIS-neh EARD-geh-ard ALD-ah SHOOP-end", "eng": "Laid waste so this dwelling-place of men the Creator", "mode": "word", "words": [{"oe": "ȳþde", "pron": "OOTH-deh", "eng": "laid waste, devastated", "type": "verb · past · 3sg", "accepts": ["laid waste", "devastated", "destroyed", "emptied"], "note": "God is the subject. God devastated."}, {"oe": "eardgeard", "pron": "EARD-geh-ard", "eng": "dwelling-place, inhabited world", "type": "noun · masc · acc", "accepts": ["dwelling-place", "homeland", "inhabited world", "habitation"], "note": "eard + geard — the world as one yard"}, {"oe": "ælda", "pron": "ALD-ah", "eng": "of men", "type": "noun · gen pl", "accepts": ["of men", "of people", "men's"], "note": "Genitive plural"}, {"oe": "Scyppend", "pron": "SHOOP-end", "eng": "Creator, Shaper", "type": "noun · masc", "accepts": ["Creator", "Shaper", "God", "the Creator"], "note": "From scyppan — to shape. God as the one who shaped reality. And now unmakes it."}], "dive": "<span class='gi'>Ælda Scyppend</span> — the Shaper of men. And what does the Shaper do? <span class='gi'>Ȳþde</span> — laid waste. The Creator empties his own creation."}, {"s": 11, "oe": "oþ þæt burgwara breahtma lēase", "pron": "oth thæt BURG-wahr-ah BREHHT-mah LEH-ah-seh", "eng": "until the city-dwellers' noise bereft", "mode": "sentence", "dive": "Bereft of the city-dwellers' NOISE. Not bereft of people — of their sound. Silence as the sign of death."}, {"s": 11, "oe": "eald enta geweorc īdlu stōdon", "pron": "EAHLD ENT-ah geh-WEH-ork EED-loo STOH-don", "eng": "the old work of giants empty stood", "mode": "word", "words": [{"oe": "eald", "pron": "EAHLD", "eng": "old, ancient", "type": "adjective", "accepts": ["old", "ancient"], "note": "Same word."}, {"oe": "enta", "pron": "ENT-ah", "eng": "of giants", "type": "noun · gen pl", "accepts": ["giants", "of giants"], "note": "Tolkien took 'Ent' from this. Anglo-Saxons thought Roman ruins were built by giants."}, {"oe": "geweorc", "pron": "geh-WEH-ork", "eng": "work, construction", "type": "noun · neut", "accepts": ["work", "construction", "creation", "handiwork", "building"], "note": "The made thing. What the giants built."}, {"oe": "īdlu", "pron": "EED-loo", "eng": "empty, idle, void", "type": "adj · nom pl", "accepts": ["empty", "idle", "void", "vacant"], "note": "Root of 'idle'. Not destroyed — emptied."}, {"oe": "stōdon", "pron": "STOH-don", "eng": "stood", "type": "verb · past · pl", "accepts": ["stood"], "note": "They stood empty. The image frozen."}], "dive": "<span class='gi'>Eald enta geweorc</span> — the old work of giants. Tolkien's Ents. Roman ruins. The architecture remains. The life is gone."}, {"s": 12, "st": "The Ruined Wall", "oe": "genāp under nihthelm · swā hēo nō wǣre", "pron": "geh-NAHP UN-der NIHT-helm · swah HEH-oh NOH WÆH-reh", "eng": "darkened under night-helm · as if it never were", "mode": "word", "words": [{"oe": "genāp", "pron": "geh-NAHP", "eng": "darkened, grew dark", "type": "verb · past · 3sg", "accepts": ["darkened", "grew dark"], "note": "Everything went dark at once"}, {"oe": "nihthelm", "pron": "NIHT-helm", "eng": "night-helmet, darkness", "type": "noun · masc · dat", "accepts": ["night-helmet", "night helmet", "darkness", "night's helm"], "note": "Night as armour covering the world"}, {"oe": "nō", "pron": "NOH", "eng": "not, never", "type": "negative", "accepts": ["not", "never", "not at all"], "note": "As if it NEVER existed"}, {"oe": "wǣre", "pron": "WÆH-reh", "eng": "were, had been", "type": "verb · subj past", "accepts": ["were", "had been", "existed"], "note": "Subjunctive — as if it never were"}], "dive": "<span class='gi'>Genāp under nihthelm swā hēo nō wǣre</span> — darkened under the night-helmet as if it never existed. Total erasure."}, {"s": 12, "oe": "Stondeð nū on lāste lēofre duguþe", "pron": "STOND-eth noo on LAHST-eh LEH-of-reh DOO-gooth-eh", "eng": "Stands now in the track of the dear company", "mode": "word", "words": [{"oe": "stondeð", "pron": "STOND-eth", "eng": "stands", "type": "verb · 3sg", "accepts": ["stands"], "note": "Present tense — NOW"}, {"oe": "lāste", "pron": "LAHST-eh", "eng": "track, footprint", "type": "noun · masc · dat", "accepts": ["track", "footprint", "trace", "trail"], "note": "Where they walked, stone now stands"}, {"oe": "lēofre", "pron": "LEH-of-reh", "eng": "dear, beloved", "type": "adj · gen", "accepts": ["dear", "beloved", "precious"], "note": "They were loved"}, {"oe": "duguþe", "pron": "DOO-gooth-eh", "eng": "of the company", "type": "noun · fem · gen", "accepts": ["company", "warriors", "retainers", "host"], "note": "The proven warriors. Gone."}], "dive": "<span class='gi'>On lāste lēofre duguþe</span> — in the track of the dear company. Stone in place of flesh."}, {"s": 12, "oe": "weal wundrum hēah · wyrmlīcum fāh", "pron": "WEAHL WOOND-rum HEH-ah · WUHRM-lee-kum FAH", "eng": "a wall wondrously high · adorned with serpent-shapes", "mode": "word", "words": [{"oe": "weal", "pron": "WEAHL", "eng": "wall", "type": "noun · masc", "accepts": ["wall", "rampart"], "note": "The one thing that remains"}, {"oe": "wundrum", "pron": "WOOND-rum", "eng": "wondrously", "type": "adverb", "accepts": ["wondrously", "marvellously", "amazingly"], "note": "Instrumental of wundor"}, {"oe": "wyrmlīcum", "pron": "WUHRM-lee-kum", "eng": "with serpent-shapes", "type": "noun · dat pl", "accepts": ["serpent-shapes", "serpent shapes", "dragon-forms", "dragon forms"], "note": "wyrm + līc — dragons carved in stone"}, {"oe": "fāh", "pron": "FAH", "eng": "adorned, decorated, hostile", "type": "adjective", "accepts": ["adorned", "decorated", "stained", "hostile"], "note": "Beautiful AND dangerous in one word"}], "dive": "<span class='gi'>Wyrmlīcum fāh</span> — adorned with serpent-shapes. <span class='gi'>Fāh</span> means decorated AND hostile. Beauty and danger in one word."}, {"s": 12, "oe": "wǣpen wælgīfru · wyrd sēo mǣre", "pron": "WÆP-en WÆHL-GEE-froo · WOORD seh-oh MÆH-reh", "eng": "weapons slaughter-greedy · fate the glorious", "mode": "word", "words": [{"oe": "wǣpen", "pron": "WÆP-en", "eng": "weapons", "type": "noun · neut · nom pl", "accepts": ["weapons", "arms"], "note": "Given agency — they hunger"}, {"oe": "wælgīfru", "pron": "WÆHL-GEE-froo", "eng": "slaughter-greedy", "type": "adjective", "accepts": ["slaughter-greedy", "bloodthirsty", "greedy for slaughter"], "note": "wæl + gīfre — weapons that HUNGER for death"}, {"oe": "wyrd", "pron": "WOORD", "eng": "fate", "type": "noun · fem", "accepts": ["fate", "destiny", "wyrd"], "note": "Returns from line 5"}, {"oe": "mǣre", "pron": "MÆH-reh", "eng": "famous, glorious", "type": "adjective", "accepts": ["famous", "glorious", "renowned", "great"], "note": "Fate the famous. She has a reputation."}], "dive": "<span class='gi'>Wyrd sēo mǣre</span> — fate the famous. She returns from line 5 where she was ful ārǣd. Now she's mǣre. She earned her name."}, {"s": 7, "st": "Ubi Sunt — Where Are They?", "oe": "Hwǣr cwōm mearg · hwǣr cwōm mago", "pron": "HWÆHR KWOHM MEH-arg · HWÆHR KWOHM MAH-goh", "eng": "Where went the horse · where went the young warrior", "mode": "word", "words": [{"oe": "hwǣr", "pron": "HWÆHR", "eng": "where", "type": "adverb", "accepts": ["where"], "note": "The question that has no answer — repeated like a bell"}, {"oe": "cwōm", "pron": "KWOHM", "eng": "went, has gone", "type": "verb · past · 3sg", "accepts": ["went", "came", "has gone", "departed"], "note": "Past of cuman — here meaning departed"}, {"oe": "mearg", "pron": "MEH-arg", "eng": "horse, steed", "type": "noun · masc", "accepts": ["horse", "steed"], "note": "First thing named in the loss — something touched, fed, rode"}, {"oe": "mago", "pron": "MAH-goh", "eng": "young warrior, son", "type": "noun · masc", "accepts": ["young warrior", "young man", "warrior", "son", "youth"], "note": "The next generation — also gone"}], "dive": "The <em>ubi sunt</em> — 'where are they now?' The most famous passage. <span class='gi'>Hwǣr cwōm</span> repeated like a bell. Horse first. Then youth. Concrete before abstract."}, {"s": 7, "oe": "hwǣr cwōm māþþumgyfa", "pron": "HWÆHR KWOHM MAHTH-oom-GOOV-ah", "eng": "where went the treasure-giver", "mode": "word", "words": [{"oe": "māþþumgyfa", "pron": "MAHTH-oom-GOOV-ah", "eng": "treasure-giver, generous lord", "type": "noun · masc", "accepts": ["treasure-giver", "treasure giver", "generous lord", "gift-giver", "ring-giver"], "note": "māþþum (treasure) + gyfa (giver) — another kenning for the lord"}], "dive": "<span class='gi'>Māþþumgyfa</span> — treasure-giver. Third kenning for the lord (after goldwine and hlāford). Always defined by what he gives, not what he commands."}, {"s": 7, "oe": "hwǣr cwōm symbla gesetu", "pron": "HWÆHR KWOHM SOOMBL-ah geh-SET-oo", "eng": "where went the seats of feasting", "mode": "sentence", "dive": "<span class='gi'>Symbla gesetu</span> — feast-seats. The physical benches where people sat together. Not the feast itself but the places. The empty furniture."}, {"s": 7, "oe": "hwǣr sindon seledreamas", "pron": "HWÆHR SIND-on SEL-eh-DREHM-as", "eng": "where are the hall-joys", "mode": "word", "words": [{"oe": "sindon", "pron": "SIND-on", "eng": "are", "type": "verb · pl", "accepts": ["are"], "note": "Present plural of bēon — where ARE they, now, in the present"}, {"oe": "seledrēamas", "pron": "SEL-eh-DREHM-as", "eng": "hall-joys, hall-music", "type": "noun · masc · nom pl", "accepts": ["hall-joys", "hall joy", "hall-music", "hall music", "joy of the hall"], "note": "sele (hall) + drēam (joy/music) — the sound and feeling of community"}], "dive": "The verb shifts: not <span class='gi'>cwōm</span> (went) but <span class='gi'>sindon</span> (are). Present tense. Where ARE the hall-joys? The question becomes immediate."}, {"s": 7, "oe": "Ēalā beorht bune · ēalā byrnwiga", "pron": "EH-ah-LAH BEH-orht BOON-eh · EH-ah-LAH BURN-wig-ah", "eng": "Alas bright cup · alas armoured warrior", "mode": "word", "words": [{"oe": "ēalā", "pron": "EH-ah-LAH", "eng": "alas, oh", "type": "interjection", "accepts": ["alas", "oh", "woe"], "note": "The cry of grief — three times in two lines"}, {"oe": "beorht", "pron": "BEH-orht", "eng": "bright, shining", "type": "adjective", "accepts": ["bright", "shining", "radiant", "gleaming"], "note": "The cup shone. Past tense implied — it shone then."}, {"oe": "bune", "pron": "BOON-eh", "eng": "cup, drinking vessel", "type": "noun · fem", "accepts": ["cup", "drinking cup", "vessel", "goblet"], "note": "The mead-vessel — held in the hand, shared"}, {"oe": "byrnwiga", "pron": "BURN-wig-ah", "eng": "armoured warrior", "type": "noun · masc", "accepts": ["armoured warrior", "armored warrior", "mail-warrior", "mailed warrior"], "note": "byrne (mail-coat) + wiga (warrior) — defined by what he wears"}], "dive": "<span class='gi'>Ēalā</span> three times. The voice breaks. Alas the cup — something held. Alas the warrior — someone known. Each a thing that was present and is gone."}, {"s": 7, "oe": "ēalā þēodnes þrym · hū sēo þrāg gewāt", "pron": "EH-ah-LAH THEH-od-nes THROOM · hoo seh-oh THRAHG geh-WAHT", "eng": "alas the prince's glory · how that time departed", "mode": "word", "words": [{"oe": "þēodnes", "pron": "THEH-od-nes", "eng": "of the prince, of the lord", "type": "noun · masc · gen", "accepts": ["prince's", "of the prince", "lord's", "of the lord"], "note": "þēod (people/nation) + genitive — the people's leader"}, {"oe": "þrym", "pron": "THROOM", "eng": "glory, majesty, power", "type": "noun · masc", "accepts": ["glory", "majesty", "power", "splendour"], "note": "What the prince possessed — intangible, gone"}, {"oe": "sēo", "pron": "SEH-oh", "eng": "the", "type": "article · fem · nom", "accepts": ["the", "that"], "note": "Feminine nominative — þrāg is feminine"}, {"oe": "þrāg", "pron": "THRAHG", "eng": "time, period, season", "type": "noun · fem", "accepts": ["time", "period", "season", "while"], "note": "That specific time. Not time in general. THAT time."}, {"oe": "gewāt", "pron": "geh-WAHT", "eng": "departed, went away", "type": "verb · past · 3sg", "accepts": ["departed", "went away", "left", "went"], "note": "ge- + wītan — time didn't fade. It walked out."}], "dive": "<span class='gi'>Hū sēo þrāg gewāt</span> — how that time departed. Time is personified. It didn't pass or fade. It <span class='gi'>gewāt</span> — departed. Left. Walked away. Like the companions on the water."}, {"s": 8, "st": "The Wise One's Conclusion", "oe": "Til biþ sē þe his trēowe gehealdeþ", "pron": "TIL bith seh theh his TREH-oh-weh geh-HEALD-eth", "eng": "Good is he who his faith holds", "mode": "word", "words": [{"oe": "til", "pron": "TIL", "eng": "good, worthy", "type": "adjective", "accepts": ["good", "worthy", "capable", "excellent"], "note": "Simple direct praise"}, {"oe": "biþ", "pron": "BITH", "eng": "is (always)", "type": "verb · 3sg", "accepts": ["is", "is always"], "note": "Gnomic — permanent truth"}, {"oe": "sē þe", "pron": "seh theh", "eng": "he who, the one who", "type": "relative pronoun", "accepts": ["he who", "the one who", "whoever"], "note": "Relative construction — the one who does this"}, {"oe": "trēowe", "pron": "TREH-oh-weh", "eng": "faith, trust, pledge", "type": "noun · fem · acc", "accepts": ["faith", "trust", "pledge", "truth", "troth", "loyalty"], "note": "Root of 'true' and 'troth' — the binding word"}, {"oe": "gehealdeþ", "pron": "geh-HEALD-eth", "eng": "holds, keeps, guards", "type": "verb · 3sg", "accepts": ["holds", "keeps", "guards", "maintains"], "note": "ge- marks completion — holds fully, keeps faithfully"}], "dive": "<span class='gi'>Til biþ sē þe his trēowe gehealdeþ</span> — after everything, the poem lands here. Hold your faith. <span class='gi'>Trēow</span> is trust, truth, and pledge all at once."}, {"s": 8, "oe": "ne sceal nǣfre his torn tō rycene", "pron": "neh sheahl NÆF-reh his TORN toh ROODGE-en-eh", "eng": "nor shall never his grief too hastily", "mode": "word", "words": [{"oe": "ne", "pron": "NEH", "eng": "not, nor", "type": "negative", "accepts": ["not", "nor"], "note": "The negator"}, {"oe": "sceal", "pron": "SHEAHL", "eng": "shall, must, ought", "type": "verb · 3sg", "accepts": ["shall", "must", "ought", "should"], "note": "Obligation — what he must not do"}, {"oe": "nǣfre", "pron": "NÆF-reh", "eng": "never", "type": "adverb", "accepts": ["never"], "note": "ne + ǣfre — not ever. Emphatic with ne."}, {"oe": "torn", "pron": "TORN", "eng": "grief, bitter anger", "type": "noun · neut · acc", "accepts": ["grief", "anger", "bitter sorrow", "anguish", "wrath"], "note": "Heavier than sorg — torn has fury in it"}, {"oe": "rycene", "pron": "ROODGE-en-eh", "eng": "hastily, rashly", "type": "adverb", "accepts": ["hastily", "rashly", "quickly", "too quickly"], "note": "The speed is the error. Not the feeling."}], "dive": "<span class='gi'>Torn</span> — not just grief but grief-with-fury. Heavier than sorg. And the teaching: not that you shouldn't feel it. That you shouldn't speak it <span class='gi'>tō rycene</span> — too hastily."}, {"s": 8, "oe": "beorn of his brēostum ācȳþan", "pron": "BEH-orn of his BREHST-um AH-KOOTH-an", "eng": "the warrior from his breast make known", "mode": "sentence", "dive": "<span class='gi'>Ācȳþan</span> — to make known, push into visibility. ā- + cȳþan. Don't make your grief visible from the breast — unless you know the remedy."}, {"s": 8, "oe": "nemþe hē ǣr þā bōte cunne", "pron": "NEM-theh heh ÆHR thah BOH-teh KOON-eh", "eng": "unless he first the remedy know", "mode": "word", "words": [{"oe": "nemþe", "pron": "NEM-theh", "eng": "unless, except", "type": "conjunction", "accepts": ["unless", "except", "if not"], "note": "The crucial condition"}, {"oe": "ǣr", "pron": "ÆHR", "eng": "first, before, earlier", "type": "adverb", "accepts": ["first", "before", "earlier", "beforehand"], "note": "Sequence — the knowing must come BEFORE the speaking"}, {"oe": "bōte", "pron": "BOH-teh", "eng": "remedy, cure, amends", "type": "noun · fem · acc", "accepts": ["remedy", "cure", "compensation", "amends", "healing"], "note": "The crucial word — don't speak grief unless you know the cure"}, {"oe": "cunne", "pron": "KOON-eh", "eng": "know, know how", "type": "verb · subj", "accepts": ["know", "knows", "know how"], "note": "Subjunctive of cunnan — practical knowledge, not just feeling"}], "dive": "<span class='gi'>Bōt</span> — remedy. The entire poem's teaching in one word. Don't speak your grief until you know what the speaking will accomplish. The ferðloca stays shut until opening it serves a purpose."}, {"s": 8, "oe": "Wēl bið þām þe him āre sēceð", "pron": "WEHL bith THAHM theh him AH-reh SEH-cheth", "eng": "Well is for him who for himself grace seeks", "mode": "word", "words": [{"oe": "wēl", "pron": "WEHL", "eng": "well, good", "type": "adverb", "accepts": ["well", "good"], "note": "The final word of comfort"}, {"oe": "þām", "pron": "THAHM", "eng": "for him, to him", "type": "pronoun · dat", "accepts": ["him", "for him", "to him", "the one"], "note": "Dative — well is FOR this person"}, {"oe": "āre", "pron": "AH-reh", "eng": "grace, mercy", "type": "noun · fem · acc", "accepts": ["grace", "mercy", "honour"], "note": "The word from line 1 returns. The circle closes."}, {"oe": "sēceð", "pron": "SEH-cheth", "eng": "seeks", "type": "verb · 3sg", "accepts": ["seeks", "searches for", "looks for"], "note": "Active seeking — not just waiting now but looking for grace"}], "dive": "The poem ends where it began: with <span class='gi'>ār</span> — grace. But the verb has changed. Line 1: <span class='gi'>gebīdeð</span> — waits for grace. Final line: <span class='gi'>sēceð</span> — seeks grace. From passive endurance to active searching. The whole poem is the distance between those two verbs."}, {"s": 8, "oe": "frōfre tō fæder on heofonum · þǣr ūs eal sēo fæstnung stondeð", "pron": "FROH-freh toh FÆD-er on HEH-of-on-um · THÆHR oos eahl seh-oh FÆST-nung STOND-eth", "eng": "comfort from the Father in heavens · where for us all the security stands", "mode": "sentence", "dive": "The Christian frame closes the poem. <span class='gi'>Frōfre tō fæder</span> — comfort from the Father. Whether this is the poet's genuine belief or a required addition to make a pagan elegy acceptable to monastic scribes is one of the great debates in OE scholarship. The poem survives because monks copied it. The monks copied it because it ends with God. But the weight of the poem is in the hall, on the sea, in the frost — not here."}]}, {"id": "seafarer", "title": "Sē Sǣlīðend", "short": "Seafarer", "audio": "https://www.oldenglishaerobics.net/seafarer.php", "lines": [{"s": 1, "st": "The Claim to Speak", "oe": "Mæg ic be mē sylfum sōðgied wrecan", "pron": "MAG itch beh MEH SOOL-fum SOHTH-geed WRETCH-an", "eng": "I can about myself a true-song utter", "mode": "word", "words": [{"oe": "mæg", "pron": "MAG", "eng": "can, am able to", "type": "verb · 1sg", "accepts": ["can", "am able to", "may", "I can"], "note": "From magan — power, not permission"}, {"oe": "ic", "pron": "ITCH", "eng": "I", "type": "pronoun · nom", "accepts": ["I"], "note": "First person. Direct authority claim."}, {"oe": "be", "pron": "BEH", "eng": "about, concerning", "type": "preposition", "accepts": ["about", "concerning", "by", "of"], "note": "Takes dative. Be mē sylfum — about myself."}, {"oe": "mē", "pron": "MEH", "eng": "me, myself", "type": "pronoun · dat", "accepts": ["me", "myself", "to me"], "note": "Dative after be"}, {"oe": "sylfum", "pron": "SOOL-fum", "eng": "self, myself", "type": "pronoun · dat", "accepts": ["self", "myself", "own self"], "note": "Emphatic — my OWN self"}, {"oe": "sōðgied", "pron": "SOHTH-geed", "eng": "true-song, true utterance", "type": "noun · neut", "accepts": ["true-song", "true song", "true utterance", "truth-song", "true tale"], "note": "sōð (truth) + gied (song) — truth and song fused"}, {"oe": "wrecan", "pron": "WRETCH-an", "eng": "to utter, to drive out, to recite", "type": "verb · inf", "accepts": ["utter", "to utter", "recite", "to recite", "speak", "tell", "drive out"], "note": "Root of 'wreak' — speaking as expulsion. Violent."}], "dive": "<span class='gi'>Mæg ic</span> — I CAN. Authority. <span class='gi'>Sōðgied</span> — truth-song. Truth and song as one compound. <span class='gi'>Wrecan</span> is violent — to force experience out of the body into language."}, {"s": 1, "oe": "sīþas secgan · hū ic geswincdagum", "pron": "SEETH-as SEDGE-an · hoo itch geh-SWINK-dah-gum", "eng": "journeys tell · how I in toil-days", "mode": "word", "words": [{"oe": "sīþas", "pron": "SEETH-as", "eng": "journeys, voyages, experiences", "type": "noun · masc · acc pl", "accepts": ["journeys", "voyages", "experiences", "trips"], "note": "More than travel — significant experience, ordeal"}, {"oe": "secgan", "pron": "SEDGE-an", "eng": "to say, to tell", "type": "verb · inf", "accepts": ["say", "to say", "tell", "to tell", "speak"], "note": "The everyday speaking word — secg mē"}, {"oe": "hū", "pron": "HOO", "eng": "how", "type": "adverb", "accepts": ["how"], "note": "Same word survived"}, {"oe": "geswincdagum", "pron": "geh-SWINK-dah-gum", "eng": "toil-days, days of hardship", "type": "noun · masc · dat pl", "accepts": ["toil-days", "toil days", "days of toil", "days of hardship", "hard days"], "note": "geswinc (toil) + dagum (days, dat pl) — he lived INSIDE toil-days"}], "dive": "<span class='gi'>Sīþas</span> — not 'trips'. Ordeals. Significant passages. <span class='gi'>Geswincdagum</span> — toil-days. Time made of labour. The dative puts him inside the experience."}, {"s": 1, "oe": "earfoðhwīle oft þrōwade", "pron": "EAR-foth-HWEE-leh OFT THROH-wah-deh", "eng": "hardship-times often endured", "mode": "word", "words": [{"oe": "earfoðhwīle", "pron": "EAR-foth-HWEE-leh", "eng": "hardship-time, time of suffering", "type": "noun · fem · acc", "accepts": ["hardship-time", "hardship time", "time of suffering", "time of hardship", "hard time"], "note": "earfoð (hardship) + hwīl (time) — time itself becomes hard"}, {"oe": "oft", "pron": "OFT", "eng": "often", "type": "adverb", "accepts": ["often", "frequently"], "note": "Habitual. Not once."}, {"oe": "þrōwade", "pron": "THROH-wah-deh", "eng": "endured, suffered", "type": "verb · past · 1sg", "accepts": ["endured", "suffered", "experienced", "bore"], "note": "From þrōwian — root of 'throe'. Involuntary suffering."}], "dive": "<span class='gi'>Earfoðhwīle</span> — time made of hardship. Not hardship in time — time that IS hardship. <span class='gi'>Þrōwade</span> gives us 'throe'. Endurance as being wracked."}, {"s": 1, "oe": "bitre brēostceare gebiden hæbbe", "pron": "BIT-reh BREHST-keh-ah-reh geh-BID-en HÆHB-eh", "eng": "bitter breast-care experienced have", "mode": "word", "words": [{"oe": "bitre", "pron": "BIT-reh", "eng": "bitter, sharp, cruel", "type": "adjective", "accepts": ["bitter", "sharp", "cruel", "harsh"], "note": "The taste of grief — physical word for emotional state"}, {"oe": "brēostceare", "pron": "BREHST-keh-ah-reh", "eng": "breast-care, heart-sorrow", "type": "noun · fem · acc", "accepts": ["breast-care", "breast care", "heart-sorrow", "heart sorrow", "chest-grief"], "note": "brēost (breast) + cearu (care) — grief located in the body"}, {"oe": "gebiden", "pron": "geh-BID-en", "eng": "experienced, endured", "type": "verb · pp", "accepts": ["experienced", "endured", "suffered", "undergone", "waited through"], "note": "Past participle of gebīdan — the same bīdan from the Wanderer. Endured."}, {"oe": "hæbbe", "pron": "HÆHB-eh", "eng": "have", "type": "verb · 1sg subj", "accepts": ["have", "I have"], "note": "Subjunctive of habban — I have endured. Present perfect."}], "dive": "<span class='gi'>Brēostceare</span> — breast-care. Another compound placing emotion in the body. OE doesn't have abstract 'anxiety'. It has care-in-the-chest. <span class='gi'>Gebiden</span> — same root as the Wanderer's gebīdeð. The waiting-endurance connects the two poems."}, {"s": 2, "st": "The Cold at Sea", "oe": "Gecunnad in cēole cearselda fela", "pron": "geh-KOON-ahd in KEH-oh-leh KEHR-seld-ah FEL-ah", "eng": "Experienced in the ship care-halls many", "mode": "word", "words": [{"oe": "gecunnad", "pron": "geh-KOON-ahd", "eng": "experienced, tested, tried", "type": "verb · pp", "accepts": ["experienced", "tested", "tried", "known", "proved"], "note": "Past participle of cunnian — to test, to experience. Same root as cunnan (to know)."}, {"oe": "cēole", "pron": "KEH-oh-leh", "eng": "in a ship, in a keel", "type": "noun · masc · dat", "accepts": ["ship", "keel", "boat", "in a ship"], "note": "Root of modern 'keel'. Dative — inside the vessel."}, {"oe": "cearselda", "pron": "KEHR-seld-ah", "eng": "care-halls, anxiety-dwellings", "type": "noun · gen pl", "accepts": ["care-halls", "care halls", "anxiety dwellings", "sorrowful places", "halls of care"], "note": "cearu (care) + seld (hall/dwelling) — the ship IS a hall of anxiety. Kenning."}, {"oe": "fela", "pron": "FEL-ah", "eng": "many, much", "type": "adjective", "accepts": ["many", "much", "a lot"], "note": "Many care-halls. Many voyages. Many miseries."}], "dive": "<span class='gi'>Cearselda</span> — care-halls. The ship becomes a hall — but a hall of anxiety. The Wanderer mourns the lost hall. The Seafarer's 'hall' is the pitching deck. Same architecture, inverted."}, {"s": 2, "oe": "atol ȳþa gewealc · þǣr mec oft bigeat", "pron": "AH-tol OO-thah geh-WEAHLK · THÆHR mek OFT bi-GEAHT", "eng": "terrible rolling of waves · where me often seized", "mode": "word", "words": [{"oe": "atol", "pron": "AH-tol", "eng": "terrible, horrible, dire", "type": "adjective", "accepts": ["terrible", "horrible", "dire", "dreadful", "awful"], "note": "Strong word — the same adjective used for Grendel in Beowulf"}, {"oe": "ȳþa", "pron": "OO-thah", "eng":
