 "of waves", "type": "noun · fem · gen pl", "accepts": ["of waves", "waves", "wave's"], "note": "Genitive plural of ȳð (wave)"}, {"oe": "gewealc", "pron": "geh-WEAHLK", "eng": "rolling, tossing, surging", "type": "noun · neut", "accepts": ["rolling", "tossing", "surging", "tumbling"], "note": "The motion of the sea — physical, violent"}, {"oe": "þǣr", "pron": "THÆHR", "eng": "there, where", "type": "adverb", "accepts": ["there", "where"], "note": "On the sea. In that place."}, {"oe": "mec", "pron": "MEK", "eng": "me", "type": "pronoun · acc", "accepts": ["me"], "note": "Accusative form — the waves seized ME. He is the object."}, {"oe": "bigeat", "pron": "bi-GEAHT", "eng": "seized, caught, overtook", "type": "verb · past · 3sg", "accepts": ["seized", "caught", "overtook", "took", "beset"], "note": "bi- + geat — the sea seizes him. He doesn't ride it. It takes him."}], "dive": "<span class='gi'>Atol ȳþa gewealc</span> — terrible rolling of waves. The same word (<span class='gi'>atol</span>) used for Grendel. The sea is a monster. <span class='gi'>Bigeat</span> — seized. The Seafarer doesn't master the sea. The sea masters him."}, {"s": 2, "oe": "nearo nihtwaco æt nacan stefnan", "pron": "NEH-ah-roh NIHT-wah-koh æt NAH-kan STEF-nan", "eng": "anxious night-watch at the ship's prow", "mode": "word", "words": [{"oe": "nearo", "pron": "NEH-ah-roh", "eng": "anxious, narrow, oppressive", "type": "adjective", "accepts": ["anxious", "narrow", "oppressive", "tight", "constrained"], "note": "Physical and emotional — the narrowness of fear"}, {"oe": "nihtwaco", "pron": "NIHT-wah-koh", "eng": "night-watch", "type": "noun · fem · acc", "accepts": ["night-watch", "night watch", "vigil", "night vigil"], "note": "niht (night) + waco (watch) — awake in the dark. Compare your ūhtna."}, {"oe": "æt", "pron": "ÆT", "eng": "at, by, near", "type": "preposition", "accepts": ["at", "by", "near"], "note": "Position — at the prow"}, {"oe": "nacan", "pron": "NAH-kan", "eng": "ship's, of the ship", "type": "noun · masc · gen", "accepts": ["ship's", "of the ship", "boat's"], "note": "Genitive of naca (ship)"}, {"oe": "stefnan", "pron": "STEF-nan", "eng": "prow, stem", "type": "noun · masc · dat", "accepts": ["prow", "stem", "bow", "front"], "note": "The front of the ship — where you keep watch. Exposed."}], "dive": "<span class='gi'>Nearo nihtwaco</span> — anxious night-watch. <span class='gi'>Nearo</span> means both narrow and anxious — the space contracts with fear. At the prow, alone, in the dark, watching for rocks."}, {"s": 2, "oe": "þonne hit cliffum cnossað", "pron": "THON-eh hit KLIF-um KNOS-ath", "eng": "when it against cliffs crashes", "mode": "sentence", "dive": "Short, sharp line. The ship crashes against cliffs. <span class='gi'>Cnossað</span> — smashes, crashes. Onomatopoeia. You hear the impact in the word."}, {"s": 2, "oe": "Calde geþrungen wǣron mīne fēt · forste gebunden", "pron": "KALD-eh geh-THRUNG-en WAH-ron MEE-neh FEHT · FORST-eh geh-BUND-en", "eng": "Pinched with cold were my feet · by frost bound", "mode": "word", "words": [{"oe": "calde", "pron": "KALD-eh", "eng": "with cold, by cold", "type": "noun · dat", "accepts": ["cold", "with cold", "by cold"], "note": "Instrumental/dative — the cold does the pinching"}, {"oe": "geþrungen", "pron": "geh-THRUNG-en", "eng": "pinched, pressed, afflicted", "type": "verb · pp", "accepts": ["pinched", "pressed", "afflicted", "squeezed", "oppressed"], "note": "Past participle of geþringan — squeezed, compressed"}, {"oe": "wǣron", "pron": "WAH-ron", "eng": "were", "type": "verb · past pl", "accepts": ["were"], "note": "Past plural of bēon — they were"}, {"oe": "fēt", "pron": "FEHT", "eng": "feet", "type": "noun · masc · nom pl", "accepts": ["feet"], "note": "Same word. His actual feet. Frozen."}, {"oe": "forste", "pron": "FORST-eh", "eng": "by frost", "type": "noun · masc · dat", "accepts": ["frost", "by frost", "with frost"], "note": "Instrumental — frost as the binding agent"}, {"oe": "gebunden", "pron": "geh-BUND-en", "eng": "bound, fettered", "type": "verb · pp", "accepts": ["bound", "fettered", "tied", "fastened"], "note": "Past participle of bindan — the frost BINDS his feet. He is prisoner of the cold."}], "dive": "<span class='gi'>Forste gebunden</span> — bound by frost. The Wanderer's exile is social. The Seafarer's exile is physical. His feet are literally frozen to the deck. <span class='gi'>Gebunden</span> — the same binding verb from the ferðloca passage. There the spirit is bound. Here the feet are."}, {"s": 2, "oe": "caldum clommum · þǣr þā ceare seofedun", "pron": "KALD-um KLOM-um · THÆHR thah KEHR-eh SEH-of-ed-un", "eng": "with cold chains · where then cares sighed", "mode": "sentence", "dive": "<span class='gi'>Caldum clommum</span> — cold chains. The frost is literal shackles. And then: <span class='gi'>ceare seofedun</span> — cares sighed. The sorrows themselves sigh. Emotion as something alive that makes sound around him."}, {"s": 3, "st": "No One Knows", "oe": "hāt ymb heortan · hungor innan slāt", "pron": "HAHT oomb HEORT-an · HUNG-or IN-an SLAHT", "eng": "hot around the heart · hunger within tore", "mode": "word", "words": [{"oe": "hāt", "pron": "HAHT", "eng": "hot, burning", "type": "adjective", "accepts": ["hot", "burning", "heated"], "note": "The heart is hot while the feet are frozen. The body at war with itself."}, {"oe": "ymb", "pron": "OOMB", "eng": "around, about", "type": "preposition", "accepts": ["around", "about", "surrounding"], "note": "Spatial — the heat surrounds the heart"}, {"oe": "heortan", "pron": "HEORT-an", "eng": "heart", "type": "noun · fem · acc", "accepts": ["heart", "the heart"], "note": "The heart is hot. The feet are bound. Extreme contrast."}, {"oe": "hungor", "pron": "HUNG-or", "eng": "hunger", "type": "noun · masc", "accepts": ["hunger", "famine", "starvation"], "note": "Same word. Physical hunger on the sea."}, {"oe": "innan", "pron": "IN-an", "eng": "within, inside", "type": "adverb", "accepts": ["within", "inside", "from within"], "note": "The hunger works from inside — it tears outward"}, {"oe": "slāt", "pron": "SLAHT", "eng": "tore, ripped, rent", "type": "verb · past · 3sg", "accepts": ["tore", "ripped", "rent", "slashed", "cut"], "note": "From slītan — to tear. Hunger tears his insides. Violent."}], "dive": "Hot heart, frozen feet, hunger tearing from within. Three zones of the body in three different agonies simultaneously. <span class='gi'>Slāt</span> — tore. Hunger is not a dull ache. It tears."}, {"s": 3, "oe": "mereswerges mōd · þæt sē mon ne wāt", "pron": "MEH-reh-SWERG-es MOHD · thæt seh MON neh WAHT", "eng": "the sea-weary one's mind · that the man not knows", "mode": "sentence", "dive": "<span class='gi'>Sē mon ne wāt</span> — the man does not know. The land-person. The one who hasn't suffered this. A division between those who have been to sea and those who haven't. Experience as a wall."}, {"s": 3, "oe": "þe him on foldan fægrost limpeð", "pron": "theh him on FOLD-an FÆHG-rost LIMP-eth", "eng": "for whom on land most fairly it goes", "mode": "sentence", "dive": "The person on land for whom things go well — <span class='gi'>fægrost limpeð</span> — most fairly happens. This person cannot understand. Comfort is its own blindness."}, {"s": 3, "oe": "hū ic earm-cearig · īscealdne sǣ", "pron": "hoo itch EARM-keh-ah-rig · EES-cheahld-neh SAE", "eng": "how I wretched-sorrowful · the ice-cold sea", "mode": "word", "words": [{"oe": "earm-cearig", "pron": "EARM-keh-ah-rig", "eng": "wretched-sorrowful, miserably anxious", "type": "adj · compound", "accepts": ["wretched-sorrowful", "wretched", "miserable", "wretchedly anxious"], "note": "earm (wretched/poor) + cearig (full of care) — compound misery"}, {"oe": "īscealdne", "pron": "EES-cheahld-neh", "eng": "ice-cold", "type": "adj · compound · acc", "accepts": ["ice-cold", "ice cold", "freezing", "icy"], "note": "īs (ice) + ceald (cold) — compare hrīmcealde in the Wanderer. Different frost, same sea."}, {"oe": "sǣ", "pron": "SAE", "eng": "sea", "type": "noun · fem · acc", "accepts": ["sea", "ocean"], "note": "Her again. The feminine sea."}], "dive": "<span class='gi'>Earm-cearig</span> — wretch-care. Doubles the misery. <span class='gi'>Īscealdne sǣ</span> echoes the Wanderer's <span class='gi'>hrīmcealde sǣ</span>. Same sea, different frost-word. The poems know each other."}, {"s": 3, "oe": "winter wunade wræccan lāstum", "pron": "WINT-er WOON-ah-deh WRETCH-an LAHST-um", "eng": "winter dwelt-in on exile's tracks", "mode": "word", "words": [{"oe": "winter", "pron": "WINT-er", "eng": "winter", "type": "noun · masc", "accepts": ["winter"], "note": "Same word. The season of endurance."}, {"oe": "wunade", "pron": "WOON-ah-deh", "eng": "dwelt, inhabited, lived in", "type": "verb · past · 1sg", "accepts": ["dwelt", "lived", "inhabited", "dwelt in", "resided"], "note": "From wunian — to dwell. He LIVED in winter. Not passed through it."}, {"oe": "wræccan", "pron": "WRETCH-an", "eng": "exile's, of the exile", "type": "noun · gen", "accepts": ["exile's", "of the exile", "of the wretch"], "note": "Genitive of wræcca — the exile. Same word as in the Wanderer."}, {"oe": "lāstum", "pron": "LAHST-um", "eng": "on tracks, in footsteps", "type": "noun · masc · dat pl", "accepts": ["tracks", "footsteps", "paths", "on tracks"], "note": "Dative plural of lāst — the same exile-tracks. Wræclāstas."}], "dive": "<span class='gi'>Wræccan lāstum</span> — on exile's tracks. The Wanderer's <span class='gi'>wræclāstas</span> returns. The same paths. The same footprints. Two poems sharing one road."}, {"s": 4, "st": "The Cuckoo Calls", "oe": "Bearwas blōstmum nimað · byrig fægriað", "pron": "BEHR-was BLOHST-mum NIM-ath · BOOR-ig FÆHG-ree-ath", "eng": "Groves take on blossoms · towns grow fair", "mode": "sentence", "dive": "Spring arrives on land. <span class='gi'>Bearwas</span> (groves) take <span class='gi'>blōstmum</span> (blossoms). <span class='gi'>Byrig</span> (towns) grow fair. Beautiful — and it makes everything worse. The beauty of land sharpens the call to leave it."}, {"s": 4, "oe": "wongas wlitigað · woruld onetteð", "pron": "WONG-as WLIT-ig-ath · WOR-uld ON-et-eth", "eng": "plains grow beautiful · the world hastens", "mode": "sentence", "dive": "<span class='gi'>Woruld onetteð</span> — the world hastens. Time speeds up in spring. Everything is urgent. The same urgency that drives the cuckoo's call drives the seafarer back to the sea."}, {"s": 4, "oe": "Ealle þā gemoniað mōdes fusne", "pron": "EAHL-eh thah geh-MON-ee-ath MOHD-es FOOS-neh", "eng": "All these things urge the eager one of spirit", "mode": "sentence", "dive": "Everything — the blossoms, the beauty, the hastening world — <span class='gi'>gemoniað</span> (urges, admonishes) the one who is <span class='gi'>fusne</span> — eager, ready to go, restless. The beauty pushes him away from land."}, {"s": 4, "oe": "sefan tō sīþe · þām þe swā þenceð", "pron": "SEF-an toh SEETH-eh · THAHM theh swah THENCH-eth", "eng": "the spirit to journey · for him who so thinks", "mode": "word", "words": [{"oe": "sefan", "pron": "SEF-an", "eng": "spirit, mind, heart", "type": "noun · masc · acc", "accepts": ["spirit", "mind", "heart", "inner self", "soul"], "note": "The deep inner self — what moves toward the sea"}, {"oe": "sīþe", "pron": "SEETH-eh", "eng": "journey, voyage", "type": "noun · masc · dat", "accepts": ["journey", "voyage", "trip", "expedition"], "note": "The significant experience — not casual travel"}, {"oe": "þām", "pron": "THAHM", "eng": "for him, to him", "type": "pronoun · dat", "accepts": ["him", "for him", "to him", "the one"], "note": "Dative — for the one who thinks this way"}, {"oe": "þenceð", "pron": "THENCH-eth", "eng": "thinks, intends", "type": "verb · 3sg", "accepts": ["thinks", "intends", "considers", "purposes"], "note": "Not idle thought — deliberate intention"}], "dive": "<span class='gi'>Sefan tō sīþe</span> — the spirit toward the journey. The inner self moves before the body does. The decision to go to sea happens in the <span class='gi'>sefa</span> — the same deep word the Wanderer uses for the interior that cannot be spoken."}, {"s": 4, "oe": "on flodwegas feor gewītan", "pron": "on FLOD-weh-gas FEH-or geh-WEE-tan", "eng": "on flood-ways far to depart", "mode": "word", "words": [{"oe": "flodwegas", "pron": "FLOD-weh-gas", "eng": "flood-ways, sea-roads", "type": "noun · masc · acc pl", "accepts": ["flood-ways", "flood ways", "sea-roads", "sea roads", "ocean paths"], "note": "flōd (flood/sea) + weg (way) — another kenning for the sea as path. Compare lagulād."}, {"oe": "feor", "pron": "FEH-or", "eng": "far, far away", "type": "adverb", "accepts": ["far", "far away", "distant", "afar"], "note": "The distance word. Not a short trip."}, {"oe": "gewītan", "pron": "geh-WEE-tan", "eng": "to depart, to go away", "type": "verb · inf", "accepts": ["depart", "to depart", "go", "leave", "go away"], "note": "The Wanderer uses gewāt for time departing. Here the seafarer departs. Same verb, reversed direction."}], "dive": "<span class='gi'>Flodwegas</span> — flood-ways. Third kenning for the sea-as-road (after lagulād and the Wanderer's waþema gebind). <span class='gi'>Gewītan</span> — the same verb used for time departing in the Wanderer. There, time leaves. Here, the man leaves. The verb connects loss and longing."}, {"s": 4, "oe": "Swylce gēac monað geōmran reorde", "pron": "SWOOL-cheh GEH-ahk MON-ath GEH-om-ran REH-ord-eh", "eng": "Likewise the cuckoo urges with mournful voice", "mode": "word", "words": [{"oe": "swylce", "pron": "SWOOL-cheh", "eng": "likewise, also, similarly", "type": "adverb", "accepts": ["likewise", "also", "similarly", "so too"], "note": "Connector — and also this"}, {"oe": "gēac", "pron": "GEH-ahk", "eng": "cuckoo", "type": "noun · masc", "accepts": ["cuckoo"], "note": "The bird that calls in spring. Its voice is the voice of departure."}, {"oe": "monað", "pron": "MON-ath", "eng": "urges, admonishes, calls", "type": "verb · 3sg", "accepts": ["urges", "admonishes", "calls", "warns", "exhorts"], "note": "From manian — to urge, to remind. The cuckoo reminds him."}, {"oe": "geōmran", "pron": "GEH-om-ran", "eng": "mournful, sad, sorrowful", "type": "adj · dat", "accepts": ["mournful", "sad", "sorrowful", "lamenting"], "note": "The cuckoo's voice is sad. The call to the sea is not joyful."}, {"oe": "reorde", "pron": "REH-ord-eh", "eng": "voice, speech", "type": "noun · fem · dat", "accepts": ["voice", "speech", "call", "sound"], "note": "Instrumental/dative — with mournful voice"}], "dive": "<span class='gi'>Gēac monað geōmran reorde</span> — the cuckoo urges with mournful voice. The most famous image in the poem. The cuckoo is the bird of spring and of departure. Its call is beautiful and sad at once — like the call of the sea itself."}, {"s": 4, "oe": "singeð sumeres weard · sorg tō heortan", "pron": "SING-eth SOO-mer-es WEHRD · SORG toh HEORT-an", "eng": "sings summer's guardian · sorrow to the heart", "mode": "word", "words": [{"oe": "singeð", "pron": "SING-eth", "eng": "sings", "type": "verb · 3sg", "accepts": ["sings"], "note": "Same word. The bird sings."}, {"oe": "sumeres", "pron": "SOO-mer-es", "eng": "of summer", "type": "noun · masc · gen", "accepts": ["summer's", "of summer"], "note": "Genitive — summer's guardian/herald"}, {"oe": "weard", "pron": "WEHRD", "eng": "guardian, watchman, herald", "type": "noun · masc", "accepts": ["guardian", "watchman", "herald", "keeper", "warden"], "note": "The cuckoo guards summer — announces its arrival"}, {"oe": "sorg", "pron": "SORG", "eng": "sorrow", "type": "noun · fem · acc", "accepts": ["sorrow", "grief", "care"], "note": "The cuckoo brings sorrow. Beauty and grief in one song."}, {"oe": "heortan", "pron": "HEORT-an", "eng": "to the heart", "type": "noun · fem · dat", "accepts": ["heart", "to the heart", "the heart"], "note": "Dative — the sorrow goes TO the heart. Targeted."}], "dive": "<span class='gi'>Sumeres weard</span> — summer's guardian. The cuckoo heralds summer. And what does summer's herald bring? <span class='gi'>Sorg tō heortan</span> — sorrow to the heart. Beauty announces grief. The call to the sea is not freedom. It is compulsion wrapped in birdsong."}, {"s": 5, "st": "The Spirit Flies Ahead", "oe": "Forþon nū mīn hyge hweorfeð ofer hreþerlocan", "pron": "for-THON noo meen HOODGE-eh HWEORF-eth OF-er HRETH-er-LOK-an", "eng": "Therefore now my thought turns beyond the breast-enclosure", "mode": "word", "words": [{"oe": "forþon", "pron": "for-THON", "eng": "therefore, because", "type": "conjunction", "accepts": ["therefore", "because", "for that reason"], "note": "Causal — because of everything he's described"}, {"oe": "hyge", "pron": "HOODGE-eh", "eng": "thought, mind, intention", "type": "noun · masc", "accepts": ["thought", "mind", "intention", "spirit"], "note": "Active thinking — the mind as agent"}, {"oe": "hweorfeð", "pron": "HWEORF-eth", "eng": "turns, moves, wanders", "type": "verb · 3sg", "accepts": ["turns", "moves", "wanders", "ranges"], "note": "Same verb from the Wanderer — geondhweorfeð. The mind moves through."}, {"oe": "ofer", "pron": "OF-er", "eng": "over, beyond", "type": "preposition", "accepts": ["over", "beyond", "across"], "note": "The thought goes BEYOND the body"}, {"oe": "hreþerlocan", "pron": "HRETH-er-LOK-an", "eng": "breast-enclosure, heart-locker", "type": "noun · masc · acc", "accepts": ["breast-enclosure", "heart-locker", "chest", "breast"], "note": "hreþer (breast) + loca (enclosure) — FOURTH kenning for the locked heart across both poems"}], "dive": "<span class='gi'>Hreþerlocan</span> — breast-enclosure. The fourth kenning for the locked interior (after ferðloca, hordcofa, brēostcofa). But here the thought ESCAPES it. <span class='gi'>Hweorfeð ofer</span> — turns beyond. The Wanderer binds the ferðloca shut. The Seafarer's mind breaks free."}, {"s": 5, "oe": "mīn mōdsefa mid mereflōde", "pron": "meen MOHD-sef-ah mid MEH-reh-FLOH-deh", "eng": "my mind-spirit with the sea-flood", "mode": "sentence", "dive": "<span class='gi'>Mōdsefa</span> returns — the same deep-self word from the Wanderer, where it had no one to speak to. Here it travels with the sea-flood. The interior flies outward."}, {"s": 5, "oe": "ofer hwæles ēþel · hweorfeð wīde", "pron": "OF-er HWAL-es ETH-el · HWEORF-eth WEE-deh", "eng": "over the whale's homeland · it turns widely", "mode": "word", "words": [{"oe": "hwæles", "pron": "HWAL-es", "eng": "of the whale", "type": "noun · masc · gen", "accepts": ["whale's", "of the whale"], "note": "Genitive — the sea belongs to the whale"}, {"oe": "ēþel", "pron": "ETH-el", "eng": "homeland, native land, estate", "type": "noun · masc", "accepts": ["homeland", "native land", "home", "country", "estate"], "note": "The sea is the whale's ēþel — its home. What the exile has lost on land, the whale has in the ocean."}, {"oe": "wīde", "pron": "WEE-deh", "eng": "widely, far and wide", "type": "adverb", "accepts": ["widely", "far and wide", "far", "broadly"], "note": "The spirit ranges without limit"}], "dive": "<span class='gi'>Hwæles ēþel</span> — the whale's homeland. One of the great kennings. The sea is not empty. It is the whale's estate, the whale's native ground. The exile has no ēþel. The whale does. The spirit flies over someone else's home."}, {"s": 5, "oe": "eorþan scēatas · cymeð eft tō mē", "pron": "EOR-than SHEH-ah-tas · KOOM-eth EFT toh MEH", "eng": "earth's regions · comes back to me", "mode": "word", "words": [{"oe": "eorþan", "pron": "EOR-than", "eng": "of earth, earth's", "type": "noun · fem · gen", "accepts": ["earth's", "of earth", "of the earth"], "note": "The spirit ranges over earth's surfaces"}, {"oe": "scēatas", "pron": "SHEH-ah-tas", "eng": "regions, surfaces, corners", "type": "noun · masc · acc pl", "accepts": ["regions", "surfaces", "corners", "expanses"], "note": "The broad flat surfaces of the world"}, {"oe": "cymeð", "pron": "KOOM-eth", "eng": "comes, returns", "type": "verb · 3sg", "accepts": ["comes", "returns", "comes back"], "note": "From cuman — it comes back. The spirit returns."}, {"oe": "eft", "pron": "EFT", "eng": "again, back", "type": "adverb", "accepts": ["again", "back", "once more"], "note": "Again — it always returns"}, {"oe": "tō mē", "pron": "toh MEH", "eng": "to me", "type": "prep + pronoun", "accepts": ["to me", "back to me"], "note": "The spirit comes back to the body. It has to."}], "dive": "<span class='gi'>Cymeð eft tō mē</span> — comes back to me. The spirit flies out over the whale's homeland, ranges across the earth, and returns to the body. It cannot stay free. Like the Wanderer's companions who swim away — the spirit must come back to the isolation it tried to escape."}, {"s": 5, "oe": "gīfre and grǣdig · gielleð ānfloga", "pron": "GIF-reh and GRAH-dig · GEEL-eth AHN-floh-gah", "eng": "greedy and ravenous · screams the lone-flier", "mode": "word", "words": [{"oe": "gīfre", "pron": "GIF-reh", "eng": "greedy, eager, ravenous", "type": "adjective", "accepts": ["greedy", "eager", "ravenous", "voracious"], "note": "The returning spirit is hungry — it wants more"}, {"oe": "grǣdig", "pron": "GRAH-dig", "eng": "greedy, covetous", "type": "adjective", "accepts": ["greedy", "covetous", "ravenous", "hungry"], "note": "Root of modern 'greedy'. Doubled with gīfre for emphasis."}, {"oe": "gielleð", "pron": "GEEL-eth", "eng": "screams, yells, cries out", "type": "verb · 3sg", "accepts": ["screams", "yells", "cries", "shrieks", "calls"], "note": "From giellan — to yell. The spirit SCREAMS. Not whispers. Screams."}, {"oe": "ānfloga", "pron": "AHN-floh-gah", "eng": "lone-flier, solitary one", "type": "noun · masc", "accepts": ["lone-flier", "lone flier", "solitary flier", "solitary one"], "note": "ān (one/lone) + floga (flier) — the spirit as a single bird ranging alone. One of the most debated words in OE scholarship."}], "dive": "<span class='gi'>Ānfloga</span> — the lone-flier. Nobody agrees what this is. The spirit-bird? A cuckoo? The soul itself ranging ahead of the body? Whatever it is, it's <span class='gi'>gīfre and grǣdig</span> — ravenous — and it screams. This is not serene transcendence. This is the soul tearing itself from the body in hunger."}, {"s": 5, "oe": "hweteð on hwælweg hreþer unwearnum", "pron": "HWET-eth on HWÆL-weg HRETH-er UN-wehr-num", "eng": "urges onto whale-road the heart irresistibly", "mode": "word", "words": [{"oe": "hweteð", "pron": "HWET-eth", "eng": "urges, incites, whets", "type": "verb · 3sg", "accepts": ["urges", "incites", "whets", "drives", "sharpens"], "note": "Root of 'whet' — to sharpen. The spirit sharpens the desire."}, {"oe": "hwælweg", "pron": "HWÆL-weg", "eng": "whale-road, sea", "type": "noun · masc · acc", "accepts": ["whale-road", "whale road", "sea", "ocean"], "note": "The most famous kenning in OE. The sea as the road whales travel."}, {"oe": "hreþer", "pron": "HRETH-er", "eng": "heart, breast, spirit", "type": "noun · masc · acc", "accepts": ["heart", "breast", "spirit", "chest"], "note": "The physical chest — what the spirit urges toward the sea"}, {"oe": "unwearnum", "pron": "UN-wehr-num", "eng": "irresistibly, without restraint", "type": "adverb", "accepts": ["irresistibly", "without restraint", "powerfully", "unstoppably"], "note": "un- (without) + wearnum (resistance) — nothing can stop this"}], "dive": "<span class='gi'>Hwælweg</span> — whale-road. The kenning. The sea is not water — it's a road, and the whales are its traffic. <span class='gi'>Unwearnum</span> — irresistibly. The pull to the sea cannot be resisted. The Wanderer's ferðloca is bound shut. The Seafarer's is ripped open."}]}, {"id": "galdor", "title": "Galdorcræft", "short": "ᚷ", "audio": "https://www.oldenglishaerobics.net/", "lines": [{"s": 1, "st": "Sīþgaldor · Journey Charm", "oe": "Ic mē on þisse gyrde belūce", "pron": "ITCH meh on THISS-eh YOORD-eh beh-LOO-cheh", "eng": "I enclose myself in this rod", "mode": "word", "words": [{"oe": "ic", "pron": "ITCH", "eng": "I", "type": "pronoun · nom", "accepts": ["I"], "note": "First person. The speaker acts on themselves."}, {"oe": "mē", "pron": "MEH", "eng": "myself, me", "type": "pronoun · acc", "accepts": ["myself", "me"], "note": "Reflexive — the action circles back to the self"}, {"oe": "on", "pron": "ON", "eng": "in, on, into", "type": "preposition", "accepts": ["in", "on", "into"], "note": "Preposition of enclosure here — INTO the rod's protection"}, {"oe": "þisse", "pron": "THISS-eh", "eng": "this", "type": "demonstrative · dat fem", "accepts": ["this"], "note": "Dative feminine agreeing with gyrde"}, {"oe": "gyrde", "pron": "YOORD-eh", "eng": "rod, staff, wand", "type": "noun · fem · dat", "accepts": ["rod", "staff", "wand", "stick", "yard"], "note": "The physical implement. You hold it. Root of 'yard'. The charm requires a thing in the hand."}, {"oe": "belūce", "pron": "beh-LOO-cheh", "eng": "enclose, lock", "type": "verb · 1sg", "accepts": ["enclose", "lock", "shut in", "lock in", "close"], "note": "be- (around) + lūcan (to lock). You lock yourself INSIDE the rod's circle. Same root as ferþloca."}], "dive": "The opening act of the Journey Charm. You hold a staff. You speak. You lock yourself inside its boundary. <span class='gi'>Belūce</span> shares its root with <span class='gi'>ferþloca</span> — spirit-locker. The rod becomes a portable enclosure."}, {"s": 1, "oe": "and on Godes helde bebeode", "pron": "and on GOD-es HELD-eh beh-BEH-od-eh", "eng": "and into God's protection commend myself", "mode": "word", "words": [{"oe": "and", "pron": "AND", "eng": "and", "type": "conjunction", "accepts": ["and"], "note": "Connective"}, {"oe": "Godes", "pron": "GOD-es", "eng": "of God, God's", "type": "noun · masc · gen", "accepts": ["God's", "of God"], "note": "Christian overlay. Read through it to what was there before."}, {"oe": "helde", "pron": "HELD-eh", "eng": "protection, keeping, guard", "type": "noun · fem · dat", "accepts": ["protection", "keeping", "guard", "hold", "grace"], "note": "From healdan (to hold). The protection is a holding. You are held."}, {"oe": "bebeode", "pron": "beh-BEH-od-eh", "eng": "commend, entrust", "type": "verb · 1sg", "accepts": ["commend", "entrust", "commit", "give over"], "note": "be- + bēodan (to command/offer). Active surrender, not passive hope."}], "dive": "<span class='gi'>Helde</span> from healdan — to hold. The protection is not a shield but a holding. <span class='gi'>Bebeode</span> — you actively commend yourself. The charm is not a prayer. It is a transaction."}, {"s": 1, "oe": "wið þone sāran stice · wið þone sāran slege", "pron": "WITH THON-eh SAH-ran STITCH-eh · WITH THON-eh SAH-ran SLEH-yeh", "eng": "against the sore stitch · against the sore blow", "mode": "word", "words": [{"oe": "wið", "pron": "WITH", "eng": "against, towards", "type": "preposition", "accepts": ["against", "towards", "with"], "note": "Protective — against harm. Root of 'with' but OE meaning is adversarial."}, {"oe": "þone", "pron": "THON-eh", "eng": "the", "type": "demonstrative · acc masc", "accepts": ["the", "that"], "note": "Accusative masculine — pointing at the specific threat"}, {"oe": "sāran", "pron": "SAH-ran", "eng": "sore, painful", "type": "adj · acc", "accepts": ["sore", "painful", "bitter", "grievous"], "note": "Root of 'sore'. The pain is named directly."}, {"oe": "stice", "pron": "STITCH-eh", "eng": "stitch, stab, piercing", "type": "noun · masc · acc", "accepts": ["stitch", "stab", "piercing", "prick", "sting"], "note": "A sudden pain understood as something entering the body."}, {"oe": "slege", "pron": "SLEH-yeh", "eng": "blow, strike", "type": "noun · masc · acc", "accepts": ["blow", "strike", "hit", "stroke"], "note": "From slēan (to strike). The blow that comes without warning."}], "dive": "The charm names what it protects against. <span class='gi'>Stice</span> — stitch. A sudden pain is not metaphorical: something has entered. <span class='gi'>Slege</span> — blow. The charm addresses the cause, not the symptom."}, {"s": 1, "oe": "wið þone grymman gryre", "pron": "WITH THON-eh GROOM-man GROO-reh", "eng": "against the fierce terror", "mode": "word", "words": [{"oe": "grymman", "pron": "GROOM-man", "eng": "fierce, grim, cruel", "type": "adj · acc", "accepts": ["fierce", "grim", "cruel", "terrible"], "note": "Root of 'grim'. The alliteration with gryre is deliberate."}, {"oe": "gryre", "pron": "GROO-reh", "eng": "terror, horror, dread", "type": "noun · masc · acc", "accepts": ["terror", "horror", "dread", "fear"], "note": "The specific dread that rises in the chest before dawn."}], "dive": "<span class='gi'>Grymman gryre</span> — the g-r alliteration is the growl of the thing itself. The charm names the terror to gain power over it. What you name, you can address. What you address, you can command."}, {"s": 1, "oe": "and wið ǣlcne ondsǣtan þe on lond fare", "pron": "and WITH ÆLK-neh OND-sæ-tan theh on LOND FAH-reh", "eng": "and against every enemy that into the land comes", "mode": "sentence", "dive": "The final line of the protection sequence. <span class='gi'>Ondsǣtan</span> — enemy, adversary. The charm covers everything: stitch, blow, terror, and every adversary that enters the land. This is walking the bounds."}, {"s": 2, "st": "Æcerbot · Field Remedy", "oe": "Erce, Erce, Erce · eorþan mōdor", "pron": "EAR-cheh EAR-cheh EAR-cheh · EOR-than MOH-dor", "eng": "Erce, Erce, Erce · mother of earth", "mode": "word", "words": [{"oe": "Erce", "pron": "EAR-cheh", "eng": "Erce", "type": "name · unknown", "accepts": ["Erce", "erce"], "note": "Nobody knows who she is. Triple invocation. She survived because the scribes could not erase what they did not understand."}, {"oe": "eorþan", "pron": "EOR-than", "eng": "of earth, earth's", "type": "noun · fem · gen", "accepts": ["of earth", "earth's", "of the earth"], "note": "Genitive — earth belongs to her, or she to earth"}, {"oe": "mōdor", "pron": "MOH-dor", "eng": "mother", "type": "noun · fem", "accepts": ["mother"], "note": "Same word, same meaning, a thousand years."}], "dive": "The triple invocation. <span class='gi'>Erce</span> survives in a single manuscript. Mother of earth — not a metaphor. A direct address to a named power. The charm instructs: face east when you speak this."}, {"s": 2, "oe": "geunne þē se ālwalda · ēce drihten", "pron": "geh-OON-neh THEH seh AHL-wal-dah · EH-cheh DRICH-ten", "eng": "may the all-ruler grant you · eternal lord", "mode": "word", "words": [{"oe": "geunne", "pron": "geh-OON-neh", "eng": "may grant, grant", "type": "verb · subj", "accepts": ["grant", "may grant"], "note": "Subjunctive — a wish, not a statement. The optative mood of operative speech."}, {"oe": "þē", "pron": "THEH", "eng": "you, to you", "type": "pronoun · dat", "accepts": ["you", "to you", "thee"], "note": "Speaking to the earth directly. Second person."}, {"oe": "ālwalda", "pron": "AHL-wal-dah", "eng": "all-ruler, almighty", "type": "noun · masc", "accepts": ["all-ruler", "almighty", "all-wielder"], "note": "Christian term over whatever was there before."}, {"oe": "ēce", "pron": "EH-cheh", "eng": "eternal, everlasting", "type": "adjective", "accepts": ["eternal", "everlasting", "forever"], "note": "Modifies drihten"}, {"oe": "drihten", "pron": "DRICH-ten", "eng": "lord", "type": "noun · masc", "accepts": ["lord", "master", "ruler"], "note": "From dryht (warband) — a lord who commands a retinue."}], "dive": "The Christian layer over the pagan substrate. <span class='gi'>Ālwalda</span> and <span class='gi'>drihten</span> are warrior-lord titles. The structure — speaking to the earth, asking a higher power to grant what the earth needs — predates the names."}, {"s": 2, "oe": "æcera wexendra · and wīdiendra", "pron": "AK-er-ah WECKS-end-rah · and WEE-dee-end-rah", "eng": "of acres waxing · and widening", "mode": "word", "words": [{"oe": "æcera", "pron": "AK-er-ah", "eng": "of acres, of fields", "type": "noun · gen pl", "accepts": ["of acres", "acres", "fields", "of fields"], "note": "Root of 'acre'. What is wished for."}, {"oe": "wexendra", "pron": "WECKS-end-rah", "eng": "waxing, growing", "type": "participle · gen pl", "accepts": ["waxing", "growing", "increasing"], "note": "Root of 'wax' (to grow). The growing is ongoing."}, {"oe": "wīdiendra", "pron": "WEE-dee-end-rah", "eng": "widening, spreading", "type": "participle · gen pl", "accepts": ["widening", "spreading", "expanding"], "note": "Root of 'widen'. The land spreads outward."}], "dive": "Two present participles: <span class='gi'>wexendra · wīdiendra</span>. The acres are actively waxing, actively widening. The charm asks for fields in the act of growing. The process, not the product."}, {"s": 2, "oe": "Hāl wes þū, folde · frā mōdor", "pron": "HAHL wes THOO FOLD-eh · FRAH MOH-dor", "eng": "Be whole, earth · generous mother", "mode": "word", "words": [{"oe": "hāl", "pron": "HAHL", "eng": "whole, hale, healthy", "type": "adjective", "accepts": ["whole", "hale", "healthy", "sound"], "note": "Root of 'whole', 'hale', 'health', 'holy'. All the same word. To be whole is to be holy."}, {"oe": "wes", "pron": "WES", "eng": "be", "type": "verb · imperative", "accepts": ["be"], "note": "Imperative. A command. You TELL the earth to be whole."}, {"oe": "þū", "pron": "THOO", "eng": "you", "type": "pronoun · nom", "accepts": ["you", "thou"], "note": "Speaking to the earth as a person. Intimate."}, {"oe": "folde", "pron": "FOLD-eh", "eng": "earth, ground, land", "type": "noun · fem · voc", "accepts": ["earth", "ground", "land", "soil", "fold"], "note": "Vocative — directly addressed."}, {"oe": "frā", "pron": "FRAH", "eng": "generous, bountiful", "type": "adjective", "accepts": ["generous", "bountiful", "liberal", "noble"], "note": "You name what she is so she can be it."}, {"oe": "mōdor", "pron": "MOH-dor", "eng": "mother", "type": "noun · fem · voc", "accepts": ["mother"], "note": "The earth addressed as mother."}], "dive": "<span class='gi'>Hāl wes þū</span> — be whole. The root connects whole, hale, health, and holy. <span class='gi'>Folde</span> in the vocative — you speak TO the ground beneath your feet. The Æcerbot instructs: kneel when you say this."}, {"s": 3, "st": "Nigon Wyrta Galdor · Nine Herbs Charm", "oe": "Gemyne ðū, mugcwyrt · hwæt þū āmeldodest", "pron": "yeh-MOON-eh THOO MOOJ-kwoort · HWÆT thoo ah-MEL-dod-est", "eng": "Remember, mugwort · what you proclaimed", "mode": "word", "words": [{"oe": "gemyne", "pron": "yeh-MOON-eh", "eng": "remember", "type": "verb · imperative", "accepts": ["remember", "recall", "be mindful"], "note": "You are commanding the plant to remember. Not asking."}, {"oe": "ðū", "pron": "THOO", "eng": "you", "type": "pronoun · nom", "accepts": ["you", "thou"], "note": "Speaking to the plant directly."}, {"oe": "mugcwyrt", "pron": "MOOJ-kwoort", "eng": "mugwort", "type": "noun · fem", "accepts": ["mugwort"], "note": "Artemisia vulgaris. First of nine. Still grows on every roadside."}, {"oe": "hwæt", "pron": "HWÆT", "eng": "what", "type": "pronoun", "accepts": ["what"], "note": "Same hwæt that opens Beowulf."}, {"oe": "āmeldodest", "pron": "ah-MEL-dod-est", "eng": "proclaimed, made known", "type": "verb · 2sg past", "accepts": ["proclaimed", "made known", "announced", "declared"], "note": "The plant once declared something. The charm calls it back to that declaration."}], "dive": "You speak to mugwort and command it to remember its own power. <span class='gi'>Gemyne</span> — same root as gemyndig (mindful). But here directed outward: you make the plant mindful of itself. The operative assumption: things have declared natures, and can be recalled to them."}, {"s": 3, "oe": "Wyrm cōm snīcan · toslāt hē mann", "pron": "WOORM KOHM SNEE-kan · toh-SLAHT heh MANN", "eng": "A serpent came creeping · it tore apart a man", "mode": "word", "words": [{"oe": "wyrm", "pron": "WOORM", "eng": "serpent, dragon, worm", "type": "noun · masc", "accepts": ["serpent", "dragon", "worm", "wyrm", "snake"], "note": "The wyrm. The adversary in the charm."}, {"oe": "cōm", "pron": "KOHM", "eng": "came", "type": "verb · past 3sg", "accepts": ["came"], "note": "Past of cuman. It came."}, {"oe": "snīcan", "pron": "SNEE-kan", "eng": "to creep, to crawl", "type": "verb · inf", "accepts": ["creep", "crawl", "to creep", "to crawl", "sneak", "to sneak"], "note": "Root of 'sneak'. Surreptitious movement."}, {"oe": "toslāt", "pron": "toh-SLAHT", "eng": "tore apart, split", "type": "verb · past 3sg", "accepts": ["tore apart", "split", "ripped", "tore", "destroyed"], "note": "to- (apart) + slāt. Total destruction."}, {"oe": "mann", "pron": "MANN", "eng": "a person, a man", "type": "noun · masc", "accepts": ["man", "person", "a man", "a person"], "note": "Generic — any person."}], "dive": "<span class='gi'>Wyrm cōm snīcan</span> — the serpent came creeping. <span class='gi'>Snīcan</span> — root of sneak. <span class='gi'>Toslāt</span> — the to- prefix means complete destruction. The charm names the worst first."}, {"s": 3, "oe": "Ðā genam Wōden nigon wuldortānas", "pron": "THAH yeh-NAM WOH-den NIG-on WOOL-dor-TAH-nas", "eng": "Then Woden took nine glory-twigs", "mode": "word", "words": [{"oe": "ðā", "pron": "THAH", "eng": "then", "type": "adverb", "accepts": ["then", "at that time"], "note": "The pivot. After the wyrm's attack — then Woden acts."}, {"oe": "genam", "pron": "yeh-NAM", "eng": "took, seized", "type": "verb · past 3sg", "accepts": ["took", "seized", "grasped"], "note": "ge- = completed action. Decisive."}, {"oe": "Wōden", "pron": "WOH-den", "eng": "Woden, Odin", "type": "name", "accepts": ["Woden", "Odin", "Wodan"], "note": "Named in a Christian manuscript. The monks left him in because the charm would not work without him."}, {"oe": "nigon", "pron": "NIG-on", "eng": "nine", "type": "numeral", "accepts": ["nine", "9"], "note": "The ritual number throughout the charm."}, {"oe": "wuldortānas", "pron": "WOOL-dor-TAH-nas", "eng": "glory-twigs", "type": "noun · masc · acc pl", "accepts": ["glory-twigs", "glory twigs", "glorious twigs", "wondrous branches"], "note": "wuldor (glory) + tān (twig). Nine branches become nine herbs."}], "dive": "Woden in a Christian manuscript. <span class='gi'>Wuldortānas</span> — glory-twigs. The operative principle: counter with the same number, reversed."}, {"s": 3, "oe": "slōh ðā þā næddran · ðæt hēo on nigon tofleah", "pron": "SLOH thah thah NÆD-ran · thæt HEH-oh on NIG-on toh-FLEH-ah", "eng": "struck then the serpent · so it flew into nine pieces", "mode": "word", "words": [{"oe": "slōh", "pron": "SLOH", "eng": "struck, slew", "type": "verb · past 3sg", "accepts": ["struck", "slew", "hit", "smote"], "note": "Past of slēan. Root of 'slay'. Woden's blow."}, {"oe": "næddran", "pron": "NÆD-ran", "eng": "serpent, adder", "type": "noun · fem · acc", "accepts": ["serpent", "adder", "snake", "viper"], "note": "Root of 'adder' (a nadder > an adder)."}, {"oe": "nigon", "pron": "NIG-on", "eng": "nine", "type": "numeral", "accepts": ["nine", "9"], "note": "Nine herbs, nine twigs, nine pieces."}, {"oe": "tofleah", "pron": "toh-FLEH-ah", "eng": "flew apart, scattered", "type": "verb · past 3sg", "accepts": ["flew apart", "scattered", "flew into pieces", "dispersed"], "note": "to- (apart) + flēon (to fly). Complete dispersal."}], "dive": "The serpent struck into nine pieces. <span class='gi'>Tofleah</span> — flew apart. Each piece becomes a condition the herbs cure. What was one evil broken into manageable parts."}, {"s": 4, "st": "Wið Færstice · Against Elf-Shot", "oe": "Hlude wǣran hȳ · lā hlude", "pron": "HLOOD-eh WÆHR-an HOO · LAH HLOOD-eh", "eng": "Loud were they · lo, loud", "mode": "word", "words": [{"oe": "hlude", "pron": "HLOOD-eh", "eng": "loud, loudly", "type": "adverb", "accepts": ["loud", "loudly"], "note": "The charm opens with sound. The hl- is itself loud in the mouth."}, {"oe": "wǣran", "pron": "WÆHR-an", "eng": "were", "type": "verb · past pl", "accepts": ["were"], "note": "Past plural. They were. Something happened."}, {"oe": "hȳ", "pron": "HOO", "eng": "they", "type": "pronoun · nom pl", "accepts": ["they"], "note": "The mighty women who ride through the air."}, {"oe": "lā", "pron": "LAH", "eng": "lo, oh, indeed", "type": "interjection", "accepts": ["lo", "oh", "indeed", "alas"], "note": "The breath between the two hlude's."}], "dive": "<span class='gi'>Hlude · lā hlude</span> — the repetition IS the charm working. Say it aloud: the hl- forces breath through the mouth like wind."}, {"s": 4, "oe": "ðā hȳ ofer þone hlǣw ridan", "pron": "THAH HOO OH-ver THON-eh HLÆW REE-dan", "eng": "when they over the mound rode", "mode": "word", "words": [{"oe": "ofer", "pron": "OH-ver", "eng": "over, across", "type": "preposition", "accepts": ["over", "across", "above"], "note": "They ride OVER the mound. Airborne."}, {"oe": "hlǣw", "pron": "HLÆW", "eng": "mound, barrow, hill", "type": "noun · masc · acc", "accepts": ["mound", "barrow", "hill", "burial mound"], "note": "Often a burial mound. The riders come from the places of the dead."}, {"oe": "ridan", "pron": "REE-dan", "eng": "to ride, rode", "type": "verb", "accepts": ["ride", "rode", "to ride"], "note": "Root of 'ride'. Through the air over the mound."}], "dive": "They ride over the <span class='gi'>hlǣw</span> — the barrow. The riders come from between worlds. The mound is a threshold."}, {"s": 4, "oe": "Ūt, lytel spere · gif hēr inne sīe", "pron": "OOT LOO-tel SPEH-reh · yif HEHR INN-eh SEE-eh", "eng": "Out, little spear · if here within it be", "mode": "word", "words": [{"oe": "ūt", "pron": "OOT", "eng": "out", "type": "adverb", "accepts": ["out"], "note": "One syllable. The operative core of the whole charm."}, {"oe": "lytel", "pron": "LOO-tel", "eng": "little, small", "type": "adjective", "accepts": ["little", "small"], "note": "You diminish the weapon by naming it small."}, {"oe": "spere", "pron": "SPEH-reh", "eng": "spear", "type": "noun · neut", "accepts": ["spear", "dart", "point"], "note": "The pain is a spear. Naming it makes it removable."}, {"oe": "gif", "pron": "YIF", "eng": "if", "type": "conjunction", "accepts": ["if"], "note": "Root of 'if'. The conditional — a diagnostic."}, {"oe": "hēr", "pron": "HEHR", "eng": "here", "type": "adverb", "accepts": ["here"], "note": "In the body. Where the pain is."}, {"oe": "inne", "pron": "INN-eh", "eng": "within, inside", "type": "adverb", "accepts": ["within", "inside", "in"], "note": "Inside the body."}, {"oe": "sīe", "pron": "SEE-eh", "eng": "may be, is", "type": "verb · subj", "accepts": ["be", "is", "may be"], "note": "Subjunctive — the charm doesn't assume. It tests."}], "dive": "<span class='gi'>Ūt, lytel spere</span> — Out, little spear. The most direct operative formula in OE. You command the cause of pain to leave. You call it little. You name it a spear — which means it can be pulled out."}, {"s": 5, "st": "Bēo-galdor · Bee Charm", "oe": "Sitte gē, sīgewīf · sīgað tō eorþan", "pron": "SIT-teh YEH SEE-yeh-WEEF · SEE-gath toh EOR-than", "eng": "Sit, victory-women · sink to earth", "mode": "word", "words": [{"oe": "sitte", "pron": "SIT-teh", "eng": "sit", "type": "verb · imperative pl", "accepts": ["sit"], "note": "Command. Imperative plural."}, {"oe": "gē", "pron": "YEH", "eng": "you (plural)", "type": "pronoun · nom pl", "accepts": ["you", "ye"], "note": "Addressing the whole swarm as one entity"}, {"oe": "sīgewīf", "pron": "SEE-yeh-WEEF", "eng": "victory-women", "type": "noun · fem · nom pl", "accepts": ["victory-women", "victory women", "triumphant women"], "note": "sige (victory) + wīf (women). The bees are warriors, not insects."}, {"oe": "sīgað", "pron": "SEE-gath", "eng": "sink, descend", "type": "verb · imperative pl", "accepts": ["sink", "descend", "settle", "come down"], "note": "Sink — downward. To earth."}, {"oe": "tō", "pron": "TOH", "eng": "to", "type": "preposition", "accepts": ["to"], "note": "Direction"}, {"oe": "eorþan", "pron": "EOR-than", "eng": "earth", "type": "noun · fem · dat", "accepts": ["earth", "ground", "the earth"], "note": "Come down to earth."}], "dive": "Bees addressed as <span class='gi'>sīgewīf</span> — victory-women. The charm recognises something in the swarm's nature and speaks to it. The charmer commands because the charmer knows what the swarm is."}, {"s": 5, "oe": "nǣfre gē wilde tō wuda fleogan", "pron": "NÆV-reh yeh WILD-eh toh WOOD-ah FLEH-oh-gan", "eng": "never you wild to the wood fly", "mode": "word", "words": [{"oe": "nǣfre", "pron": "NÆV-reh", "eng": "never", "type": "adverb", "accepts": ["never"], "note": "ne + ǣfre. Absolute prohibition."}, {"oe": "wilde", "pron": "WILD-eh", "eng": "wild, wilful", "type": "adjective", "accepts": ["wild", "wilful", "untamed"], "note": "The state being forbidden."}, {"oe": "wuda", "pron": "WOOD-ah", "eng": "wood, forest", "type": "noun · masc · dat", "accepts": ["wood", "forest", "woods"], "note": "The wild place. Where the swarm would be lost."}, {"oe": "fleogan", "pron": "FLEH-oh-gan", "eng": "fly", "type": "verb · inf", "accepts": ["fly", "to fly"], "note": "The action forbidden."}], "dive": "<span class='gi'>Wilde tō wuda</span> — wild to the wood. Alliterative w-w binding. The charm holds the boundary between the kept and the lost."}, {"s": 6, "st": "Rūnstafas · The Rune Poem", "oe": "ᚠ Feoh byþ frōfur · fīra gehwylcum", "pron": "FEH-oh BOOTH FROH-fur · FEE-rah yeh-HWOOL-kum", "eng": "ᚠ Wealth is a comfort · to every person", "mode": "word", "words": [{"oe": "feoh", "pron": "FEH-oh", "eng": "wealth, cattle, money", "type": "noun · neut", "accepts": ["wealth", "cattle", "money", "fee", "property"], "note": "Root of 'fee'. Originally cattle. The first rune."}, {"oe": "byþ", "pron": "BOOTH", "eng": "is (always, by nature)", "type": "verb · 3sg", "accepts": ["is", "is always"], "note": "Gnomic present. A truth about the nature of things."}, {"oe": "frōfur", "pron": "FROH-fur", "eng": "comfort, consolation", "type": "noun · fem", "accepts": ["comfort", "consolation", "solace", "relief"], "note": "What wealth provides. But the full stanza qualifies this."}, {"oe": "fīra", "pron": "FEE-rah", "eng": "of people, of men", "type": "noun · gen pl", "accepts": ["of people", "of men", "of everyone"], "note": "Genitive plural."}, {"oe": "gehwylcum", "pron": "yeh-HWOOL-kum", "eng": "to each, to every one", "type": "pronoun · dat", "accepts": ["each", "every", "to each", "to every one"], "note": "Dative — comfort TO each person."}], "dive": "Each Rune Poem stanza is a compressed meditation. <span class='gi'>Feoh</span> — wealth, cattle, fee. The full stanza warns: share it freely or lose honour. Wealth that moves is alive. Wealth that hoards is dead."}, {"s": 6, "oe": "ᚦ Þorn byþ ðearle scearp · ðegna gehwylcum", "pron": "THORN BOOTH THEAR-leh SHARP · THEN-ah yeh-HWOOL-kum", "eng": "ᚦ Thorn is extremely sharp · to every thane", "mode": "word", "words": [{"oe": "þorn", "pron": "THORN", "eng": "thorn", "type": "noun · masc", "accepts": ["thorn"], "note": "The letter þ IS the thorn. The rune names itself."}, {"oe": "ðearle", "pron": "THEAR-leh", "eng": "extremely, severely", "type": "adverb", "accepts": ["extremely", "severely", "very", "exceedingly"], "note": "Not just sharp — extremely sharp."}, {"oe": "scearp", "pron": "SHARP", "eng": "sharp", "type": "adjective", "accepts": ["sharp"], "note": "Root of 'sharp'. Same word."}, {"oe": "ðegna", "pron": "THEN-ah", "eng": "of thanes, of warriors", "type": "noun · gen pl", "accepts": ["of thanes", "thanes", "warriors", "of warriors"], "note": "Even warriors find the thorn sharp."}], "dive": "<span class='gi'>Þorn</span> — the rune that names itself. What is sharp will cut you regardless of your standing. Respect the boundary."}, {"s": 6, "oe": "ᚩ Ōs byþ ordfruma · ǣlcre sprǣce", "pron": "OHS BOOTH ORD-froo-mah · ÆLK-reh SPRÆKH-eh", "eng": "ᚩ Mouth is the source · of all speech", "mode": "word", "words": [{"oe": "ōs", "pron": "OHS", "eng": "mouth, god, divine voice", "type": "noun · masc", "accepts": ["mouth", "god", "divine voice", "voice"], "note": "Ōs means both 'mouth' and connects to Norse áss (god). Both simultaneously."}, {"oe": "ordfruma", "pron": "ORD-froo-mah", "eng": "source, origin, beginning", "type": "noun · masc", "accepts": ["source", "origin", "beginning", "first cause"], "note": "ord (point) + fruma (first). Where it all starts."}, {"oe": "ǣlcre", "pron": "ÆLK-reh", "eng": "of every, of each", "type": "adj · gen fem", "accepts": ["every", "each", "of every", "of each"], "note": "Genitive feminine."}, {"oe": "sprǣce", "pron": "SPRÆKH-eh", "eng": "speech, language", "type": "noun · fem · gen", "accepts": ["speech", "language", "of speech"], "note": "Root of 'speak'. The mouth as origin of all galdor."}], "dive": "<span class='gi'>Ōs</span> — the most layered rune. Mouth AND god. The divine and the spoken are the same channel. The rune that explains why charms must be spoken aloud."}, {"s": 6, "oe": "ᚱ Rād byþ on recyde · rinca gehwylcum", "pron": "RAHD BOOTH on REK-ood-eh · RINK-ah yeh-HWOOL-kum", "eng": "ᚱ Riding seems easy · to every warrior in the hall", "mode": "word", "words": [{"oe": "rād", "pron": "RAHD", "eng": "riding, journey, road", "type": "noun · fem", "accepts": ["riding", "journey", "road", "ride"], "note": "Root of 'road' and 'ride'. The rune of travel."}, {"oe": "recyde", "pron": "REK-ood-eh", "eng": "in the hall, in the house", "type": "noun · masc · dat", "accepts": ["in the hall", "hall", "house", "in the house"], "note": "When you're sitting inside, the journey seems easy."}, {"oe": "rinca", "pron": "RINK-ah", "eng": "of warriors, of men", "type": "noun · gen pl", "accepts": ["of warriors", "warriors", "of men"], "note": "A warrior-specific term."}], "dive": "<span class='gi'>Rād</span> seems easy from the hall. Much harder on the mile-paths. Don't confuse knowing about a thing with doing the thing."}, {"s": 6, "oe": "ᛇ Ēoh byþ ūtan · unsmeþe trēow", "pron": "EH-oh BOOTH OO-tan · UN-smeth-eh TREH-ow", "eng": "ᛇ Yew is outside · a rough tree", "mode": "word", "words": [{"oe": "ēoh", "pron": "EH-oh", "eng": "yew", "type": "noun · masc", "accepts": ["yew", "yew tree"], "note": "Lives a thousand years. The rune of endurance."}, {"oe": "ūtan", "pron": "OO-tan", "eng": "outside, on the outside", "type": "adverb", "accepts": ["outside", "on the outside", "without"], "note": "The yew stands outside. Not cultivated."}, {"oe": "unsmeþe", "pron": "UN-smeth-eh", "eng": "rough, unsmooth", "type": "adjective", "accepts": ["rough", "unsmooth", "harsh", "rugged"], "note": "un- + smeþe (smooth). Not polished."}, {"oe": "trēow", "pron": "TREH-ow", "eng": "tree", "type": "noun · neut", "accepts": ["tree"], "note": "Root of 'tree' and 'true' and 'trust'. All the same root. What stands firm."}], "dive": "Rough outside, fire inside. <span class='gi'>Ūtan</span> — outside. A tree that endures a thousand years because it does not seek the comfort of the hall."}, {"s": 6, "oe": "ᛁ Īs byþ oferceald · ungemetum slidor", "pron": "EES BOOTH OH-ver-keh-AHLD · UN-yeh-MET-um SLID-or", "eng": "ᛁ Ice is very cold · immeasurably slippery", "mode": "word", "words": [{"oe": "īs", "pron": "EES", "eng": "ice", "type": "noun · neut", "accepts": ["ice"], "note": "Root of 'ice'. The rune of frozen surfaces."}, {"oe": "oferceald", "pron": "OH-ver-keh-AHLD", "eng": "very cold, exceedingly cold", "type": "adjective", "accepts": ["very cold", "exceedingly cold", "overcold"], "note": "ofer- + ceald. More than cold."}, {"oe": "ungemetum", "pron": "UN-yeh-MET-um", "eng": "immeasurably, beyond measure", "type": "adverb", "accepts": ["immeasurably", "beyond measure", "excessively", "exceedingly"], "note": "What cannot be measured."}, {"oe": "slidor", "pron": "SLID-or", "eng": "slippery, treacherous", "type": "adjective", "accepts": ["slippery", "treacherous", "sliding"], "note": "Root of 'slide' and 'slither'. The surface you cannot hold."}], "dive": "<span class='gi'>Īs</span> — cold beyond measure, slippery beyond grip. Ice glistens like gems, fair to look upon. Beautiful and lethal. What shines is not always safe."}], "hidden": true}];

function lineHTML(item,showSrc){
  const id='ln_'+item.textIdx+'_'+item.lineIdx;
  const isCore=core[item.oe];
  const badge=isCore==='active'?'<span class="core-badge core-active">active</span>':isCore==='shelf'?'<span class="core-badge core-shelf">shelf</span>':'';
  let words='';
  if(item.words){
    words=item.words.map(w=>`<div class="wd"><span class="woe">${w.oe}</span> <span class="wen">${w.eng}</span><br><span class="wtype">${w.type||''}</span></div>`).join('');
  }
  return `<div class="line" onclick="toggleLine('${id}')">
    <div class="pron">${item.pron}${badge}</div>
    <div class="oe">${item.oe}</div>
    <div class="eng">${item.eng}</div>
    ${showSrc?`<div class="src">${item.src}</div>`:''}
  </div>
  <div class="line-detail" id="${id}">
    ${words?`<div style="margin-bottom:8px">${words}</div>`:''}
    ${item.dive?`<div class="dive">${item.dive}</div>`:''}
    <div class="btn-row">
      <button class="btn btn-s" onclick="event.stopPropagation();markCore('${item.oe.replace(/'/g,"\\'")}','active')">Mark active \u2b50</button>
      <button class="btn btn-s" onclick="event.stopPropagation();markCore('${item.oe.replace(/'/g,"\\'")}','shelf')">On shelf \u{1f4da}</button>
    </div>
  </div>`;
}

function toggleLine(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('show');
}

function markCore(oe,status){
  core[oe]=status;
  localStorage.setItem('oe_core',JSON.stringify(core));
  render();
}

const pathState=JSON.parse(localStorage.getItem('oe_path')||'{"week":1,"day":1,"log":{}}');
function savePath(){localStorage.setItem('oe_path',JSON.stringify(pathState))}

function rPath(m){
  const w=PATH_WEEKS[pathState.week-1]||PATH_WEEKS[0];
  const dayNum=pathState.day;
  const dt=DAY_TYPES[dayNum-1];
  const dayTask=w.onWalk[String(dayNum)]||'Walk.';

  let h=`<div class="card" style="text-align:center">
    <div style="font-size:0.6em;color:var(--dim);text-transform:uppercase;letter-spacing:2px">Week ${pathState.week} of 8</div>
    <h2 style="font-size:1.1em;margin:4px 0">${w.name}</h2>
    <div style="font-size:0.75em;color:var(--dim)">${w.focus}</div>
    <div style="display:flex;justify-content:center;gap:4px;margin-top:8px">
      ${PATH_WEEKS.map((_,i)=>`<div style="width:${i<pathState.week-1?'12px':'10px'};height:6px;border-radius:3px;background:${i<pathState.week-1?'var(--green)':i===pathState.week-1?'var(--gold)':'var(--border)'}"></div>`).join('')}
    </div>
  </div>`;

  // TODAY'S TYPE
  h+=`<div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="font-size:1.5em">${dt.icon}</div>
      <div><div style="font-size:0.62em;color:var(--gold);text-transform:uppercase;letter-spacing:1px">Day ${dayNum}</div>
      <div style="font-size:0.95em;font-weight:800;color:var(--text)">${dt.name}</div></div>
    </div>
    <p style="font-size:0.82em">${dt.desc}</p>

  // ANCHOR
  h+=`<div class="card">
    <div style="font-size:0.62em;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">\u2693 Anchor line</div>
    <div style="font-size:1em;color:var(--gold);font-weight:700">${w.anchor.pron}</div>
    <div style="font-size:0.95em;font-weight:600">${w.anchor.oe}</div>
    <div style="font-size:0.8em;color:var(--dim);font-style:italic">${w.anchor.eng}</div>
    ${dayNum===2?'<div style="font-size:0.72em;color:var(--gold);margin-top:6px">\ud83d\udd0a Today: say this 5 times aloud. Now.</div>':''}
  </div>`;

  // TODAY'S TASK
  h+=`<div class="card">
    <h2 style="font-size:0.88em">\ud83d\udccd Today\u2019s task</h2>
    <p style="font-size:0.88em;color:var(--text)">${dayTask}</p>
  </div>`;

  // DAY-SPECIFIC CONTENT
  if(dayNum===1){
    h+=`<div class="card"><h2 style="font-size:0.85em">\ud83c\udfa7 Listen</h2>
    <div style="display:flex;flex-direction:column;gap:4px;margin:6px 0">
      <a href="https://www.oldenglishaerobics.net/wanderer.php" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border-radius:var(--rs)">\ud83d\udd0a The Wanderer</a>
      <a href="https://www.oldenglishaerobics.net/seafarer.php" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border-radius:var(--rs)">\ud83d\udd0a The Seafarer</a>
    </div></div>`;
  }

  if(dayNum===3&&w.newChunk){
    h+=`<div class="card"><h2 style="font-size:0.85em">\ud83c\udf31 New word</h2>
    <div style="text-align:center;padding:12px">
      <div style="font-size:1.8em;color:var(--gold);font-weight:800">${w.newChunk.oe}</div>
      <div style="font-size:1em;color:var(--gold)">${w.newChunk.pron}</div>
      <div style="font-size:0.88em;color:var(--dim)">${w.newChunk.eng}</div>
      <div style="font-size:0.72em;color:var(--light);margin-top:8px">\ud83d\udd0a Say it 10 times. Low in the jaw.</div>
    </div></div>`;
  }

  if(dayNum===4){
    h+=`<div class="card" style="text-align:center;background:rgba(0,0,0,0.3)">
    <div style="font-size:2em;margin-bottom:4px">\ud83c\udf11</div>
    <p style="font-size:0.88em;color:var(--text)">No phone on the walk today. Close this now. Walk and see what rises.</p>
    <p style="font-size:0.75em;color:var(--dim)">Come back after and log what happened.</p>
    </div>`;
  }

  if(dayNum===7){
    h+=`<div class="card"><h2 style="font-size:0.85em">\ud83d\udcd3 Weekly review</h2>
    <p style="font-size:0.82em">Open the \u2b50 Core tab. Count your active lines and chunks. Be honest about what\u2019s shelf. Then log below.</p>
    </div>`;
  }

  // CHUNKS (days 1,2,3,5)
  if([1,2,3,5].includes(dayNum)&&w.chunks.length){
    h+=`<div class="card"><h2 style="font-size:0.82em">This week\u2019s chunks</h2>
    <div style="display:flex;flex-wrap:wrap;gap:5px">${w.chunks.map(c=>{const ch=CHUNKS.find(x=>x.oe===c);return ch?`<div class="wd" style="cursor:default"><span class="woe">${ch.oe}</span><br><span style="font-size:0.85em;color:var(--gold)">${ch.pron}</span><br><span class="wen">${ch.eng}</span></div>`:''}).join('')}</div></div>`;
  }

  // LINES (days 1,2,5)
  if([1,2,5].includes(dayNum)&&w.lines.length){
    h+=`<div class="card"><h2 style="font-size:0.82em">This week\u2019s lines</h2>`;
    for(const loe of w.lines){const item=ALL.find(a=>a.oe===loe);if(item)h+=lineHTML(item,false)}
    h+=`</div>`;
  }

  // LOG
  h+=`<div class="card"><h2 style="font-size:0.82em">\ud83d\udcd3 Today\u2019s log</h2>
  <textarea id="dayLog" style="width:100%;padding:10px;border:2px solid var(--border);border-radius:var(--rs);background:rgba(0,0,0,0.2);color:var(--text);font-family:'Nunito',sans-serif;font-size:0.82em;min-height:60px;resize:vertical" placeholder="What rose? What didn\u2019t? Quick note\u2026" oninput="pathState.log['w'+pathState.week+'d'+pathState.day]=this.value;savePath()">${pathState.log['w'+pathState.week+'d'+pathState.day]||''}</textarea></div>`;

  // NAV
  h+=`<div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn btn-s" style="flex:1" onclick="if(pathState.day>1){pathState.day--}else if(pathState.week>1){pathState.week--;pathState.day=7}savePath();render()" ${pathState.week===1&&pathState.day===1?'disabled':''}>\u2190 Yesterday</button>
    <button class="btn btn-g" style="flex:1" onclick="if(pathState.day<7){pathState.day++}else if(pathState.week<8){pathState.week++;pathState.day=1}savePath();render()">Tomorrow \u2192</button>
  </div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn btn-s" style="flex:1;font-size:0.7em" onclick="pathState.week=Math.max(1,pathState.week-1);pathState.day=1;savePath();render()">\u2190 Prev week</button>
    <button class="btn btn-s" style="flex:1;font-size:0.7em" onclick="pathState.week=Math.min(8,pathState.week+1);pathState.day=1;savePath();render()">Next week \u2192</button>
  </div>`;

  h+='<div class="brand">Galdorcr\u00e6ft \u00b7 10 minutes \u00b7 The mouth makes the trace</div>';
  m.innerHTML=h;
}

// ═══════ WALK SEQUENCE ═══════
function rWalk(m){
  let h=`<div class="card"><h2>The Walk</h2><p>Scroll through before you go out. Prime the motor system. Each stage shows the lines and words you might need. This is not study — it's preparation. Read the pronunciation aloud. Let it sit in the jaw.</p></div>`;
  for(const stage of WALK_SEQ){
    h+=`<div class="sit-group"><div class="sit-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <h3>${stage.stage}</h3><span class="ct">${stage.desc}</span>
    </div><div class="sit-body">`;
    // Lines for this stage
    for(const loe of stage.lines){
      const item=ALL.find(a=>a.oe===loe)||OPS.find(o=>o.oe===loe);
      if(item)h+=lineHTML(item,false);
      else{// Find in TEXTS
        for(const t of TEXTS){const l=t.lines.find(x=>x.oe===loe);if(l){h+=lineHTML({...l,src:t.title,textIdx:TEXTS.indexOf(t),lineIdx:t.lines.indexOf(l)},false);break}}
      }
    }
    // Chunks for this stage
    const stageChunks=stage.chunks.map(c=>CHUNKS.find(ch=>ch.oe===c)).filter(Boolean);
    if(stageChunks.length){
      h+=`<div style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px">`;
      for(const c of stageChunks){
        h+=`<div class="wd" style="cursor:default"><span class="woe">${c.oe}</span><br><span class="wen">${c.pron}</span><br><span style="font-size:0.8em;color:var(--dim)">${c.eng}</span></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }
  h+='<div class="brand">Galdorcr\u00e6ft \u00b7 The walk is the curriculum</div>';
  m.innerHTML=h;
}

// ═══════ PHRASEBOOK ═══════
function rPhrase(m){
  let h=`<div class="card"><p>Lines by situation. Tap for breakdown. No gating. Jump to what the walk needs.</p></div>`;
  for(const sit of SITS){
    const lines=ALL.filter(l=>l.sits.includes(sit.id));
    if(!lines.length)continue;
    h+=`<div class="sit-group"><div class="sit-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <h3>${sit.icon} ${sit.name}</h3><span class="ct">${lines.length} lines \u00b7 ${sit.desc}</span>
    </div><div class="sit-body">${lines.map(l=>lineHTML(l,true)).join('')}</div></div>`;
  }
  h+='<div class="brand">Galdorcr\u00e6ft</div>';
  m.innerHTML=h;
}

// ═══════ CHUNKS ═══════
function rChunks(m){
  let h=`<div class="card"><h2>Building Blocks</h2><p>Single words and short phrases. The pieces that combine into lines. Learn these first — they're the foundation everything else builds on. Tap to mark as active.</p></div>`;
  for(const sit of SITS){
    const cks=ALL_CHUNKS.filter(c=>c.sits.includes(sit.id));
    if(!cks.length)continue;
    h+=`<div class="card"><h2 style="font-size:0.82em">${sit.icon} ${sit.name}</h2><div style="display:flex;flex-wrap:wrap;gap:6px">`;
    for(const c of cks){
      const isActive=core[c.oe]==='active';
      h+=`<div class="wd" style="cursor:pointer;${isActive?'border:2px solid var(--green);background:var(--green-bg)':''}" onclick="markCore('${c.oe.replace(/'/g,"\\'")}',core['${c.oe.replace(/'/g,"\\'")}']?null:'active');render()">
        <span class="woe">${c.oe}</span><br>
        <span style="color:var(--gold);font-size:0.85em">${c.pron}</span><br>
        <span class="wen">${c.eng}</span>
      </div>`;
    }
    h+=`</div></div>`;
  }
  h+='<div class="brand">Galdorcr\u00e6ft</div>';
  m.innerHTML=h;
}

// ═══════ DRILL — SPEAK ALOUD ═══════
function rDrill(m){
  const pool=drillMode==='chunk'?ALL_CHUNKS:ALL;
  const activeSits=SITS.filter(s=>pool.some(l=>l.sits.includes(s.id)));
  if(!drillSit||drillState==='next'){
    const sit=activeSits[Math.floor(Math.random()*activeSits.length)];
    drillSit=sit.id;
    const p2=pool.filter(l=>l.sits.includes(drillSit));
    drillIdx=Math.floor(Math.random()*p2.length);
    drillState='prompt';
  }
  const p2=pool.filter(l=>l.sits.includes(drillSit));
  if(!p2.length){drillState='next';drillSit='';render();return}
  const item=p2[drillIdx%p2.length];
  const sit=SITS.find(s=>s.id===drillSit);

  let h=`<div class="card">
    <h2>\u{1f50a} Speak Aloud</h2>
    <p>A situation appears with the English. <strong>Say the OE out loud from memory.</strong> Not in your head — through the mouth. The motor trace only builds if the jaw and throat move. Then reveal to check.</p>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn ${drillMode==='line'?'btn-g':'btn-s'}" onclick="drillMode='line';drillState='next';render()">Lines</button>
      <button class="btn ${drillMode==='chunk'?'btn-g':'btn-s'}" onclick="drillMode='chunk';drillState='next';render()">Words</button>
    </div>
  </div>`;

  h+=`<div class="drill-card">
    <div class="drill-sit">${sit.icon} ${sit.name}</div>
    <div class="drill-prompt" style="font-size:${drillMode==='chunk'?'1.3em':'0.95em'}">${item.eng}</div>
    <div style="font-size:0.7em;color:var(--light);margin:4px 0">\u{1f50a} Say it aloud. Through the mouth. Low in the jaw.</div>`;

  if(drillState==='prompt'){
    h+=`<div class="btn-row">
      <button class="btn btn-g" onclick="revealDrill()">\u{1f50a} Reveal</button>
      <button class="btn btn-s" onclick="drillState='next';render()">Skip</button>
    </div>`;
  }else{
    h+=`<div class="drill-reveal">
      <div class="pron" style="font-size:1.1em;margin-bottom:6px">${item.pron}</div>
      <div class="oe" style="font-size:1.05em">${item.oe}</div>
      <div class="eng">${item.eng}</div>
      ${item.dive?`<div class="dive" style="margin-top:8px">${item.dive}</div>`:''}
    </div>
    <div style="font-size:0.75em;color:var(--gold);text-align:center;margin:8px 0">\u{1f50a} Now say it again. Out loud. Match the pronunciation.</div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="drillState='next';render()">Next \u2192</button>
      <button class="btn btn-s" onclick="markCore('${item.oe.replace(/'/g,"\\'")}','active');drillState='next';render()">\u2b50 Mark active</button>
    </div>`;
  }
  h+=`</div>`;
  h+='<div class="brand">Galdorcr\u00e6ft \u00b7 The mouth makes the trace</div>';
  m.innerHTML=h;
}

function revealDrill(){drillState='revealed';render()}

// ═══════ CORE ═══════
function rCore(m){
  const active=ALL.filter(l=>core[l.oe]==='active');
  const shelf=ALL.filter(l=>core[l.oe]==='shelf');

  let h=`<div class="card"><h2>\u2b50 Active Core</h2><p>Lines you're carrying. These get drilled fast — no scaffolding, just: can you say it right now?</p></div>`;
  if(active.length){
    h+=active.map(l=>lineHTML(l,true)).join('');
  }else{
    h+=`<div class="card"><p style="color:var(--light);font-style:italic">No active lines yet. Go to the Phrasebook, find a line, tap it, and mark it active.</p></div>`;
  }

  h+=`<div class="card" style="margin-top:16px"><h2>\u{1f4da} On the Shelf</h2><p>Lines you know about but can't produce yet. They'll come.</p></div>`;
  if(shelf.length){
    h+=shelf.map(l=>lineHTML(l,true)).join('');
  }else{
    h+=`<div class="card"><p style="color:var(--light);font-style:italic">Nothing shelved yet.</p></div>`;
  }

  h+='<div class="brand">Galdorcr\u00e6ft \u00b7 OE Practice Engine</div>';
  m.innerHTML=h;
}

// ═══════ STUDY ═══════
function rStudy(m){
  let h=`<div class="card"><h2>Text Study</h2><p>Work through the poems line by line. Full word-by-word breakdown.</p>
  <div style="display:flex;flex-direction:column;gap:4px;margin-top:8px">
    <a href="https://www.oldenglishaerobics.net/wanderer.php" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border-radius:var(--rs)">\u{1f50a} Listen: The Wanderer (OE Aerobics)</a>
    <a href="https://www.oldenglishaerobics.net/seafarer.php" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border-radius:var(--rs)">\u{1f50a} Listen: The Seafarer</a>
    <a href="https://www.oldenglishaerobics.net/" target="_blank" style="font-size:0.78em;color:var(--gold);text-decoration:none;padding:6px 10px;background:var(--gold-bg);border-radius:var(--rs)">\u{1f50a} OE Aerobics — full audio library</a>
  </div></div>`;
  for(const t of TEXTS){
    h+=`<div class="sit-group">
      <div class="sit-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <h3>${t.title}</h3>
        <span class="ct">${t.lines.length} lines</span>
      </div>
      <div class="sit-body">`;
    let curSt='';
    for(let i=0;i<t.lines.length;i++){
      const l=t.lines[i];
      if(l.st&&l.st!==curSt){
        curSt=l.st;
        h+=`<div style="padding:8px 14px;font-size:0.72em;color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)">${curSt}</div>`;
      }
      const item={...l,src:t.title,textIdx:TEXTS.indexOf(t),lineIdx:i};
      h+=lineHTML(item,false);
    }
    h+=`</div></div>`;
  }
  h+='<div class="brand">Galdorcr\u00e6ft \u00b7 OE Practice Engine</div>';
  m.innerHTML=h;
}

render();
</script>
